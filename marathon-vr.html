<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARATHON // TAU CETI IV — WebXR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      overflow: hidden;
    }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #050f0a 0%, #000 70%);
      z-index: 10;
    }
    .logo-block {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-title {
      font-size: clamp(36px, 8vw, 96px);
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #00ff88;
      text-shadow: 0 0 40px #00ff8880, 0 0 80px #00ff8840;
      animation: flicker 4s infinite;
    }
    .logo-sub {
      font-size: clamp(10px, 2vw, 14px);
      letter-spacing: 0.5em;
      color: #ff4400;
      margin-top: 8px;
      opacity: 0.9;
    }
    .hud-line {
      width: 320px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
      margin: 16px 0;
    }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 32px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #00ff8890;
      margin-bottom: 32px;
      width: 320px;
    }
    .status-grid span { color: #ff4400; }
    #enter-btn {
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.4em;
      padding: 14px 40px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    #enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: #00ff8815;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s;
    }
    #enter-btn:hover::before { transform: scaleX(1); }
    #enter-btn:hover { box-shadow: 0 0 20px #00ff8850, inset 0 0 20px #00ff8810; }
    #error-msg {
      margin-top: 16px;
      font-size: 11px;
      color: #ff4400;
      letter-spacing: 0.1em;
      display: none;
      max-width: 320px;
      text-align: center;
    }
    canvas { display: block; }

    @keyframes flicker {
      0%,94%,96%,100% { opacity: 1; }
      95% { opacity: 0.7; }
    }
    .dither-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, #00ff8808 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, #ff440008 0%, transparent 40%);
      pointer-events: none;
    }
    .scan-line {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,136,0.015) 2px,
        rgba(0,255,136,0.015) 4px
      );
      pointer-events: none;
    }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #ffffff30;
      text-align: center;
      z-index: 5;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div class="dither-bg"></div>
  <div class="scan-line"></div>
  <div class="logo-block">
    <div class="logo-title">MARATHON</div>
    <div class="logo-sub">// TAU CETI IV — SECTOR 7 //</div>
  </div>
  <div class="hud-line"></div>
  <div class="status-grid">
    <div>RUNNER STATUS</div><div><span>ACTIVE</span></div>
    <div>PLANET</div><div><span>TAU CETI IV</span></div>
    <div>BIOME</div><div><span>COLONY RUINS</span></div>
    <div>HAND TRACK</div><div><span>ENABLED</span></div>
    <div>RENDER MODE</div><div><span>XR PASSTHROUGH</span></div>
    <div>BUILD</div><div><span>v4.1.7-rc</span></div>
  </div>
  <div class="hud-line"></div>
  <div id="loading-bar" style="width:320px;height:2px;background:#00ff8820;margin-bottom:16px;display:none">
    <div id="loading-fill" style="height:100%;background:#00ff88;width:0%;transition:width 0.3s"></div>
  </div>
  <button id="enter-btn">[ ENTER TAU CETI IV ]</button>
  <div id="loading-text" style="font-size:11px;letter-spacing:0.2em;color:#00ff8870;margin-top:12px;display:none">CARICAMENTO MODULI...</div>
  <div id="error-msg"></div>
</div>

<div id="info">META QUEST 3 · WEBXR · HAND TRACKING · PASSTHROUGH AR</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.128.0';

let renderer, scene, camera, clock;
let handLeft, handRight;
let xrSession = null;
let handMeshes = { left: null, right: null };
let particles, particlePositions;
let holoPanels = [];
let timeUniform = { value: 0 };

// ── INIT THREE.JS ────────────────────────────────────────────
function init() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 200);
  camera.position.set(0, 1.6, 0);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('c'),
    antialias: true,
    alpha: true,
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;

  buildEnvironment();
  buildParticles();
  buildHoloPanels();
  addLights();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  renderer.setAnimationLoop(render);
}

// ── MARATHON ENVIRONMENT ──────────────────────────────────────
function buildEnvironment() {
  // Floor — worn industrial tile
  const floorGeo = new THREE.PlaneGeometry(40, 40, 20, 20);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x0a1a0f,
    roughness: 0.95,
    metalness: 0.1,
    wireframe: false,
  });
  // Dither-style displacement via vertex noise
  const pos = floorGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, (Math.sin(x * 0.8) * Math.cos(z * 0.8)) * 0.04);
  }
  pos.needsUpdate = true;
  floorGeo.computeVertexNormals();
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid overlay on floor
  const gridHelper = new THREE.GridHelper(40, 40, 0x00ff4420, 0x00ff4410);
  gridHelper.position.y = 0.002;
  scene.add(gridHelper);

  // Ruined colony walls — Marathon-style brutalist slabs
  buildWalls();

  // Tau Ceti sky atmosphere
  const skyGeo = new THREE.SphereGeometry(80, 32, 16);
  const skyMat = new THREE.MeshBasicMaterial({
    color: 0x000d06,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Floating debris columns
  buildDebrisColumns();

  // Warning stripes on floor
  buildFloorMarkings();
}

function buildWalls() {
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x111a14,
    roughness: 0.9,
    metalness: 0.3,
  });
  const accentMat = new THREE.MeshStandardMaterial({
    color: 0xff4400,
    emissive: new THREE.Color(0xff4400),
    emissiveIntensity: 0.6,
    roughness: 0.3,
  });

  // Back wall
  const backWallGeo = new THREE.BoxGeometry(20, 8, 0.3);
  const backWall = new THREE.Mesh(backWallGeo, wallMat);
  backWall.position.set(0, 4, -8);
  backWall.castShadow = true;
  scene.add(backWall);

  // Accent stripe on back wall
  const stripeGeo = new THREE.BoxGeometry(20, 0.15, 0.35);
  const stripe = new THREE.Mesh(stripeGeo, accentMat);
  stripe.position.set(0, 1.5, -8);
  scene.add(stripe);

  // Left wall segments
  [-8, -4].forEach((z, i) => {
    const segGeo = new THREE.BoxGeometry(0.3, 6, 4);
    const seg = new THREE.Mesh(segGeo, wallMat);
    seg.position.set(-7, 3, z);
    seg.castShadow = true;
    scene.add(seg);
  });

  // Structural pillars — Marathon brutalist columns
  [[-5, -6], [5, -6], [-5, 2], [5, 2]].forEach(([x, z]) => {
    const pillarGeo = new THREE.BoxGeometry(0.5, 7, 0.5);
    const pillar = new THREE.Mesh(pillarGeo, wallMat);
    pillar.position.set(x, 3.5, z);
    pillar.castShadow = true;
    scene.add(pillar);

    // Emissive ring on pillar
    const ringGeo = new THREE.TorusGeometry(0.4, 0.04, 8, 16);
    const ring = new THREE.Mesh(ringGeo, accentMat);
    ring.position.set(x, 1.4, z);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
  });

  // Ceiling beams
  for (let x = -6; x <= 6; x += 4) {
    const beamGeo = new THREE.BoxGeometry(0.2, 0.2, 16);
    const beam = new THREE.Mesh(beamGeo, wallMat);
    beam.position.set(x, 7.5, -3);
    scene.add(beam);
  }
}

function buildDebrisColumns() {
  const mat = new THREE.MeshStandardMaterial({
    color: 0x0d2016,
    roughness: 0.85,
    metalness: 0.4,
  });
  [[3, -4], [-4, -3], [6, 1], [-6, -1]].forEach(([x, z], i) => {
    const h = 1 + Math.random() * 2;
    const geo = new THREE.BoxGeometry(0.4 + Math.random() * 0.3, h, 0.4 + Math.random() * 0.3);
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, h / 2, z);
    m.rotation.y = Math.random() * Math.PI;
    m.castShadow = true;
    scene.add(m);
  });
}

function buildFloorMarkings() {
  // Marathon-style hazard dashes
  const stripeMat = new THREE.MeshStandardMaterial({
    color: 0xffcc00,
    emissive: new THREE.Color(0xffcc00),
    emissiveIntensity: 0.4,
  });
  for (let i = -3; i <= 3; i++) {
    const dashGeo = new THREE.BoxGeometry(0.08, 0.005, 0.6);
    const dash = new THREE.Mesh(dashGeo, stripeMat);
    dash.position.set(i * 0.4, 0.003, -2);
    dash.rotation.y = Math.PI / 4;
    scene.add(dash);
  }
}

// ── PARTICLE SYSTEM — digital dithering atmosphere ─────────────
function buildParticles() {
  const count = 1200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  particlePositions = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const x = (Math.random() - 0.5) * 20;
    const y = Math.random() * 7;
    const z = (Math.random() - 0.5) * 20;
    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;
    particlePositions[i*3] = x;
    particlePositions[i*3+1] = y;
    particlePositions[i*3+2] = z;

    // Marathon color palette: neon green + orange accents
    if (Math.random() > 0.85) {
      colors[i*3]=1; colors[i*3+1]=0.27; colors[i*3+2]=0;
    } else {
      colors[i*3]=0; colors[i*3+1]=1; colors[i*3+2]=0.53;
    }
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.015,
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    sizeAttenuation: true,
  });
  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

// ── HOLOGRAPHIC HUD PANELS — Marathon UI language ─────────────
function buildHoloPanels() {
  // Left panel — RUNNER stats
  const leftPanel = createHoloPanel(0.6, 0.4, 0x00ff88);
  leftPanel.position.set(-1.5, 1.4, -1.8);
  leftPanel.rotation.y = 0.3;
  scene.add(leftPanel);
  holoPanels.push(leftPanel);

  // Right panel — MAP fragment
  const rightPanel = createHoloPanel(0.5, 0.5, 0xff4400);
  rightPanel.position.set(1.5, 1.4, -1.8);
  rightPanel.rotation.y = -0.3;
  scene.add(rightPanel);
  holoPanels.push(rightPanel);

  // Top center — Marathon logo bar
  const topBar = createHoloPanel(1.2, 0.1, 0x00ff88);
  topBar.position.set(0, 2.1, -1.9);
  scene.add(topBar);
  holoPanels.push(topBar);
}

function createHoloPanel(w, h, color) {
  const group = new THREE.Group();

  const panelGeo = new THREE.PlaneGeometry(w, h);
  const panelMat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: 0.08,
    side: THREE.DoubleSide,
  });
  const panel = new THREE.Mesh(panelGeo, panelMat);
  group.add(panel);

  // Border frame
  const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, 0.001));
  const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
  const border = new THREE.LineSegments(edges, lineMat);
  group.add(border);

  // Corner accents
  [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx, sy]) => {
    const cornerGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(sx * w/2, sy * h/2, 0),
      new THREE.Vector3(sx * (w/2 - 0.06), sy * h/2, 0),
      new THREE.Vector3(sx * w/2, sy * (h/2 - 0.06), 0),
    ]);
    const cornerLine = new THREE.Line(cornerGeo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1 }));
    group.add(cornerLine);
  });

  return group;
}

// ── LIGHTS ──────────────────────────────────────────────────────
function addLights() {
  const ambient = new THREE.AmbientLight(0x0a1a0f, 0.6);
  scene.add(ambient);

  // Marathon green accent light
  const greenLight = new THREE.PointLight(0x00ff88, 1.5, 12);
  greenLight.position.set(-3, 3, -4);
  scene.add(greenLight);

  // Orange danger light
  const orangeLight = new THREE.PointLight(0xff4400, 1.2, 10);
  orangeLight.position.set(3, 2, -3);
  scene.add(orangeLight);

  // Ceiling strip
  const stripLight = new THREE.RectAreaLight && new THREE.PointLight(0x00ffaa, 0.8, 20);
  if (stripLight) {
    stripLight.position.set(0, 7, -4);
    scene.add(stripLight);
  }
}

// ── HAND TRACKING — Apple Vision Pro passthrough style ─────────
function setupHandTracking(session) {
  handLeft  = session.inputSources[0] || null;
  handRight = session.inputSources[1] || null;

  // We'll build hand meshes dynamically in the render loop
  // using XRFrame hand joint poses
  ['left', 'right'].forEach(side => {
    const group = new THREE.Group();
    handMeshes[side] = group;
    scene.add(group);
  });
}

function buildJointMesh(size) {
  const geo = new THREE.SphereGeometry(size, 8, 8);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffd4a8,
    roughness: 0.4,
    metalness: 0.05,
    transparent: true,
    opacity: 0.92,
  });
  return new THREE.Mesh(geo, mat);
}

function buildBoneMesh() {
  const geo = new THREE.CylinderGeometry(0.003, 0.003, 1, 6);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xf5c8a0,
    roughness: 0.5,
    transparent: true,
    opacity: 0.85,
  });
  return new THREE.Mesh(geo, mat);
}

// Joint names following WebXR Hand Input spec
const JOINT_NAMES = [
  'wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];

// Bone connections [from, to] as joint name indices
const BONES = [
  [0,1],[1,2],[2,3],[3,4],           // thumb
  [0,5],[5,6],[6,7],[7,8],[8,9],     // index
  [0,10],[10,11],[11,12],[12,13],[13,14], // middle
  [0,15],[15,16],[16,17],[17,18],[18,19], // ring
  [0,20],[20,21],[21,22],[22,23],[23,24], // pinky
];

// Cache pools for joints and bones
const jointPool = { left: [], right: [] };
const bonePool  = { left: [], right: [] };

function updateHands(frame, refSpace) {
  if (!frame) return;

  ['left','right'].forEach(side => {
    const inputSource = [...(frame.session.inputSources || [])].find(s => s.handedness === side);
    const group = handMeshes[side];
    if (!group) return;

    if (!inputSource || !inputSource.hand) {
      group.visible = false;
      return;
    }

    group.visible = true;
    const hand = inputSource.hand;

    // Ensure pool is big enough
    while (jointPool[side].length < JOINT_NAMES.length) {
      const jm = buildJointMesh(0.007);
      scene.add(jm);
      jointPool[side].push(jm);
    }
    while (bonePool[side].length < BONES.length) {
      const bm = buildBoneMesh();
      scene.add(bm);
      bonePool[side].push(bm);
    }

    // Collect joint world positions
    const jointPositions = [];
    JOINT_NAMES.forEach((name, idx) => {
      const joint = hand.get ? hand.get(name) : hand[name];
      const mesh = jointPool[side][idx];
      if (!joint) { mesh.visible = false; jointPositions.push(null); return; }

      const pose = frame.getJointPose(joint, refSpace);
      if (!pose) { mesh.visible = false; jointPositions.push(null); return; }

      const p = pose.transform.position;
      const q = pose.transform.orientation;
      mesh.position.set(p.x, p.y, p.z);
      mesh.quaternion.set(q.x, q.y, q.z, q.w);

      // Fingertip glow
      const isTip = name.endsWith('-tip');
      mesh.material.emissive = isTip ? new THREE.Color(0x00ff88) : new THREE.Color(0x000000);
      mesh.material.emissiveIntensity = isTip ? 0.4 : 0;
      mesh.scale.setScalar(isTip ? 1.3 : 1.0);
      mesh.visible = true;
      jointPositions.push(new THREE.Vector3(p.x, p.y, p.z));
    });

    // Draw bones
    BONES.forEach(([fromIdx, toIdx], bIdx) => {
      const bone = bonePool[side][bIdx];
      const pA = jointPositions[fromIdx];
      const pB = jointPositions[toIdx];
      if (!pA || !pB) { bone.visible = false; return; }

      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      const len = pA.distanceTo(pB);
      bone.position.copy(mid);
      bone.scale.set(1, len, 1);
      bone.lookAt(pB);
      bone.rotateX(Math.PI / 2);
      bone.visible = true;
    });
  });
}

// ── RENDER LOOP ──────────────────────────────────────────────────
function render(timestamp, frame) {
  const t = clock.getElapsedTime();
  timeUniform.value = t;

  // Animate particles — drifting digital dust
  if (particles) {
    const pos = particles.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, particlePositions[i*3+1] + Math.sin(t * 0.3 + i * 0.07) * 0.1);
    }
    pos.needsUpdate = true;
    particles.rotation.y = t * 0.005;
  }

  // Animate holo panels — subtle pulse
  holoPanels.forEach((panel, i) => {
    const pulse = 0.85 + Math.sin(t * 1.2 + i * 2.1) * 0.15;
    panel.children.forEach(child => {
      if (child.material) child.material.opacity = (child.material.opacity > 0.5 ? 0.7 : 0.08) * pulse;
    });
    panel.position.y += Math.sin(t * 0.4 + i) * 0.0002;
  });

  // Hand tracking
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    if (refSpace) updateHands(frame, refSpace);
  }

  renderer.render(scene, camera);
}

// ── ENTER XR ────────────────────────────────────────────────────
async function enterXR() {
  if (!renderer) init();

  const errEl    = document.getElementById('error-msg');
  const loadBar  = document.getElementById('loading-bar');
  const loadFill = document.getElementById('loading-fill');
  const loadTxt  = document.getElementById('loading-text');
  const btn      = document.getElementById('enter-btn');

  errEl.style.display = 'none';
  loadBar.style.display = 'block';
  loadTxt.style.display = 'block';
  btn.disabled = true;
  btn.textContent = '[ INIZIALIZZAZIONE... ]';

  // Animate loading bar
  let pct = 0;
  const barAnim = setInterval(() => {
    pct = Math.min(pct + 5, 90);
    loadFill.style.width = pct + '%';
  }, 80);

  const finish = () => {
    clearInterval(barAnim);
    loadFill.style.width = '100%';
    setTimeout(() => {
      loadBar.style.display = 'none';
      loadTxt.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '[ ENTER TAU CETI IV ]';
    }, 400);
  };

  if (!navigator.xr) {
    finish();
    errEl.textContent = '⚠ WebXR non supportato. Apri dal Meta Quest Browser.';
    errEl.style.display = 'block';
    return;
  }

  // Try immersive-ar first (passthrough), then vr
  const arOk = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  const mode = arOk ? 'immersive-ar' : 'immersive-vr';

  loadTxt.textContent = arOk ? 'MODALITÀ PASSTHROUGH...' : 'MODALITÀ VR...';

  try {
    const session = await navigator.xr.requestSession(mode, {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['hand-tracking', 'bounded-floor'],
    });
    xrSession = session;
    await renderer.xr.setSession(session);
    setupHandTracking(session);
    finish();
    document.getElementById('overlay').style.display = 'none';
    // In VR mode add a dark background
    if (mode === 'immersive-vr') renderer.setClearColor(0x000d06, 1);
    session.addEventListener('end', () => {
      document.getElementById('overlay').style.display = 'flex';
      renderer.setClearColor(0x000000, 0);
      xrSession = null;
    });
  } catch(e) {
    finish();
    errEl.textContent = '⚠ ' + e.message + ' — Assicurati di usare il Meta Quest Browser.';
    errEl.style.display = 'block';
  }
}

async function tryVR() {
  const errEl = document.getElementById('error-msg');
  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!supported) return;
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['hand-tracking'],
    });
    xrSession = session;
    renderer.xr.setSession(session);
    setupHandTracking(session);
    // In VR mode, show starfield background
    renderer.setClearColor(0x000d06, 1);
    document.getElementById('overlay').style.display = 'none';
    session.addEventListener('end', () => {
      document.getElementById('overlay').style.display = 'flex';
      renderer.setClearColor(0x000000, 0);
      xrSession = null;
    });
  } catch(e) {
    errEl.textContent = '⚠ VR non disponibile: ' + e.message;
    errEl.style.display = 'block';
  }
}

// Init scene for desktop preview
init();

// Attach button inside module (fixes onclick scope in ES modules)
document.getElementById("enter-btn").addEventListener("click", enterXR);
document.getElementById('enter-btn').addEventListener('click', enterXR);
</script>

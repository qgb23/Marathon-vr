<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARATHON // TAU CETI IV — v2</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#00ff88;}

    /* ── RUNNER SELECT SCREEN ── */
    #select-screen{
      position:fixed;inset:0;z-index:20;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at center,#030d07 0%,#000 75%);
    }
    #select-screen.hidden{display:none;}
    #select-screen::after{
      content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.01) 2px,rgba(0,255,136,0.01) 4px);
      pointer-events:none;
    }
    .sel-title{font-size:clamp(24px,5vw,52px);font-weight:900;letter-spacing:0.3em;color:#00ff88;
      text-shadow:0 0 30px #00ff8870;animation:flicker 4s infinite;margin-bottom:4px;}
    .sel-sub{font-size:11px;letter-spacing:0.5em;color:#ff4400;margin-bottom:32px;}
    .sel-line{width:min(700px,90vw);height:1px;background:linear-gradient(90deg,transparent,#00ff88,transparent);margin-bottom:28px;}

    .runners-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
      gap:12px;width:min(840px,92vw);margin-bottom:32px;
    }
    .runner-card{
      border:1px solid #00ff8840;padding:14px 10px;text-align:center;cursor:pointer;
      transition:all .2s;position:relative;overflow:hidden;background:#00ff8805;
    }
    .runner-card:hover,.runner-card.active{
      border-color:#00ff88;background:#00ff8815;
      box-shadow:0 0 20px #00ff8840;
    }
    .runner-card.active{border-color:#ff4400;box-shadow:0 0 24px #ff440060;}
    .runner-icon{font-size:28px;margin-bottom:8px;}
    .runner-name{font-size:11px;letter-spacing:0.25em;color:#00ff88;font-weight:700;}
    .runner-role{font-size:9px;letter-spacing:0.1em;color:#00ff8860;margin-top:3px;}
    .runner-card::before{
      content:'';position:absolute;top:0;left:-100%;width:100%;height:1px;
      background:linear-gradient(90deg,transparent,#00ff88,transparent);
      transition:left .3s;
    }
    .runner-card:hover::before{left:100%;}

    #start-btn{
      background:transparent;border:1px solid #00ff88;color:#00ff88;
      font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.4em;
      padding:13px 40px;cursor:pointer;transition:all .2s;
    }
    #start-btn:hover{background:#00ff8818;box-shadow:0 0 20px #00ff8850;}
    #start-btn:disabled{opacity:0.4;cursor:default;}
    #sel-hint{font-size:10px;letter-spacing:0.15em;color:#00ff8850;margin-top:12px;}

    /* ── ABILITY HUD (in-VR overlay) ── */
    #ability-hud{
      position:fixed;bottom:0;left:0;right:0;z-index:15;
      display:flex;justify-content:center;gap:20px;padding:16px;
      pointer-events:none;
    }
    #ability-hud.hidden{display:none;}
    .ability-slot{
      width:70px;text-align:center;
    }
    .ability-icon{
      width:60px;height:60px;border:1px solid #00ff88;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;background:#00ff8808;position:relative;margin:0 auto 4px;
    }
    .ability-icon.orange{border-color:#ff4400;}
    .ability-cooldown{
      position:absolute;bottom:0;left:0;right:0;height:3px;background:#00ff88;
      transform-origin:left;transition:transform .1s linear;
    }
    .ability-cooldown.orange{background:#ff4400;}
    .ability-label{font-size:8px;letter-spacing:0.12em;color:#00ff8880;}

    /* ── ACTIVE ABILITY EFFECTS ── */
    #barricade-overlay{
      position:fixed;inset:0;pointer-events:none;z-index:12;display:none;
      border:3px solid #00aaff80;
      box-shadow:inset 0 0 60px #00aaff30;
      background:linear-gradient(180deg,transparent 60%,#00aaff08 100%);
    }
    #barricade-overlay.active{display:block;}
    #missile-flash{
      position:fixed;inset:0;pointer-events:none;z-index:13;
      background:#ff440020;opacity:0;transition:opacity .15s;
    }
    #missile-flash.flash{opacity:1;}

    /* ── VR Button override ── */
    #VRButton{
      position:fixed!important;bottom:40px!important;left:50%!important;
      transform:translateX(-50%)!important;z-index:999!important;
      background:transparent!important;border:1px solid #00ff88!important;
      color:#00ff88!important;font-family:'Courier New',monospace!important;
      font-size:13px!important;letter-spacing:0.35em!important;
      padding:14px 36px!important;cursor:pointer!important;border-radius:0!important;width:auto!important;
    }
    #VRButton:hover{background:#00ff8820!important;box-shadow:0 0 24px #00ff8860!important;}

    @keyframes flicker{0%,93%,95%,100%{opacity:1}94%{opacity:0.6}}
    @keyframes missileTrail{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-200px) scale(0.2);opacity:0}}
    canvas{display:block;}
  </style>
</head>
<body>

<!-- ── RUNNER SELECTION SCREEN ── -->
<div id="select-screen">
  <div class="sel-title">SELECT RUNNER SHELL</div>
  <div class="sel-sub">// CHOOSE YOUR FRAME — TAU CETI IV //</div>
  <div class="sel-line"></div>

  <div class="runners-grid">
    <div class="runner-card" data-runner="destroyer" onclick="selectRunner(this)">
      <div class="runner-icon">🛡️</div>
      <div class="runner-name">DESTROYER</div>
      <div class="runner-role">FRONTLINER</div>
    </div>
    <div class="runner-card" data-runner="vandal" onclick="selectRunner(this)">
      <div class="runner-icon">⚡</div>
      <div class="runner-name">VANDAL</div>
      <div class="runner-role">DISRUPTOR</div>
    </div>
    <div class="runner-card" data-runner="assassin" onclick="selectRunner(this)">
      <div class="runner-icon">👁️</div>
      <div class="runner-name">ASSASSIN</div>
      <div class="runner-role">STEALTH</div>
    </div>
    <div class="runner-card" data-runner="recon" onclick="selectRunner(this)">
      <div class="runner-icon">📡</div>
      <div class="runner-name">RECON</div>
      <div class="runner-role">INTEL</div>
    </div>
    <div class="runner-card" data-runner="thief" onclick="selectRunner(this)">
      <div class="runner-icon">🦋</div>
      <div class="runner-name">THIEF</div>
      <div class="runner-role">SCAVENGER</div>
    </div>
    <div class="runner-card" data-runner="triage" onclick="selectRunner(this)">
      <div class="runner-icon">💉</div>
      <div class="runner-name">TRIAGE</div>
      <div class="runner-role">MEDIC</div>
    </div>
    <div class="runner-card" data-runner="rook" onclick="selectRunner(this)">
      <div class="runner-icon">♟️</div>
      <div class="runner-name">ROOK</div>
      <div class="runner-role">SOLO ONLY</div>
    </div>
  </div>

  <button id="start-btn" disabled onclick="launchXR()">[ DEPLOY TO TAU CETI IV ]</button>
  <div id="sel-hint">SELEZIONA UN RUNNER PER CONTINUARE</div>
</div>

<!-- ── ABILITY HUD (shown in VR for Destroyer) ── -->
<div id="ability-hud" class="hidden">
  <div class="ability-slot">
    <div class="ability-icon orange" id="slot-prime">
      🚀
      <div class="ability-cooldown orange" id="cd-prime" style="transform:scaleX(1)"></div>
    </div>
    <div class="ability-label">SEARCH &amp; DESTROY</div>
  </div>
  <div class="ability-slot">
    <div class="ability-icon" id="slot-tactical">
      🛡️
      <div class="ability-cooldown" id="cd-tactical" style="transform:scaleX(1)"></div>
    </div>
    <div class="ability-label">RIOT BARRICADE</div>
  </div>
</div>

<!-- Barricade screen tint -->
<div id="barricade-overlay"></div>
<div id="missile-flash"></div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.150.1';
import { VRButton } from 'https://esm.sh/three@0.150.1/examples/jsm/webxr/VRButton.js';
import { XRHandModelFactory } from 'https://esm.sh/three@0.150.1/examples/jsm/webxr/XRHandModelFactory.js';

// ── STATE ────────────────────────────────────
let selectedRunner = null;
let destroyerAbilities = {
  prime:    { cd: 8,  remaining: 0, active: false },   // Search & Destroy
  tactical: { cd: 5,  remaining: 0, active: false },   // Riot Barricade
};
let barricadeMesh = null;
let missiles = [];

// ── RUNNER SELECTION ─────────────────────────
window.selectRunner = function(card){
  document.querySelectorAll('.runner-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  selectedRunner = card.dataset.runner;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('sel-hint').textContent =
    '[ ' + card.querySelector('.runner-name').textContent + ' — ' +
    card.querySelector('.runner-role').textContent + ' ] SELEZIONATO';
};

// ── LAUNCH XR ────────────────────────────────
window.launchXR = function(){
  document.getElementById('select-screen').classList.add('hidden');
  if(selectedRunner === 'destroyer'){
    document.getElementById('ability-hud').classList.remove('hidden');
  }
  // Just show the VRButton — user taps it once to enter VR
  // This avoids multiple sessions being created
  const btn = document.getElementById('VRButton');
  btn.style.display = 'block';
  btn.style.zIndex = '999';
};

// ── RENDERER ─────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x000d06,1);

const vrBtn = VRButton.createButton(renderer);
vrBtn.id = 'VRButton';
vrBtn.style.display = 'none'; // shown only after runner selection
document.body.appendChild(vrBtn);


renderer.xr.addEventListener('sessionstart',()=>{
  vrBtn.style.display = 'none';
  if(selectedRunner==='destroyer') setupDestroyerControls();
});
renderer.xr.addEventListener('sessionend',()=>{
  document.getElementById('select-screen').classList.remove('hidden');
  document.getElementById('ability-hud').classList.add('hidden');
  document.getElementById('barricade-overlay').classList.remove('active');
});

// ── SCENE ────────────────────────────────────
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x000d06,0.035);
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.01,100);
camera.position.set(0,1.6,3);
scene.add(camera);
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── LIGHTS ───────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1a0f,0.8));
const gLight=new THREE.PointLight(0x00ff88,2,15); gLight.position.set(-3,3,-4); scene.add(gLight);
const oLight=new THREE.PointLight(0xff4400,1.5,12); oLight.position.set(3,2,-3); scene.add(oLight);
scene.add(Object.assign(new THREE.PointLight(0x00ffaa,1,20),{position:new THREE.Vector3(0,7,-4)}));

// ── FLOOR ────────────────────────────────────
const floorGeo=new THREE.PlaneGeometry(30,30,15,15);
const floorMat=new THREE.MeshStandardMaterial({color:0x0a1a0f,roughness:0.95,metalness:0.1});
const fp=floorGeo.attributes.position;
for(let i=0;i<fp.count;i++) fp.setY(i,Math.sin(fp.getX(i)*0.7)*Math.cos(fp.getZ(i)*0.7)*0.04);
fp.needsUpdate=true; floorGeo.computeVertexNormals();
const floor=new THREE.Mesh(floorGeo,floorMat); floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
scene.add(new THREE.GridHelper(30,30,0xff440025,0x00ff4412));

// ── MATERIALS ────────────────────────────────
const wallMat  =new THREE.MeshStandardMaterial({color:0x0d1f12,roughness:0.9,metalness:0.3});
const accentMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:new THREE.Color(0xff4400),emissiveIntensity:0.7});
const greenMat =new THREE.MeshStandardMaterial({color:0x00ff88,emissive:new THREE.Color(0x00ff88),emissiveIntensity:0.5});

// ── ENVIRONMENT ──────────────────────────────
// Back wall
const bw=new THREE.Mesh(new THREE.BoxGeometry(16,8,0.3),wallMat); bw.position.set(0,4,-7); bw.castShadow=true; scene.add(bw);
scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(16,0.12,0.35),accentMat),{position:new THREE.Vector3(0,1.4,-7)}));
scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(16,0.06,0.35),greenMat),{position:new THREE.Vector3(0,2.2,-7)}));

// Pillars
[[-4,-5],[4,-5],[-4,1],[4,1]].forEach(([x,z],i)=>{
  const p=new THREE.Mesh(new THREE.BoxGeometry(0.45,7,0.45),wallMat);
  p.position.set(x,3.5,z); p.castShadow=true; scene.add(p);
  const mat=i%2===0?accentMat:greenMat;
  [1.3,6.5].forEach(y=>{
    const r=new THREE.Mesh(new THREE.TorusGeometry(0.35,0.035,8,16),mat);
    r.position.set(x,y,z); r.rotation.x=Math.PI/2; scene.add(r);
  });
});

// Side walls
[-7,4].forEach(z=>{
  const w=new THREE.Mesh(new THREE.BoxGeometry(0.3,6,5),wallMat);
  w.position.set(-6,3,z); w.castShadow=true; scene.add(w);
});

// Ceiling beams
for(let x=-5;x<=5;x+=4){
  const b=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.18,14),wallMat); b.position.set(x,7.4,-2); scene.add(b);
}

// Hazard markings
const hazMat=new THREE.MeshStandardMaterial({color:0xffcc00,emissive:new THREE.Color(0xffcc00),emissiveIntensity:0.5});
for(let i=-3;i<=3;i++){
  const d=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.005,0.55),hazMat);
  d.position.set(i*0.38,0.004,-2); d.rotation.y=Math.PI/4; scene.add(d);
}

// Debris
[[3,-4,1.5],[-4,-3,1],[5.5,0.5,0.8],[-5.5,-1,1.2]].forEach(([x,z,h])=>{
  const d=new THREE.Mesh(new THREE.BoxGeometry(0.35+Math.random()*0.25,h,0.35+Math.random()*0.25),wallMat);
  d.position.set(x,h/2,z); d.rotation.y=Math.random()*Math.PI; d.castShadow=true; scene.add(d);
});

// ── HOLO PANELS ──────────────────────────────
function makePanel(w,h,color){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.07,side:THREE.DoubleSide})));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w,h,0.001)),new THREE.LineBasicMaterial({color,transparent:true,opacity:0.8})));
  [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sy])=>{
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(sx*w/2,sy*h/2,0),new THREE.Vector3(sx*(w/2-0.07),sy*h/2,0),new THREE.Vector3(sx*w/2,sy*(h/2-0.07),0)
    ]),new THREE.LineBasicMaterial({color})));
  });
  return g;
}
const panels=[];
const pL=makePanel(0.55,0.38,0x00ff88); pL.position.set(-1.4,1.5,-2); pL.rotation.y=0.3; scene.add(pL); panels.push(pL);
const pR=makePanel(0.45,0.45,0xff4400); pR.position.set(1.4,1.5,-2);  pR.rotation.y=-0.3; scene.add(pR); panels.push(pR);
const pT=makePanel(1.1,0.09,0x00ff88);  pT.position.set(0,2.15,-2.1); scene.add(pT); panels.push(pT);

// ── PARTICLES ────────────────────────────────
const N=900,pGeo=new THREE.BufferGeometry();
const pp=new Float32Array(N*3),pb=new Float32Array(N*3),pc=new Float32Array(N*3);
for(let i=0;i<N;i++){
  const x=(Math.random()-0.5)*18,y=Math.random()*7,z=(Math.random()-0.5)*18;
  pp[i*3]=pb[i*3]=x;pp[i*3+1]=pb[i*3+1]=y;pp[i*3+2]=pb[i*3+2]=z;
  if(Math.random()>0.85){pc[i*3]=1;pc[i*3+1]=0.27;pc[i*3+2]=0;}
  else{pc[i*3]=0;pc[i*3+1]=1;pc[i*3+2]=0.53;}
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pc,3));
const ptsMesh=new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.013,vertexColors:true,transparent:true,opacity:0.7}));
scene.add(ptsMesh);

// ── HAND TRACKING ────────────────────────────
const handFactory=new XRHandModelFactory();
const hand1=renderer.xr.getHand(0);
const hand2=renderer.xr.getHand(1);

// Destroyer arm visual: heavy armored forearm on right hand
const destroyerArmGroup = new THREE.Group();
scene.add(destroyerArmGroup);

function buildDestroyerArm(){
  const armMat=new THREE.MeshStandardMaterial({color:0x1a2a1a,roughness:0.6,metalness:0.7});
  const glowMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:new THREE.Color(0xff4400),emissiveIntensity:0.8});

  // Forearm plate
  const forearm=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.22),armMat);
  destroyerArmGroup.add(forearm);

  // Shoulder missile pods (small boxes on top)
  [-0.02,0.02].forEach(ox=>{
    const pod=new THREE.Mesh(new THREE.BoxGeometry(0.018,0.018,0.06),armMat);
    pod.position.set(ox,0.04,0); destroyerArmGroup.add(pod);
    const glow=new THREE.Mesh(new THREE.SphereGeometry(0.008,6,6),glowMat);
    glow.position.set(ox,0.04,-0.025); destroyerArmGroup.add(glow);
  });

  // Orange trim stripe
  const trim=new THREE.Mesh(new THREE.BoxGeometry(0.063,0.005,0.22),glowMat);
  trim.position.set(0,-0.028,0); destroyerArmGroup.add(trim);
}
buildDestroyerArm();
destroyerArmGroup.visible=false;

// Sphere joints for hands
hand1.add(handFactory.createHandModel(hand1,'spheres'));
hand2.add(handFactory.createHandModel(hand2,'spheres'));
scene.add(hand1);
scene.add(hand2);

// Override material to skin tone
[hand1,hand2].forEach(h=>{
  h.addEventListener('connected',()=>{
    h.traverse(obj=>{
      if(obj.isMesh) obj.material=new THREE.MeshStandardMaterial({
        color:0xf5c0a0,roughness:0.45,metalness:0.05,transparent:true,opacity:0.9
      });
    });
  });
});

// Fallback controllers
const ctrl1=renderer.xr.getController(0);
const ctrl2=renderer.xr.getController(1);
scene.add(ctrl1); scene.add(ctrl2);

// ── DESTROYER ABILITIES ───────────────────────

// RIOT BARRICADE — blue energy shield in front of player
function buildBarricade(){
  const group=new THREE.Group();
  const shieldMat=new THREE.MeshStandardMaterial({
    color:0x00aaff,emissive:new THREE.Color(0x0066ff),emissiveIntensity:0.6,
    transparent:true,opacity:0.25,side:THREE.DoubleSide
  });
  const shield=new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.4),shieldMat);
  group.add(shield);

  // Hex pattern overlay
  const edgeMat=new THREE.LineBasicMaterial({color:0x00ccff,transparent:true,opacity:0.6});
  const edges=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(0.9,1.4,3,5)),edgeMat);
  group.add(edges);

  // Glow border
  const borderGeo=new THREE.EdgesGeometry(new THREE.BoxGeometry(0.91,1.41,0.01));
  const borderLine=new THREE.LineSegments(borderGeo,new THREE.LineBasicMaterial({color:0x00ccff,transparent:true,opacity:0.9}));
  group.add(borderLine);

  group.visible=false;
  scene.add(group);
  return group;
}
barricadeMesh=buildBarricade();

// SEARCH & DESTROY — homing missile visual
function fireMissile(origin, dir){
  const missileMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:new THREE.Color(0xff6600),emissiveIntensity:1});
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.025,0.12,6),missileMat);
  m.position.copy(origin);
  m.userData.vel=dir.clone().multiplyScalar(0.06);
  m.userData.life=60;
  // Trail light
  const mLight=new THREE.PointLight(0xff4400,0.8,1.5);
  m.add(mLight);
  scene.add(m);
  missiles.push(m);
}

function activateSearchAndDestroy(){
  const ab=destroyerAbilities.prime;
  if(ab.remaining>0) return;
  ab.active=true;
  ab.remaining=ab.cd;

  // Fire 2 missiles from shoulder position
  const cam=renderer.xr.getCamera();
  const origin=new THREE.Vector3();
  cam.getWorldPosition(origin);
  origin.y+=0.1;

  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  [-0.15,0.15].forEach(ox=>{
    const o=origin.clone().add(new THREE.Vector3(ox,0,0));
    fireMissile(o,fwd.clone().add(new THREE.Vector3(ox*0.2,0,0)).normalize());
  });

  // Flash effect
  const flash=document.getElementById('missile-flash');
  flash.classList.add('flash');
  setTimeout(()=>flash.classList.remove('flash'),150);

  // Cooldown UI
  animateCooldown('cd-prime',ab.cd);
}

function activateRiotBarricade(){
  const ab=destroyerAbilities.tactical;
  if(ab.active) {
    // Toggle OFF
    ab.active=false;
    barricadeMesh.visible=false;
    document.getElementById('barricade-overlay').classList.remove('active');
    animateCooldown('cd-tactical',ab.cd);
    return;
  }
  if(ab.remaining>0) return;
  ab.active=true;

  barricadeMesh.visible=true;
  document.getElementById('barricade-overlay').classList.add('active');

  // Auto-deactivate after 5s
  setTimeout(()=>{
    ab.active=false;
    barricadeMesh.visible=false;
    document.getElementById('barricade-overlay').classList.remove('active');
    animateCooldown('cd-tactical',ab.cd);
  },5000);
}

function animateCooldown(id,duration){
  const el=document.getElementById(id);
  const start=performance.now();
  const tick=()=>{
    const pct=Math.max(0,1-(performance.now()-start)/(duration*1000));
    el.style.transform=`scaleX(${pct})`;
    if(pct>0) requestAnimationFrame(tick);
    else {
      if(id==='cd-prime') destroyerAbilities.prime.remaining=0;
      else destroyerAbilities.tactical.remaining=0;
    }
  };
  requestAnimationFrame(tick);
}

// Controller button presses for abilities
function setupDestroyerControls(){
  destroyerArmGroup.visible=true;
  [ctrl1,ctrl2].forEach((ctrl,i)=>{
    ctrl.addEventListener('selectstart',()=>{
      if(i===0) activateSearchAndDestroy(); // Left trigger = missiles
    });
    ctrl.addEventListener('squeezestart',()=>{
      if(i===1) activateRiotBarricade();    // Right grip = barricade
    });
  });
}

// ── CLOCK & ANIMATION ────────────────────────
const clock=new THREE.Clock();

// Start rendering immediately for desktop preview
// (XR takes over this loop automatically when session starts)
renderer.setAnimationLoop(()=>{
  const t=clock.getElapsedTime();

  // Particles
  const pa=ptsMesh.geometry.attributes.position;
  for(let i=0;i<N;i++) pa.setY(i,pb[i*3+1]+Math.sin(t*0.25+i*0.08)*0.12);
  pa.needsUpdate=true;
  ptsMesh.rotation.y=t*0.004;

  // Panels pulse
  panels.forEach((p,i)=>{
    const pulse=0.82+Math.sin(t*1.1+i*2)*0.18;
    p.children.forEach(c=>{if(c.material?.opacity!==undefined&&c.material.opacity<0.5)c.material.opacity=0.07*pulse;});
    p.position.y+=Math.sin(t*0.35+i)*0.00015;
  });

  // Lights breathe
  gLight.intensity=1.8+Math.sin(t*0.7)*0.4;
  oLight.intensity=1.3+Math.sin(t*1.1+1)*0.3;

  // Update barricade position (in front of camera)
  if(barricadeMesh.visible){
    const cam=renderer.xr.getCamera();
    const pos=new THREE.Vector3();
    cam.getWorldPosition(pos);
    const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
    barricadeMesh.position.copy(pos.clone().add(fwd.multiplyScalar(0.7)));
    barricadeMesh.position.y=pos.y;
    barricadeMesh.lookAt(pos);
    // Pulse opacity
    barricadeMesh.children[0].material.opacity=0.2+Math.sin(t*3)*0.08;
  }

  // Attach destroyer arm to right hand/controller
  if(selectedRunner==='destroyer'){
    const cam=renderer.xr.getCamera();
    if(cam){
      const pos=new THREE.Vector3(); cam.getWorldPosition(pos);
      const right=new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
      destroyerArmGroup.position.copy(pos.clone().add(right.multiplyScalar(0.25)).add(new THREE.Vector3(0,-0.15,-0.3)));
      destroyerArmGroup.quaternion.copy(cam.quaternion);
    }
  }

  // Update missiles
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    m.position.add(m.userData.vel);
    m.userData.vel.y+=0.001; // slight arc
    m.userData.life--;
    if(m.userData.life<=0){
      scene.remove(m);
      missiles.splice(i,1);
    }
  }

  renderer.render(scene,camera);
});
</script>

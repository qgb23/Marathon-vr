<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destroyer HUD — Marathon AR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#fff;
  font-family:'Courier New',monospace;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; gap:14px; overflow:hidden;
}
#logo { font-size:10px; letter-spacing:.3em; color:rgba(255,45,155,.5); text-transform:uppercase; }
#start-btn {
  padding:16px 36px; font-size:17px; font-family:'Courier New',monospace;
  font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  background:transparent; color:#ff2d9b; border:2px solid #ff2d9b;
  border-radius:3px; cursor:pointer; transition:background .2s;
}
#start-btn:hover { background:rgba(255,45,155,.15); }
#info {
  font-size:11px; color:rgba(255,255,255,.35);
  letter-spacing:.1em; text-align:center;
  max-width:320px; line-height:1.8;
}
#err { color:#ff6060; font-size:12px; display:none; text-align:center; max-width:320px; }
canvas { display:none; position:fixed; inset:0; width:100%; height:100%; }
</style>
</head>
<body>

<div id="logo">Marathon · Destroyer Shell</div>
<button id="start-btn" onclick="startAR()">Enter AR</button>
<div id="info">
  WebXR immersive-ar · Quest 3<br>
  Quad 3D a 1.8m dalla testa — ogni occhio<br>
  riceve la proiezione corretta, nessun doppio.
</div>
<div id="err"></div>
<canvas id="c"></canvas>

<script>
// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
var state = {
  compassDeg: 286,
  timerSec: 14*60+2,
  abilities: [
    {name:'Search & Destroy', cd:0, maxCd:10},
    {name:'Riot Barricade',   cd:0, maxCd:8},
    {name:'Tactical Sprint',  cd:0, maxCd:12},
    {name:'Thruster',         cd:0, maxCd:6},
  ],
  notify:{text:'', alpha:0, timer:0},
};

// ─────────────────────────────────────────────────────────
// WebXR
// ─────────────────────────────────────────────────────────
var session, gl, refSpace;
var canvas = document.getElementById('c');

async function startAR() {
  document.getElementById('err').style.display = 'none';
  if (!navigator.xr) return showErr('WebXR non disponibile.');
  var ok = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!ok) return showErr('immersive-ar non supportato. Usa Meta Browser su Quest 3.');

  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local'],
    });
  } catch(e) { return showErr('Errore sessione: '+e.message); }

  ['start-btn','info','logo'].forEach(id => {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  canvas.style.display = 'block';

  gl = canvas.getContext('webgl2', {xrCompatible:true, alpha:true, premultipliedAlpha:false})
    || canvas.getContext('webgl',  {xrCompatible:true, alpha:true, premultipliedAlpha:false});

  await session.updateRenderState({
    baseLayer: new XRWebGLLayer(session, gl, {alpha:true}),
  });
  refSpace = await session.requestReferenceSpace('local');

  session.addEventListener('selectstart', e => {
    activateAbility(e.inputSource.handedness === 'left' ? 0 : 2);
  });
  session.addEventListener('selectend', e => {
    activateAbility(e.inputSource.handedness === 'left' ? 1 : 3);
  });

  setInterval(() => { state.timerSec = Math.max(0, state.timerSec - 1); }, 1000);

  initGL();
  session.requestAnimationFrame(onXRFrame);
}

function showErr(m) {
  var e = document.getElementById('err');
  e.textContent = m;
  e.style.display = 'block';
}
function activateAbility(i) {
  var ab = state.abilities[i];
  if (!ab || ab.cd > 0) return;
  ab.cd = ab.maxCd;
  pushNotify(ab.name + ' — Active');
}
function pushNotify(t) {
  state.notify.text = t;
  state.notify.alpha = 1;
  state.notify.timer = 2;
}

// ─────────────────────────────────────────────────────────
// HUD CANVAS 2D  (512 × 128 — solo bussola + abilità compatte)
// ─────────────────────────────────────────────────────────
var HW = 512, HH = 128;
var hc = document.createElement('canvas');
hc.width = HW; hc.height = HH;
var hx = hc.getContext('2d');

// ─────────────────────────────────────────────────────────
// GLSL — vertex shader usa projection matrix per-eye
// I vertici del quad sono definiti in view-space (camera-local):
//   +X destra, +Y su, -Z avanti
// Moltiplicando per la projection matrix si ottiene clip-space
// corretto per quell'occhio → nessun doppio.
// ─────────────────────────────────────────────────────────
var VERT = `
  precision highp float;
  attribute vec3 aPos;
  attribute vec2 aUV;
  uniform mat4 uProj;
  varying vec2 vUV;
  void main(){
    // aPos già in view-space → solo projection
    gl_Position = uProj * vec4(aPos, 1.0);
    vUV = aUV;
  }
`;
var FRAG = `
  precision mediump float;
  varying vec2 vUV;
  uniform sampler2D uTex;
  void main(){
    vec4 c = texture2D(uTex, vUV);
    // output pre-moltiplicato per blending corretto sul passthrough
    gl_FragColor = vec4(c.rgb * c.a, c.a);
  }
`;

var prog, vbo, tex;
var locPos, locUV, locProj, locTex;

// ── Dimensioni quad in view-space ──
// 0.55 m largo × 0.14 m alto a 1.8 m → ~17° horiz, ~4.4° vert
// Compatto, non invasivo, centrato leggermente in alto
var QW   = 0.55;   // larghezza metri
var QH   = 0.14;   // altezza metri
var DIST = 1.8;    // distanza in avanti (Z negativo)
var YOFF = 0.22;   // offset verso l'alto (0 = centro visivo)

function initGL() {
  var vs = makeShader(gl.VERTEX_SHADER, VERT);
  var fs = makeShader(gl.FRAGMENT_SHADER, FRAG);
  prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  // Quad: 4 vertici, triangle-strip
  var hw = QW / 2;
  var yb = -QH/2 + YOFF;   // bottom Y
  var yt =  QH/2 + YOFF;   // top Y
  var z  = -DIST;

  // interleaved: x y z u v  (stride = 5 * 4 bytes = 20)
  var verts = new Float32Array([
    -hw,  yb,  z,   0.0, 1.0,   // bottom-left
     hw,  yb,  z,   1.0, 1.0,   // bottom-right
    -hw,  yt,  z,   0.0, 0.0,   // top-left
     hw,  yt,  z,   1.0, 0.0,   // top-right
  ]);

  vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  locPos  = gl.getAttribLocation(prog,  'aPos');
  locUV   = gl.getAttribLocation(prog,  'aUV');
  locProj = gl.getUniformLocation(prog, 'uProj');
  locTex  = gl.getUniformLocation(prog, 'uTex');

  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function makeShader(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

// ─────────────────────────────────────────────────────────
// XR RENDER LOOP
// ─────────────────────────────────────────────────────────
var lastT = 0;

function onXRFrame(t, frame) {
  session.requestAnimationFrame(onXRFrame);

  var dt = lastT ? (t - lastT) / 1000 : 0.016;
  lastT = t;

  // Aggiorna stato
  state.compassDeg += 0.04;
  state.abilities.forEach(ab => {
    if (ab.cd > 0) ab.cd = Math.max(0, ab.cd - dt);
  });
  if (state.notify.timer > 0) {
    state.notify.timer -= dt;
    state.notify.alpha = Math.min(1, state.notify.timer / 0.4);
    if (state.notify.timer <= 0) state.notify.alpha = 0;
  }

  var pose = frame.getViewerPose(refSpace);
  if (!pose) return;

  var layer = session.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // Disegna HUD su canvas 2D (una volta sola)
  drawHUD();

  // Carica texture una volta
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hc);

  // Per ogni occhio: viewport + proiezione specifica
  for (var view of pose.views) {
    var vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);

    // view.projectionMatrix è già col-major Float32Array per quell'occhio
    // I vertici sono in view-space (camera-local) → solo proiezione, nessuna view matrix
    // Il quad "segue la testa" perché i vertici sono sempre davanti alla camera,
    // indipendentemente dalla rotazione — comportamento head-locked corretto.
    renderEye(view.projectionMatrix);
  }
}

function renderEye(projMatrix) {
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);

  // stride = 5 floats × 4 byte = 20
  gl.enableVertexAttribArray(locPos);
  gl.vertexAttribPointer(locPos, 3, gl.FLOAT, false, 20, 0);
  gl.enableVertexAttribArray(locUV);
  gl.vertexAttribPointer(locUV,  2, gl.FLOAT, false, 20, 12);

  gl.uniformMatrix4fv(locProj, false, projMatrix);
  gl.uniform1i(locTex, 0);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA); // pre-moltiplicato
  gl.disable(gl.DEPTH_TEST);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─────────────────────────────────────────────────────────
// HUD 2D — 512×128, solo bussola in alto + 4 abilità in basso
// ─────────────────────────────────────────────────────────
var PINK     = 'rgba(255,45,155,1)';
var PINK_DIM = 'rgba(255,45,155,0.55)';
var WHITE    = 'rgba(255,255,255,0.92)';

function drawHUD() {
  hx.clearRect(0, 0, HW, HH);
  drawCompass();
  drawAbilities();
  drawNotify();
}

// ── COMPASS ──────────────────────────────────────────────
function drawCompass() {
  var cx = HW / 2, y0 = 6;
  var trackW = 380;  // pixel visibili
  var tickPx = 3.2;  // pixel per grado
  var halfDeg = Math.ceil((trackW / 2) / tickPx) + 1;

  hx.save();
  hx.beginPath();
  hx.rect(cx - trackW/2, y0, trackW, 52);
  hx.clip();

  for (var d = Math.round(state.compassDeg) - halfDeg;
           d <= Math.round(state.compassDeg) + halfDeg; d++) {
    var nd  = ((d % 360) + 360) % 360;
    var xOf = (d - state.compassDeg) * tickPx;
    var x   = cx + xOf;
    var dist = Math.abs(xOf) / (trackW / 2);
    var al   = Math.max(0, 1 - dist * 1.35);
    if (al < 0.02) continue;

    var isCard = nd % 90  === 0;
    var isMaj  = nd % 45  === 0;
    var is15   = nd % 15  === 0;
    var is5    = nd % 5   === 0;

    var tickH = isCard ? 18 : isMaj ? 13 : is15 ? 9 : is5 ? 5 : 3;
    hx.strokeStyle = isCard ? `rgba(255,255,255,${al})`
                   : isMaj  ? `rgba(255,45,155,${al})`
                   :           `rgba(255,45,155,${al * 0.28})`;
    hx.lineWidth = isCard ? 2 : isMaj ? 1.3 : 0.7;
    hx.beginPath();
    hx.moveTo(x, y0 + 3);
    hx.lineTo(x, y0 + 3 + tickH);
    hx.stroke();

    if (isCard) {
      var lab = {0:'N', 90:'E', 180:'S', 270:'W'};
      hx.fillStyle = `rgba(255,255,255,${al})`;
      hx.font = `bold 11px "Courier New"`;
      hx.textAlign = 'center';
      hx.fillText(lab[nd] || '', x, y0 + 38);
    } else if (isMaj) {
      var diag = {45:'NE', 135:'SE', 225:'SW', 315:'NW'};
      if (diag[nd]) {
        hx.fillStyle = `rgba(255,45,155,${al * 0.8})`;
        hx.font = `8px "Courier New"`;
        hx.textAlign = 'center';
        hx.fillText(diag[nd], x, y0 + 35);
      }
    }
  }
  hx.restore();

  // Fade laterale
  var fade = hx.createLinearGradient(cx - trackW/2, 0, cx + trackW/2, 0);
  fade.addColorStop(0,    'rgba(0,0,0,1)');
  fade.addColorStop(0.08, 'rgba(0,0,0,0)');
  fade.addColorStop(0.92, 'rgba(0,0,0,0)');
  fade.addColorStop(1,    'rgba(0,0,0,1)');
  hx.fillStyle = fade;
  hx.fillRect(cx - trackW/2, y0, trackW, 52);

  // Triangolo centrale ▼
  hx.fillStyle = PINK;
  hx.beginPath();
  hx.moveTo(cx - 5, y0);
  hx.lineTo(cx + 5, y0);
  hx.lineTo(cx, y0 + 7);
  hx.closePath();
  hx.fill();

  // Linea verticale centrale
  hx.strokeStyle = PINK;
  hx.lineWidth = 1.5;
  hx.beginPath();
  hx.moveTo(cx, y0 + 7);
  hx.lineTo(cx, y0 + 22);
  hx.stroke();

  // Heading numerico
  var deg360 = ((Math.round(state.compassDeg) % 360) + 360) % 360;
  var cardArr = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                 'S','SSW','SW','WSW','W','WNW','NW','NNW'];
  var ci = Math.round(deg360 / 22.5) % 16;
  hx.fillStyle = PINK;
  hx.font = `bold 9px "Courier New"`;
  hx.textAlign = 'center';
  hx.fillText(cardArr[ci] + ' ' + deg360, cx, y0 + 50);
}

// ── ABILITÀ — 4 cerchi piccoli ────────────────────────────
function drawAbilities() {
  var r    = 15;
  var yc   = HH - 22;
  var cx   = HW / 2;
  // distanza tra i due gruppi (sinistra / destra)
  var gap  = 55;  // dal centro
  var sep  = 36;  // tra i due cerchi dello stesso gruppo

  var pos = [
    [cx - gap - sep, yc],
    [cx - gap,       yc],
    [cx + gap,       yc],
    [cx + gap + sep, yc],
  ];
  var icons = ['◆','▲','⬡','↑'];
  var keys  = ['L1','R1','L·R','R1'];

  for (var i = 0; i < 4; i++) {
    var ab    = state.abilities[i];
    var px    = pos[i][0], py = pos[i][1];
    var ready = ab.cd <= 0;

    // Cerchio sfondo
    hx.beginPath(); hx.arc(px, py, r, 0, Math.PI * 2);
    hx.fillStyle = ready ? 'rgba(255,45,155,0.07)' : 'rgba(0,0,0,0.4)';
    hx.fill();

    // Bordo
    hx.strokeStyle = ready ? PINK : 'rgba(255,45,155,0.22)';
    hx.lineWidth   = ready ? 1.5  : 1;
    hx.beginPath(); hx.arc(px, py, r, 0, Math.PI * 2);
    hx.stroke();

    if (!ready) {
      // Arco cooldown
      var pct = (ab.maxCd - ab.cd) / ab.maxCd;
      hx.strokeStyle = 'rgba(255,45,155,0.55)';
      hx.lineWidth   = 2.5;
      hx.beginPath();
      hx.arc(px, py, r - 1, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      hx.stroke();
      // Numero
      hx.fillStyle = 'rgba(255,45,155,0.9)';
      hx.font = `bold 10px "Courier New"`;
      hx.textAlign    = 'center';
      hx.textBaseline = 'middle';
      hx.fillText(Math.ceil(ab.cd) + 's', px, py);
      hx.textBaseline = 'alphabetic';
    } else {
      hx.fillStyle = PINK;
      hx.font = `12px "Courier New"`;
      hx.textAlign    = 'center';
      hx.textBaseline = 'middle';
      hx.fillText(icons[i], px, py);
      hx.textBaseline = 'alphabetic';
    }

    // Key hint
    hx.fillStyle = 'rgba(255,45,155,0.35)';
    hx.font = `7px "Courier New"`;
    hx.textAlign = 'center';
    hx.fillText(keys[i], px, py + r + 9);
  }
}

// ── NOTIFY ───────────────────────────────────────────────
function drawNotify() {
  if (state.notify.alpha <= 0) return;
  var a  = state.notify.alpha;
  var cx = HW / 2, cy = HH / 2 + 6;
  hx.font = `bold 9px "Courier New"`;
  var tw = hx.measureText(state.notify.text).width + 24;
  var th = 18;
  hx.fillStyle   = `rgba(0,0,0,${0.5 * a})`;
  hx.strokeStyle = `rgba(255,45,155,${a})`;
  hx.lineWidth   = 1;
  hx.beginPath();
  hx.rect(cx - tw/2, cy - th/2, tw, th);
  hx.fill(); hx.stroke();
  hx.fillStyle    = `rgba(255,45,155,${a})`;
  hx.textAlign    = 'center';
  hx.textBaseline = 'middle';
  hx.fillText(state.notify.text, cx, cy);
  hx.textBaseline = 'alphabetic';
}
</script>
</body>
</html>

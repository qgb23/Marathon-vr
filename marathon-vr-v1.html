<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARATHON // TAU CETI IV</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

    #hud {
      position:fixed; inset:0; z-index:5;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:radial-gradient(ellipse at center,#050f0a 0%,#000 70%);
      pointer-events:none;
    }
    #hud.hidden { display:none; }

    .title {
      font-size:clamp(32px,8vw,88px);
      font-weight:900; letter-spacing:0.25em;
      color:#00ff88;
      text-shadow:0 0 40px #00ff8880,0 0 80px #00ff8840;
      animation:flicker 4s infinite;
    }
    .sub { font-size:clamp(9px,1.8vw,13px); letter-spacing:0.5em; color:#ff4400; margin-top:6px; }
    .line { width:280px; height:1px; background:linear-gradient(90deg,transparent,#00ff88,transparent); margin:14px 0; }
    .grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:6px 28px; font-size:10px;
      letter-spacing:0.12em; color:#00ff8880;
      margin-bottom:28px; width:280px;
    }
    .grid span { color:#ff4400; }
    #hud::after {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.012) 2px,rgba(0,255,136,0.012) 4px);
      pointer-events:none;
    }

    /* Override VRButton default style to match Marathon UI */
    #VRButton {
      position:fixed !important;
      bottom:40px !important;
      left:50% !important;
      transform:translateX(-50%) !important;
      z-index:999 !important;
      background:transparent !important;
      border:1px solid #00ff88 !important;
      color:#00ff88 !important;
      font-family:'Courier New',monospace !important;
      font-size:13px !important;
      letter-spacing:0.35em !important;
      padding:14px 36px !important;
      cursor:pointer !important;
      border-radius:0 !important;
      width:auto !important;
    }
    #VRButton:hover {
      background:#00ff8820 !important;
      box-shadow:0 0 24px #00ff8860 !important;
    }

    @keyframes flicker { 0%,93%,95%,100%{opacity:1} 94%{opacity:0.6} }
    canvas { display:block; }
  </style>
</head>
<body>

<div id="hud">
  <div class="title">MARATHON</div>
  <div class="sub">// TAU CETI IV — SECTOR 7 //</div>
  <div class="line"></div>
  <div class="grid">
    <div>RUNNER</div><div><span>ACTIVE</span></div>
    <div>PLANET</div><div><span>TAU CETI IV</span></div>
    <div>BIOME</div><div><span>COLONY RUINS</span></div>
    <div>HAND TRACK</div><div><span>ENABLED</span></div>
    <div>MODE</div><div><span>IMMERSIVE VR</span></div>
    <div>BUILD</div><div><span>v4.2.0</span></div>
  </div>
  <div class="line"></div>
</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.150.1';
import { VRButton } from 'https://esm.sh/three@0.150.1/examples/jsm/webxr/VRButton.js';
import { XRHandModelFactory } from 'https://esm.sh/three@0.150.1/examples/jsm/webxr/XRHandModelFactory.js';

// ── RENDERER ────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x000d06, 1);

// Native VRButton — Quest Browser handles everything natively
const vrBtn = VRButton.createButton(renderer);
vrBtn.id = 'VRButton';
document.body.appendChild(vrBtn);

renderer.xr.addEventListener('sessionstart', () => {
  document.getElementById('hud').classList.add('hidden');
});
renderer.xr.addEventListener('sessionend', () => {
  document.getElementById('hud').classList.remove('hidden');
});

// ── SCENE ───────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000d06, 0.035);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 3);
scene.add(camera);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── LIGHTS ───────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1a0f, 0.8));
const gLight = new THREE.PointLight(0x00ff88, 2, 15);
gLight.position.set(-3, 3, -4); scene.add(gLight);
const oLight = new THREE.PointLight(0xff4400, 1.5, 12);
oLight.position.set(3, 2, -3); scene.add(oLight);
const tLight = new THREE.PointLight(0x00ffaa, 1, 20);
tLight.position.set(0, 7, -4); scene.add(tLight);

// ── FLOOR ────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30, 15, 15);
const floorMat = new THREE.MeshStandardMaterial({ color:0x0a1a0f, roughness:0.95, metalness:0.1 });
const fp = floorGeo.attributes.position;
for(let i=0;i<fp.count;i++) fp.setY(i, Math.sin(fp.getX(i)*0.7)*Math.cos(fp.getZ(i)*0.7)*0.04);
fp.needsUpdate=true; floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2; floor.receiveShadow=true; scene.add(floor);
scene.add(new THREE.GridHelper(30,30,0xff440025,0x00ff4412));

// ── MATERIALS ────────────────────────────────
const wallMat   = new THREE.MeshStandardMaterial({ color:0x0d1f12, roughness:0.9, metalness:0.3 });
const accentMat = new THREE.MeshStandardMaterial({ color:0xff4400, emissive:new THREE.Color(0xff4400), emissiveIntensity:0.7 });
const greenMat  = new THREE.MeshStandardMaterial({ color:0x00ff88, emissive:new THREE.Color(0x00ff88), emissiveIntensity:0.5 });

// ── BACK WALL ────────────────────────────────
const bw = new THREE.Mesh(new THREE.BoxGeometry(16,8,0.3), wallMat);
bw.position.set(0,4,-7); bw.castShadow=true; scene.add(bw);
const s1 = new THREE.Mesh(new THREE.BoxGeometry(16,0.12,0.35), accentMat);
s1.position.set(0,1.4,-7); scene.add(s1);
const s2 = new THREE.Mesh(new THREE.BoxGeometry(16,0.06,0.35), greenMat);
s2.position.set(0,2.2,-7); scene.add(s2);

// ── PILLARS ──────────────────────────────────
[[-4,-5],[4,-5],[-4,1],[4,1]].forEach(([x,z],i)=>{
  const p = new THREE.Mesh(new THREE.BoxGeometry(0.45,7,0.45), wallMat);
  p.position.set(x,3.5,z); p.castShadow=true; scene.add(p);
  const mat = i%2===0 ? accentMat : greenMat;
  [1.3, 6.5].forEach(y=>{
    const r = new THREE.Mesh(new THREE.TorusGeometry(0.35,0.035,8,16), mat);
    r.position.set(x,y,z); r.rotation.x=Math.PI/2; scene.add(r);
  });
});

// Side walls
[-7,4].forEach(z=>{
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.3,6,5), wallMat);
  w.position.set(-6,3,z); w.castShadow=true; scene.add(w);
});

// Ceiling beams
for(let x=-5;x<=5;x+=4){
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.18,14), wallMat);
  b.position.set(x,7.4,-2); scene.add(b);
}

// Hazard floor markings
const hazMat = new THREE.MeshStandardMaterial({ color:0xffcc00, emissive:new THREE.Color(0xffcc00), emissiveIntensity:0.5 });
for(let i=-3;i<=3;i++){
  const d = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.005,0.55), hazMat);
  d.position.set(i*0.38,0.004,-2); d.rotation.y=Math.PI/4; scene.add(d);
}

// Debris blocks
[[3,-4,1.5],[-4,-3,1],[5.5,0.5,0.8],[-5.5,-1,1.2]].forEach(([x,z,h])=>{
  const d = new THREE.Mesh(new THREE.BoxGeometry(0.35+Math.random()*0.25,h,0.35+Math.random()*0.25), wallMat);
  d.position.set(x,h/2,z); d.rotation.y=Math.random()*Math.PI; d.castShadow=true; scene.add(d);
});

// ── HOLO PANELS ──────────────────────────────
function makePanel(w,h,color){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(w,h),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.07,side:THREE.DoubleSide})));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w,h,0.001)),
    new THREE.LineBasicMaterial({color,transparent:true,opacity:0.8})));
  [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sy])=>{
    g.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(sx*w/2,sy*h/2,0),
        new THREE.Vector3(sx*(w/2-0.07),sy*h/2,0),
        new THREE.Vector3(sx*w/2,sy*(h/2-0.07),0)
      ]),
      new THREE.LineBasicMaterial({color})
    ));
  });
  return g;
}
const panels=[];
const pL=makePanel(0.55,0.38,0x00ff88); pL.position.set(-1.4,1.5,-2); pL.rotation.y=0.3; scene.add(pL); panels.push(pL);
const pR=makePanel(0.45,0.45,0xff4400); pR.position.set(1.4,1.5,-2);  pR.rotation.y=-0.3; scene.add(pR); panels.push(pR);
const pT=makePanel(1.1,0.09,0x00ff88);  pT.position.set(0,2.15,-2.1); scene.add(pT); panels.push(pT);

// ── PARTICLES ────────────────────────────────
const N=900, pGeo=new THREE.BufferGeometry();
const pp=new Float32Array(N*3), pb=new Float32Array(N*3), pc=new Float32Array(N*3);
for(let i=0;i<N;i++){
  const x=(Math.random()-0.5)*18, y=Math.random()*7, z=(Math.random()-0.5)*18;
  pp[i*3]=pb[i*3]=x; pp[i*3+1]=pb[i*3+1]=y; pp[i*3+2]=pb[i*3+2]=z;
  if(Math.random()>0.85){pc[i*3]=1;pc[i*3+1]=0.27;pc[i*3+2]=0;}
  else{pc[i*3]=0;pc[i*3+1]=1;pc[i*3+2]=0.53;}
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pc,3));
const ptsMesh=new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.013,vertexColors:true,transparent:true,opacity:0.7}));
scene.add(ptsMesh);

// ── HAND TRACKING (Vision Pro style) ─────────
const handFactory = new XRHandModelFactory();

const hand1 = renderer.xr.getHand(0);
const hand2 = renderer.xr.getHand(1);

// 'spheres' renders a sphere per joint — closest to Vision Pro passthrough style
hand1.add(handFactory.createHandModel(hand1, 'spheres'));
hand2.add(handFactory.createHandModel(hand2, 'spheres'));

scene.add(hand1);
scene.add(hand2);

// Override sphere material to skin tone after model loads
[hand1, hand2].forEach(hand=>{
  hand.addEventListener('connected', ()=>{
    hand.traverse(obj=>{
      if(obj.isMesh){
        obj.material = new THREE.MeshStandardMaterial({
          color:0xf5c0a0, roughness:0.45, metalness:0.05,
          transparent:true, opacity:0.9
        });
      }
    });
  });
});

// ── ANIMATION LOOP ───────────────────────────
const clock = new THREE.Clock();

renderer.setAnimationLoop(()=>{
  const t = clock.getElapsedTime();

  // Drift particles
  const pa = ptsMesh.geometry.attributes.position;
  for(let i=0;i<N;i++) pa.setY(i, pb[i*3+1]+Math.sin(t*0.25+i*0.08)*0.12);
  pa.needsUpdate=true;
  ptsMesh.rotation.y=t*0.004;

  // Pulse holo panels
  panels.forEach((p,i)=>{
    const pulse=0.82+Math.sin(t*1.1+i*2)*0.18;
    p.children.forEach(c=>{ if(c.material?.opacity!==undefined && c.material.opacity<0.5) c.material.opacity=0.07*pulse; });
    p.position.y+=Math.sin(t*0.35+i)*0.00015;
  });

  // Breathe lights
  gLight.intensity=1.8+Math.sin(t*0.7)*0.4;
  oLight.intensity=1.3+Math.sin(t*1.1+1)*0.3;

  renderer.render(scene, camera);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Test Grid — Meta Quest 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap');

  :root {
    --green: #00ff88;
    --amber: #ffaa00;
    --red: #ff4455;
    --dim: #1a1a1a;
    --panel: rgba(10,10,10,0.82);
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HUD Controls ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.9);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    backdrop-filter: blur(12px);
  }

  .hud-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .hud-sep { width: 1px; height: 28px; background: var(--border); }

  .hud-ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hud-ctrl label {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .hud-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    min-width: 36px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 110px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
  }

  select {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  select:hover { border-color: #555; }

  /* ── Status pill ── */
  #status-pill {
    margin-left: auto;
    padding: 5px 14px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    transition: background 0.3s, color 0.3s;
    white-space: nowrap;
  }
  .pill-ok   { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .pill-warn { background: rgba(255,170,0,0.15); color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
  .pill-bad  { background: rgba(255,68,85,0.15);  color: var(--red);   border: 1px solid rgba(255,68,85,0.3); }

  /* ── Canvas ── */
  #main-canvas {
    display: block;
    width: 100vw;
    height: calc(100vh - 56px);
    margin-top: 56px;
    cursor: crosshair;
  }

  /* ── Info overlay bottom ── */
  #info-overlay {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    display: flex;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #666;
    backdrop-filter: blur(8px);
    pointer-events: none;
    white-space: nowrap;
    flex-wrap: wrap;
    justify-content: center;
  }
  .info-item span { color: #fff; }

  /* ── Crosshair cursor indicator ── */
  #coords-tip {
    position: fixed;
    padding: 4px 8px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--green);
    pointer-events: none;
    display: none;
    z-index: 200;
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo">VR·TEST·GRID</div>
  <div class="hud-sep"></div>

  <div class="hud-ctrl">
    <label>Dist. occhi</label>
    <input type="range" id="dist" min="5" max="80" value="30" step="1">
    <span class="hud-val" id="dist-out">30 cm</span>
  </div>

  <div class="hud-ctrl">
    <label>Headset</label>
    <select id="ppd">
      <option value="25">Quest 3 — 25 ppd</option>
      <option value="20">Quest 2 — 20 ppd</option>
      <option value="35">Quest Pro — 35 ppd</option>
      <option value="40">Custom — 40 ppd</option>
    </select>
  </div>

  <div class="hud-ctrl">
    <label>Modalità</label>
    <select id="mode">
      <option value="grid">Griglia coord</option>
      <option value="text">Test testi</option>
      <option value="patterns">Pattern visivi</option>
      <option value="all">Tutto insieme</option>
    </select>
  </div>

  <div class="hud-ctrl">
    <label>Griglia</label>
    <select id="gridtype">
      <option value="deg">Gradi (°)</option>
      <option value="cm">Centimetri fisici</option>
      <option value="px">Pixel canvas</option>
    </select>
  </div>

  <div id="status-pill" class="pill-ok">NITIDEZZA OTTIMA</div>
</div>

<!-- Canvas principale -->
<canvas id="main-canvas"></canvas>

<!-- Info bottom -->
<div id="info-overlay">
  <div class="info-item">mm/px: <span id="i-mmpx">—</span></div>
  <div class="info-item">°/px: <span id="i-angpx">—</span></div>
  <div class="info-item">Indice pixel: <span id="i-pi">—</span></div>
  <div class="info-item">FOV larghezza: <span id="i-fov">—</span></div>
  <div class="info-item">Min font leggibile: <span id="i-minfont">—</span></div>
</div>

<!-- Tooltip coordinate mouse -->
<div id="coords-tip"></div>

<script>
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');
const tip    = document.getElementById('coords-tip');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight - 56;
  draw();
}
window.addEventListener('resize', resize);

// ── Controls ──────────────────────────────────────────────────
const distEl    = document.getElementById('dist');
const distOut   = document.getElementById('dist-out');
const ppdEl     = document.getElementById('ppd');
const modeEl    = document.getElementById('mode');
const gridEl    = document.getElementById('gridtype');
const statusPill = document.getElementById('status-pill');

function getParams() {
  const dist = parseInt(distEl.value);
  const ppd  = parseInt(ppdEl.value);
  const FOV_H = 110, FOV_V = 90;

  const physWidthMM  = 2 * dist * 10 * Math.tan(FOV_H * Math.PI / 360);
  const physHeightMM = 2 * dist * 10 * Math.tan(FOV_V * Math.PI / 360);
  const mmPerPxW = physWidthMM / W;
  const mmPerPxH = physHeightMM / H;
  const mmPerPx  = (mmPerPxW + mmPerPxH) / 2;

  const angPxDeg = Math.atan2(mmPerPxW, dist * 10) * 180 / Math.PI;
  const angularPxSize = 1 / ppd;
  const pixelationIndex = angPxDeg / angularPxSize;

  const sharpness = Math.max(0, Math.min(1, 1 - (pixelationIndex - 0.45) / 0.7));
  const minFont   = Math.max(6, Math.round(10 / (ppd / 25) * (30 / dist)));

  return { dist, ppd, FOV_H, FOV_V, physWidthMM, physHeightMM, mmPerPx, angPxDeg, pixelationIndex, sharpness, minFont };
}

function updateHUD(p) {
  distOut.textContent = p.dist + ' cm';
  document.getElementById('i-mmpx').textContent    = p.mmPerPx.toFixed(2);
  document.getElementById('i-angpx').textContent   = p.angPxDeg.toFixed(3) + '°';
  document.getElementById('i-pi').textContent      = p.pixelationIndex.toFixed(2);
  document.getElementById('i-fov').textContent     = Math.round(p.physWidthMM / 10) + ' cm';
  document.getElementById('i-minfont').textContent = p.minFont + 'px';

  if (p.sharpness > 0.7) {
    statusPill.textContent = 'NITIDEZZA OTTIMA';
    statusPill.className   = 'pill-ok';
  } else if (p.sharpness > 0.4) {
    statusPill.textContent = 'LEGGERO PIXELAMENTO';
    statusPill.className   = 'pill-warn';
  } else {
    statusPill.textContent = 'TROPPO VICINO — PIXEL VISIBILI';
    statusPill.className   = 'pill-bad';
  }
}

// ── Drawing ───────────────────────────────────────────────────
function draw() {
  const p    = getParams();
  const mode = modeEl.value;

  ctx.clearRect(0, 0, W, H);

  // Background scanlines for depth
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, W, H);
  for (let y = 0; y < H; y += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, y, W, 2);
  }

  if (mode === 'grid'     || mode === 'all') drawGrid(p);
  if (mode === 'text'     || mode === 'all') drawTextTest(p);
  if (mode === 'patterns' || mode === 'all') drawPatterns(p);

  drawCrosshair(p);
  drawSharpnessVignette(p);
  drawCornerInfo(p);

  updateHUD(p);
}

// ── Grid ──────────────────────────────────────────────────────
function drawGrid(p) {
  const gtype = gridEl.value;
  const COLS = 16, ROWS = 10;
  const cw = W / COLS, ch = H / ROWS;

  // sub-grid
  ctx.strokeStyle = 'rgba(0,80,0,0.25)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS * 4; x++) { ctx.beginPath(); ctx.moveTo(x * W / (COLS*4), 0); ctx.lineTo(x * W / (COLS*4), H); ctx.stroke(); }
  for (let y = 0; y <= ROWS * 4; y++) { ctx.beginPath(); ctx.moveTo(0, y * H / (ROWS*4)); ctx.lineTo(W, y * H / (ROWS*4)); ctx.stroke(); }

  // main grid
  ctx.strokeStyle = 'rgba(0,180,60,0.5)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * cw, 0); ctx.lineTo(x * cw, H); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * ch); ctx.lineTo(W, y * ch); ctx.stroke(); }

  // labels
  ctx.fillStyle = '#00cc55';
  ctx.font = '11px JetBrains Mono, monospace';
  for (let x = 0; x <= COLS; x++) {
    for (let y = 0; y <= ROWS; y++) {
      let lbl = '';
      if (gtype === 'deg') {
        const dx = Math.round((x - COLS/2) * (p.FOV_H / COLS));
        const dy = Math.round((y - ROWS/2) * (p.FOV_V / ROWS));
        lbl = `${dx}°,${dy}°`;
      } else if (gtype === 'cm') {
        const cx2 = ((x - COLS/2) * (p.physWidthMM / COLS) / 10).toFixed(1);
        const cy2 = ((y - ROWS/2) * (p.physHeightMM / ROWS) / 10).toFixed(1);
        lbl = `${cx2},${cy2}`;
      } else {
        lbl = `${Math.round(x*cw)},${Math.round(y*ch)}`;
      }
      if (x < COLS && y < ROWS) {
        ctx.globalAlpha = 0.6;
        ctx.fillText(lbl, x * cw + 3, y * ch + 13);
        ctx.globalAlpha = 1;
      }
    }
  }

  // diagonal rulers
  ctx.strokeStyle = 'rgba(0,255,136,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(0,H); ctx.stroke();
  ctx.setLineDash([]);

  // concentric circles
  const maxR = Math.min(W, H) * 0.48;
  for (let r = maxR/6; r <= maxR; r += maxR/6) {
    ctx.beginPath();
    ctx.arc(W/2, H/2, r, 0, Math.PI*2);
    const deg = Math.round(r / (W/2) * (p.FOV_H/2));
    ctx.strokeStyle = `rgba(0,200,80,0.15)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,200,80,0.5)';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillText(`r=${deg}°`, W/2 + r + 4, H/2);
  }
}

// ── Crosshair ─────────────────────────────────────────────────
function drawCrosshair(p) {
  const cx = W/2, cy = H/2;

  ctx.strokeStyle = '#ff3344';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

  // gaze circle
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, 8 + i*16, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,50,68,${0.6 - i*0.18})`;
    ctx.lineWidth = i===0 ? 2 : 1;
    ctx.stroke();
  }

  ctx.fillStyle = '#ff3344';
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#ff3344';
  ctx.font = '600 11px Space Grotesk, sans-serif';
  ctx.fillText('0°, 0° — CENTRO', cx + 14, cy - 10);
}

// ── Text Tests ────────────────────────────────────────────────
function drawTextTest(p) {
  const mode = modeEl.value;
  const offsetX = mode === 'all' ? 30 : W * 0.08;
  const offsetY = mode === 'all' ? 80 : H * 0.12;

  const sizes = [6, 8, 10, 12, 14, 18, 24, 32, 48, 64];
  let y = offsetY;

  // Panel background
  const panelW = mode === 'all' ? W * 0.38 : W * 0.6;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(offsetX - 10, offsetY - 20, panelW, H * 0.75);

  ctx.font = '600 11px JetBrains Mono, monospace';
  ctx.fillStyle = '#555';
  ctx.fillText('── TEST LEGGIBILITÀ TESTO ──', offsetX, y - 6);

  sizes.forEach(sz => {
    if (y > H - 40) return;
    const readable = sz >= p.minFont;
    const col = readable ? '#00ff88' : '#ff4455';
    ctx.fillStyle = col;
    ctx.font = `${sz}px Space Grotesk, sans-serif`;

    const sample = `${sz}px — AaBbCc 0123 Il testo è nitido?`;
    ctx.fillText(sample.substring(0, Math.floor(panelW / (sz * 0.6))), offsetX, y + sz * 0.8);
    y += sz + Math.max(6, sz * 0.3);
  });

  ctx.font = '11px JetBrains Mono, monospace';
  ctx.fillStyle = '#444';
  ctx.fillText(`VERDE ≥ ${p.minFont}px leggibile  ·  ROSSO troppo piccolo`, offsetX, Math.min(y + 14, H - 16));
}

// ── Patterns ──────────────────────────────────────────────────
function drawPatterns(p) {
  const mode   = modeEl.value;
  const startX = mode === 'all' ? W * 0.42 : W * 0.06;
  const startY = mode === 'all' ? H * 0.55 : H * 0.08;
  const bsz    = mode === 'all' ? 72 : 100;
  const gap    = mode === 'all' ? 20 : 30;
  const cols   = mode === 'all' ? 4 : 6;

  const patterns = [
    { label: 'Bordi netti', fn: (x,y,s) => {
      for(let i=0;i<10;i++){
        ctx.fillStyle = i%2===0?'#fff':'#000';
        ctx.fillRect(x+i*(s/10),y,s/10,s);
      }
    }},
    { label: 'Sfumatura', fn: (x,y,s) => {
      const g = ctx.createLinearGradient(x,y,x+s,y);
      g.addColorStop(0,'#000'); g.addColorStop(0.5,'#888'); g.addColorStop(1,'#fff');
      ctx.fillStyle=g; ctx.fillRect(x,y,s,s);
    }},
    { label: 'Checker', fn: (x,y,s) => {
      const n=8;
      for(let r=0;r<n;r++) for(let c=0;c<n;c++){
        ctx.fillStyle=(r+c)%2===0?'#fff':'#111';
        ctx.fillRect(x+c*(s/n),y+r*(s/n),s/n,s/n);
      }
    }},
    { label: 'Cerchi', fn: (x,y,s) => {
      ctx.fillStyle='#000'; ctx.fillRect(x,y,s,s);
      for(let r=s*0.48;r>2;r-=s/12){
        ctx.beginPath(); ctx.arc(x+s/2,y+s/2,r,0,Math.PI*2);
        ctx.strokeStyle=r%(s/6)<s/12?'#fff':'#333'; ctx.lineWidth=1; ctx.stroke();
      }
    }},
    { label: 'Testo micro', fn: (x,y,s) => {
      ctx.fillStyle='#000'; ctx.fillRect(x,y,s,s);
      [6,8,10,12,14].forEach((fs,i)=>{
        ctx.fillStyle= fs>=p.minFont?'#0f0':'#f44';
        ctx.font=`${fs}px monospace`;
        ctx.fillText('Aa Bb 01',x+3,y+10+i*18);
      });
    }},
    { label: 'Colori RGB', fn: (x,y,s) => {
      const cols2=['#ff2020','#20ff60','#2060ff','#ffee00','#ff20cc','#20eeff'];
      cols2.forEach((cl,i)=>{
        ctx.fillStyle=cl;
        ctx.fillRect(x+(i%3)*(s/3),y+Math.floor(i/3)*(s/2),s/3,s/2);
      });
    }},
    { label: 'Griglia fine', fn: (x,y,s) => {
      ctx.fillStyle='#000'; ctx.fillRect(x,y,s,s);
      for(let i=0;i<s;i+=3){
        ctx.fillStyle='#fff'; ctx.fillRect(x+i,y,1,s);
        ctx.fillRect(x,y+i,s,1);
      }
    }},
    { label: 'Rumore', fn: (x,y,s) => {
      const id = ctx.createImageData(s,s);
      for(let i=0;i<id.data.length;i+=4){
        const v=Math.random()*255|0;
        id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=255;
      }
      ctx.putImageData(id,x,y);
    }},
  ];

  const label_y_off = bsz + 16;
  patterns.forEach((p2,i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const px  = startX + col * (bsz + gap);
    const py  = startY + row * (bsz + gap + 18);
    if (py + bsz + 30 > H) return;

    // frame
    ctx.fillStyle = '#0d0d0d';
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.fillRect(px-2, py-2, bsz+4, bsz+4);
    ctx.strokeRect(px-2, py-2, bsz+4, bsz+4);

    p2.fn(px, py, bsz);

    ctx.fillStyle = '#777';
    ctx.font = '11px Space Grotesk, sans-serif';
    ctx.fillText(p2.label, px, py + label_y_off);
  });

  if (mode !== 'all') {
    ctx.fillStyle = '#333';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText(`── PATTERN VISIVI — dist. ${p.dist}cm ──`, startX, startY - 14);
  }
}

// ── Sharpness vignette ────────────────────────────────────────
function drawSharpnessVignette(p) {
  if (p.sharpness > 0.75) return;
  const alpha = (1 - p.sharpness) * 0.35;
  const col   = p.sharpness > 0.4 ? `rgba(255,140,0,${alpha})` : `rgba(255,40,60,${alpha})`;
  const grad  = ctx.createRadialGradient(W/2,H/2,H*0.25, W/2,H/2,H*0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, col);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── Corner info panel ─────────────────────────────────────────
function drawCornerInfo(p) {
  const x = W - 10, y = 10;
  const lines = [
    `dist: ${p.dist} cm`,
    `ppd:  ${p.ppd}`,
    `idx:  ${p.pixelationIndex.toFixed(2)}`,
    `shr:  ${Math.round(p.sharpness*100)}%`,
    `fnt:  ≥${p.minFont}px`,
  ];
  const lh = 16, pw = 130, ph = lines.length * lh + 12;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x - pw - 2, y, pw, ph);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - pw - 2, y, pw, ph);
  ctx.font = '11px JetBrains Mono, monospace';
  lines.forEach((l, i) => {
    ctx.fillStyle = i===0?'#00ff88':'#555';
    ctx.fillText(l, x - pw + 6, y + 14 + i * lh);
  });
}

// ── Mouse coordinate tooltip ──────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const p = getParams();
  const rx = e.clientX / W;
  const ry = (e.clientY - 56) / H;
  const degX = ((rx - 0.5) * p.FOV_H).toFixed(1);
  const degY = ((ry - 0.5) * p.FOV_V).toFixed(1);
  const cmX  = ((rx - 0.5) * p.physWidthMM  / 10).toFixed(1);
  const cmY  = ((ry - 0.5) * p.physHeightMM / 10).toFixed(1);
  tip.style.display = 'block';
  tip.style.left    = (e.clientX + 14) + 'px';
  tip.style.top     = (e.clientY + 8)  + 'px';
  tip.textContent   = `${degX}°, ${degY}° | ${cmX}cm, ${cmY}cm`;
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// ── Event listeners ───────────────────────────────────────────
distEl.addEventListener('input',  draw);
ppdEl.addEventListener('change',  draw);
modeEl.addEventListener('change', draw);
gridEl.addEventListener('change', draw);

// ── Init ──────────────────────────────────────────────────────
resize();
</script>
</body>
</html>

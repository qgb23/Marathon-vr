<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathon — Destroyer Helmet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas#glcanvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
#boot {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity 0.8s;
}
.b-sub  { font-size:10px; letter-spacing:4px; color:#00e8ff; margin-bottom:24px; opacity:0; animation:fi 0.4s 0.4s forwards; }
.b-title{ font-size:32px; letter-spacing:10px; color:#ff2afc; margin-bottom:44px; opacity:0; animation:fi 0.4s 0.9s forwards; }
.b-lines{ display:flex; flex-direction:column; align-items:flex-start; }
.b-line { font-size:10px; letter-spacing:2px; color:#00e8ff; margin:5px 0; display:flex; align-items:center; gap:8px; opacity:0; }
.b-line:nth-child(1){animation:fi 0.3s 1.4s forwards;}
.b-line:nth-child(2){animation:fi 0.3s 1.8s forwards;}
.b-line:nth-child(3){animation:fi 0.3s 2.2s forwards;}
.b-line:nth-child(4){animation:fi 0.3s 2.6s forwards;}
.b-line:nth-child(5){animation:fi 0.3s 3.0s forwards;}
.b-dot  { width:5px; height:5px; border-radius:50%; background:#ff2afc; flex-shrink:0; }
.b-bwrap{ width:280px; height:2px; background:#1a001a; margin-top:36px; opacity:0; animation:fi 0.3s 3.2s forwards; }
.b-bar  { height:100%; width:0; background:#ff2afc; animation:lb 1s 3.4s forwards; }
.b-ready{ font-size:10px; letter-spacing:5px; color:#ff2afc; margin-top:16px; opacity:0; animation:fi 0.5s 4.5s forwards; }
.b-ver  { font-size:9px; letter-spacing:3px; color:rgba(0,232,255,0.4); margin-top:10px; opacity:0; animation:fi 0.3s 4.7s forwards; }
@keyframes fi { to{opacity:1;} }
@keyframes lb { to{width:100%;} }
#enterbtn {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:transparent; border:1px solid #ff2afc;
  color:#ff2afc; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:3px; padding:12px 32px;
  cursor:pointer; z-index:200; display:none;
}
#enterbtn:disabled { opacity:0.4; cursor:default; }
#dbg {
  position:fixed; bottom:16px; right:16px;
  font-size:9px; color:rgba(0,232,255,0.5);
  letter-spacing:1px; line-height:2;
  z-index:200; text-align:right; display:none;
}
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>

<div id="boot">
  <div class="b-sub">BUNGIE // MARATHON SYSTEMS</div>
  <div class="b-title">DESTROYER</div>
  <div class="b-lines">
    <div class="b-line"><div class="b-dot"></div>NEURAL LINK............OK</div>
    <div class="b-line"><div class="b-dot"></div>SHIELD ARRAY...........OK</div>
    <div class="b-line"><div class="b-dot"></div>SENSOR SUITE...........OK</div>
    <div class="b-line"><div class="b-dot"></div>HAND TRACKING..........OK</div>
    <div class="b-line"><div class="b-dot"></div>HUD CALIBRATING.......</div>
  </div>
  <div class="b-bwrap"><div class="b-bar"></div></div>
  <div class="b-ready">SYSTEM READY</div>
  <div class="b-ver">v1.0.0</div>
</div>

<button id="enterbtn">ENTRA IN VR</button>
<div id="dbg">
  <div id="d-l">SX: —</div>
  <div id="d-r">DX: —</div>
  <div id="d-a">ABILITÀ: OFF</div>
  <div id="d-m">—</div>
</div>

<script>
// ============================================================
// HUD 2D CANVAS  (1280×720 — aspect 16:9)
// ============================================================
const HW = 1280, HH = 720;
const hud2d = document.createElement('canvas');
hud2d.width = HW; hud2d.height = HH;
const ctx = hud2d.getContext('2d');

let heading     = 90;
let abilityAlpha = 0;
let abilityOn   = false;

// ---- helpers ----
function hdgLabel(d) {
  d=((d%360)+360)%360;
  if(d<22)return'N'; if(d<67)return'NE'; if(d<112)return'E';
  if(d<157)return'SE'; if(d<202)return'S'; if(d<247)return'SO';
  if(d<292)return'O'; return'NO';
}

const DIRS = [[0,'N'],[45,'NE'],[90,'E'],[135,'SE'],[180,'S'],[225,'SO'],[270,'O'],[315,'NO']];

// ---- COMPASS ----
function drawCompass(deg) {
  const cx = HW/2, cy = 80; // lowered from 38 → 80
  const trackW = 320;

  ctx.save();
  ctx.beginPath(); ctx.rect(cx-trackW/2, cy-22, trackW, 40); ctx.clip();

  for(let d=-540; d<=540; d+=22.5) {
    const norm = ((d%360)+360)%360;
    const isMaj = (norm%45===0);
    const delta = d - deg;
    if(Math.abs(delta)>220) continue;
    const x = cx + delta*(trackW/180);
    const label = DIRS.find(e=>e[0]===norm);
    ctx.globalAlpha = isMaj ? 0.95 : 0.3;
    ctx.strokeStyle = '#00e8ff'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, cy-(isMaj?11:5));
    ctx.lineTo(x, cy+2);
    ctx.stroke();
    if(label) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#00e8ff';
      ctx.font = 'bold 13px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(label[1], x, cy-15);
    }
  }
  ctx.restore();

  // needle
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#ff2afc'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy-22); ctx.lineTo(cx, cy+4); ctx.stroke();

  // notch triangle
  ctx.fillStyle = '#ff2afc';
  ctx.beginPath(); ctx.moveTo(cx-5,cy+4); ctx.lineTo(cx+5,cy+4); ctx.lineTo(cx,cy+11); ctx.closePath(); ctx.fill();

  // heading text
  ctx.fillStyle = '#ff2afc'; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(hdgLabel(deg), cx, cy+27);
  ctx.fillStyle = '#00e8ff'; ctx.font = '10px Courier New';
  ctx.fillText(String(Math.round(deg)).padStart(3,'0')+'°', cx, cy+41);
}

// ---- ABILITY OVERLAY ----
function drawAbility(alpha) {
  if(alpha<=0.01) return;
  const MC = '#ff2afc';
  ctx.globalAlpha = alpha;

  // tint
  ctx.fillStyle = 'rgba(255,20,180,0.07)';
  ctx.fillRect(0,0,HW,HH);

  // scanlines
  ctx.fillStyle = 'rgba(255,20,180,0.022)';
  for(let y=0;y<HH;y+=4) ctx.fillRect(0,y,HW,1);

  ctx.strokeStyle = MC; ctx.lineWidth = 1.5;

  // left frame
  ctx.setLineDash([8,5]);
  ctx.strokeRect(4,4,88,HH-8);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(4,95); ctx.lineTo(30,95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,HH-95); ctx.lineTo(30,HH-95); ctx.stroke();

  // right frame
  ctx.setLineDash([8,5]);
  ctx.strokeRect(HW-92,4,88,HH-8);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(HW-4,95); ctx.lineTo(HW-30,95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HW-4,HH-95); ctx.lineTo(HW-30,HH-95); ctx.stroke();

  // pixel crosses
  function pcross(x,y,a){
    ctx.globalAlpha=alpha*a; ctx.fillStyle=MC;
    ctx.fillRect(x-6,y-2,12,4); ctx.fillRect(x-2,y-6,4,12);
  }
  pcross(46,HH/2-32,0.9); pcross(46,HH/2+32,0.5);
  pcross(HW-46,HH/2-32,0.9); pcross(HW-46,HH/2+32,0.5);
  ctx.globalAlpha = alpha;

  // ---- center top HUD ----
  const midX=HW/2, topY=160;

  function drawCircle(cx,cy){
    ctx.strokeStyle=MC; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+10,cy); ctx.lineTo(cx+6,cy); ctx.stroke();
  }
  drawCircle(midX-102,topY); drawCircle(midX-78,topY);
  drawCircle(midX+78,topY);  drawCircle(midX+102,topY);

  // seg bars
  function drawSegs(x,y,total,on,dim){
    for(let i=0;i<total;i++){
      const sx=x+i*19;
      ctx.strokeStyle=i<on?'#ffee00':MC; ctx.lineWidth=1;
      ctx.strokeRect(sx,y,17,9);
      if(i<on){ctx.fillStyle='#ffee00'; ctx.fillRect(sx+1,y+1,15,7);}
      else if(i<on+dim){ctx.fillStyle='rgba(255,238,0,0.3)'; ctx.fillRect(sx+1,y+1,15,7);}
    }
  }
  const bY=topY-6;
  drawSegs(midX-122,bY,9,7,0);
  drawSegs(midX+14,bY,9,6,1);

  // dividers + label
  ctx.strokeStyle=MC; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(midX-8,bY); ctx.lineTo(midX-8,bY+13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX+8,bY); ctx.lineTo(midX+8,bY+13); ctx.stroke();
  ctx.fillStyle=MC; ctx.font='9px Courier New'; ctx.textAlign='center';
  ctx.fillText('01',midX,bY+11);

  // center segs
  drawSegs(midX-28,topY+8,3,3,0);

  // dot row
  for(let i=-3;i<=3;i++){
    ctx.globalAlpha=alpha*(i===0?1:0.5);
    ctx.fillStyle=MC;
    const sz=i===0?4:3;
    ctx.fillRect(midX+i*8-sz/2,topY+22,sz,sz);
  }
  ctx.globalAlpha=alpha;

  // crosshairs
  function xhair(cx,cy){
    const s=32; ctx.strokeStyle=MC;
    ctx.lineWidth=2;
    ctx.strokeRect(cx-s,cy-s,15,15); ctx.strokeRect(cx+s-15,cy-s,15,15);
    ctx.strokeRect(cx-s,cy+s-15,15,15); ctx.strokeRect(cx+s-15,cy+s-15,15,15);
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy-s+5); ctx.lineTo(cx,cy-s/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy+s/2); ctx.lineTo(cx,cy+s-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-s+5,cy); ctx.lineTo(cx-s/2,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s/2,cy); ctx.lineTo(cx+s-5,cy); ctx.stroke();
  }
  xhair(140,HH/2); xhair(HW-140,HH/2);

  // scan corners
  function scorn(x,y,fx,fy){
    ctx.strokeStyle=MC; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,y+fy*22); ctx.lineTo(x,y); ctx.lineTo(x+fx*22,y); ctx.stroke();
  }
  scorn(HW*0.18,HH*0.21,1,1); scorn(HW*0.82,HH*0.21,-1,1);
  scorn(HW*0.18,HH*0.79,1,-1); scorn(HW*0.82,HH*0.79,-1,-1);

  ctx.globalAlpha=1; ctx.setLineDash([]);
}

// ---- ENEMY BOX ----
let enemyBBox = null;
function drawEnemyBox(){
  if(!abilityOn||!enemyBBox) return;
  const {x,y,w,h}=enemyBBox;
  const px=x*HW,py=y*HH,pw=w*HW,ph=h*HH;
  ctx.strokeStyle='#ff2222'; ctx.lineWidth=2; ctx.globalAlpha=0.9;
  ctx.strokeRect(px,py,pw,ph);
  const cs=10; ctx.lineWidth=3;
  [[px,py,1,1],[px+pw,py,-1,1],[px,py+ph,1,-1],[px+pw,py+ph,-1,-1]].forEach(([bx,by,sx,sy])=>{
    ctx.beginPath(); ctx.moveTo(bx+sx*cs,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy*cs); ctx.stroke();
  });
  ctx.fillStyle='#ff2222'; ctx.font='bold 11px Courier New'; ctx.textAlign='left';
  ctx.fillText('NEMICO',px+2,py-6);
  ctx.globalAlpha=1;
}

function drawHUD(){
  ctx.clearRect(0,0,HW,HH);
  drawCompass(heading);
  if(abilityAlpha>0.01) drawAbility(abilityAlpha);
  if(abilityOn) drawEnemyBox();
}

// ============================================================
// WEBGL — renders hud2d as a 3D billboard in head space
// ============================================================
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl',{xrCompatible:true,alpha:true,premultipliedAlpha:false});

// Shader: positions the quad in clip space given a model-view-projection matrix
const vsrc=`
attribute vec2 a_pos;
uniform mat4 u_mvp;
varying vec2 v_uv;
void main(){
  v_uv=vec2(a_pos.x*.5+.5,.5-a_pos.y*.5);
  gl_Position=u_mvp*vec4(a_pos,0.,1.);
}`;
const fsrc=`
precision mediump float;
uniform sampler2D u_tex;
uniform float u_alpha;
varying vec2 v_uv;
void main(){
  vec4 c=texture2D(u_tex,v_uv);
  gl_FragColor=vec4(c.rgb,c.a*u_alpha);
}`;

function mkShader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const uMVP   = gl.getUniformLocation(prog,'u_mvp');
const uAlpha = gl.getUniformLocation(prog,'u_alpha');
const aPos   = gl.getAttribLocation(prog,'a_pos');

const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

function uploadHUD(){
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,hud2d);
}

// 4x4 matrix math (column-major, WebGL standard)
function mat4(){return new Float32Array(16);}
function identity(m){m[0]=m[5]=m[10]=m[15]=1;m[1]=m[2]=m[3]=m[4]=m[6]=m[7]=m[8]=m[9]=m[11]=m[12]=m[13]=m[14]=0;return m;}
function multiply(out,a,b){
  for(let i=0;i<4;i++) for(let j=0;j<4;j++){
    out[j*4+i]=0;
    for(let k=0;k<4;k++) out[j*4+i]+=a[k*4+i]*b[j*4+k];
  }
  return out;
}
function perspective(m,fov,asp,near,far){
  const f=1/Math.tan(fov/2);
  identity(m);
  m[0]=f/asp; m[5]=f;
  m[10]=(far+near)/(near-far); m[11]=-1;
  m[14]=(2*far*near)/(near-far); m[15]=0;
  return m;
}
// Translation
function translate(m,x,y,z){
  identity(m); m[12]=x; m[13]=y; m[14]=z; return m;
}
// Scale
function scale(m,sx,sy,sz){
  identity(m); m[0]=sx; m[5]=sy; m[10]=sz; return m;
}

// Draw the HUD quad for one eye
// We position it in VIEW space: centered X, slightly below center Y, 1m ahead
// This means BOTH eyes see the same world-space plane → no stereo doubling
function drawEye(view, viewport, glLayer){
  gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);
  gl.clear(gl.DEPTH_BUFFER_BIT);

  // Build projection from XRView
  const proj = view.projectionMatrix;          // Float32Array 4x4

  // Build model matrix: position quad in VIEW space
  // x=0 (center), y= -0.10 (slightly below eye level), z=-1.2 (1.2m ahead)
  // scale: 1.4 wide, 0.79 tall (preserves 16:9 at 1.4m width)
  const T=mat4(); translate(T, 0, -0.10, -1.2);
  const S=mat4(); scale(S, 1.4, 0.7875, 1.0);   // 1.4 * (9/16) = 0.7875
  const model=mat4(); multiply(model,T,S);

  // View matrix from XRView transform (inverse of camera pose)
  // For a head-locked HUD we want identity view → quad stays fixed to head
  // So MVP = projection * identity * model = projection * model
  const mvp=mat4(); multiply(mvp, proj, model);

  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(gl.getUniformLocation(prog,'u_tex'),0);
  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniform1f(uAlpha,1.0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ============================================================
// DESKTOP PREVIEW — flat fullscreen
// ============================================================
function desktopRender(){
  if(xrSession) return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  drawHUD(); uploadHUD();
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0.05,0.05,0.08,1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  // flat quad for desktop
  const proj=mat4(); perspective(proj,1.0,canvas.width/canvas.height,0.1,10);
  const T=mat4(); translate(T,0,-0.05,-1.2);
  const S=mat4(); scale(S,1.4,0.7875,1);
  const model=mat4(); multiply(model,T,S);
  const mvp=mat4(); multiply(mvp,proj,model);

  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(gl.getUniformLocation(prog,'u_tex'),0);
  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniform1f(uAlpha,1.0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  requestAnimationFrame(desktopRender);
}

// ============================================================
// AUDIO
// ============================================================
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playAbility(){
  if(!actx)return; const t=actx.currentTime;
  [[200,1800,0.28,0,'sine'],[80,40,0.16,0.2,'square'],[2400,2400,0.10,0.1,'sine']].forEach(([f0,f1,g,dl,type])=>{
    const o=actx.createOscillator(),gn=actx.createGain();
    o.type=type; o.connect(gn); gn.connect(actx.destination);
    o.frequency.setValueAtTime(f0,t+dl); o.frequency.exponentialRampToValueAtTime(f1,t+dl+0.35);
    gn.gain.setValueAtTime(g,t+dl); gn.gain.exponentialRampToValueAtTime(0.001,t+dl+0.6);
    o.start(t+dl); o.stop(t+dl+0.7);
  });
}

// ============================================================
// ABILITY TOGGLE
// ============================================================
function toggleAbility(){
  abilityOn=!abilityOn;
  document.getElementById('d-a').textContent='ABILITÀ: '+(abilityOn?'ON':'OFF');
  if(abilityOn) playAbility();
}
// Smooth alpha in render loop
function stepAlpha(){
  const target=abilityOn?1:0;
  abilityAlpha+=(target-abilityAlpha)*0.1;
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){initAudio();toggleAbility();}});

// ============================================================
// HAND TRACKING — gesture detection
// ============================================================
// Returns distance between two joints in meters
function jDist(hand,a,b){
  try{
    const pa=hand.get(a).transform.position;
    const pb=hand.get(b).transform.position;
    return Math.hypot(pa.x-pb.x,pa.y-pb.y,pa.z-pb.z);
  }catch(e){return 999;}
}

// Pinch: thumb tip near index tip
function isPinch(hand){ return jDist(hand,'thumb-tip','index-finger-tip')<0.030; }

// Fist: all fingertips near palm (wrist)
function isFist(hand){
  const tips=['index-finger-tip','middle-finger-tip','ring-finger-tip','pinky-finger-tip'];
  const metas=['index-finger-metacarpal','middle-finger-metacarpal','ring-finger-metacarpal','pinky-finger-metacarpal'];
  let n=0;
  for(let i=0;i<4;i++) if(jDist(hand,tips[i],metas[i])<0.065) n++;
  return n>=3;
}

let prevPinchR=false, prevFistL=false;
let pinchHoldTime=0; // debounce: require hold for 2 frames

// ============================================================
// XR SESSION
// ============================================================
let xrSession=null, xrRefSpace=null, glLayer=null;

async function onXRFrame(t,frame){
  xrSession.requestAnimationFrame(onXRFrame);
  stepAlpha();

  // Compass from head orientation
  const pose=frame.getViewerPose(xrRefSpace);
  if(pose){
    const q=pose.transform.orientation;
    const yaw=Math.atan2(2*(q.w*q.y+q.z*q.x),1-2*(q.y*q.y+q.x*q.x));
    heading=((-yaw*180/Math.PI)+360)%360;
  }

  // Hand tracking
  for(const src of xrSession.inputSources){
    if(!src.hand) continue;
    if(src.handedness==='right'){
      const pinch=isPinch(src.hand);
      document.getElementById('d-r').textContent='DX: '+(pinch?'PINCH':'—');
      if(pinch && !prevPinchR){ initAudio(); toggleAbility(); }
      prevPinchR=pinch;
    }
    if(src.handedness==='left'){
      const fist=isFist(src.hand);
      document.getElementById('d-l').textContent='SX: '+(fist?'PUGNO':'—');
      prevFistL=fist;
    }
  }

  // Draw HUD
  drawHUD(); uploadHUD();

  // Render each eye
  if(pose){
    gl.bindFramebuffer(gl.FRAMEBUFFER,glLayer.framebuffer);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
    for(const view of pose.views){
      const vp=glLayer.getViewport(view);
      drawEye(view,vp,glLayer);
    }
  }
}

async function startXR(){
  initAudio();
  const btn=document.getElementById('enterbtn');
  btn.textContent='AVVIO...'; btn.disabled=true;
  try{ await gl.makeXRCompatible(); }catch(e){}

  const attempts=[
    ['immersive-ar',{requiredFeatures:['local'],optionalFeatures:['hand-tracking']}],
    ['immersive-vr',{requiredFeatures:['local'],optionalFeatures:['hand-tracking']}],
    ['immersive-vr',{requiredFeatures:['local-floor'],optionalFeatures:['hand-tracking']}],
  ];

  for(const [mode,opts] of attempts){
    try{
      const ok=await navigator.xr.isSessionSupported(mode).catch(()=>false);
      if(!ok) continue;
      xrSession=await navigator.xr.requestSession(mode,opts);
      glLayer=new XRWebGLLayer(xrSession,gl);
      await xrSession.updateRenderState({baseLayer:glLayer});
      const rsName=opts.requiredFeatures.includes('local-floor')?'local-floor':'local';
      xrRefSpace=await xrSession.requestReferenceSpace(rsName);
      xrSession.addEventListener('end',()=>{
        xrSession=null; xrRefSpace=null; glLayer=null;
        btn.textContent='ENTRA IN VR'; btn.disabled=false; btn.style.display='block';
        desktopRender();
      });
      xrSession.requestAnimationFrame(onXRFrame);
      btn.style.display='none';
      document.getElementById('dbg').style.display='block';
      return;
    }catch(e){ continue; }
  }
  btn.textContent='ENTRA IN VR'; btn.disabled=false;
  document.getElementById('d-m').textContent='Sessione XR fallita';
  document.getElementById('dbg').style.display='block';
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('load',()=>{
  desktopRender();
  setTimeout(()=>{
    const boot=document.getElementById('boot');
    boot.style.opacity='0';
    setTimeout(()=>{ boot.style.display='none'; },800);
    const btn=document.getElementById('enterbtn');
    btn.style.display='block';
    if(!navigator.xr){
      btn.textContent='WebXR NON DISPONIBILE'; btn.disabled=true;
    } else {
      btn.addEventListener('click',startXR);
    }
  },5300);
});
</script>

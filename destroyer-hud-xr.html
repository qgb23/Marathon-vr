<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quest 3 Ability HUD</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
#ui {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:5;
}
#btn{
  padding:16px 38px;
  border:2px solid #ff2d9b;
  background:transparent;
  color:#ff2d9b;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
}
#sub{
  color:rgba(255,255,255,.55);
  text-align:center;
  line-height:1.6;
  font-size:13px;
}
#err{
  color:#ff6b6b;
  font-size:13px;
  display:none;
  text-align:center;
  max-width:360px;
}
canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:none;
}
</style>
</head>
<body>

<div id="ui">
  <button id="btn" onclick="startAR()">Enter AR</button>
  <div id="sub">
    Quest 3 · immersive-ar · hand tracking<br>
    Tocca il palmo destro con l'indice sinistro
  </div>
  <div id="err"></div>
</div>

<canvas id="c"></canvas>

<script>
/* =========================================================
   CONFIG
========================================================= */
const ABILITY_DURATION = 8.0;
const TOUCH_DIST = 0.06;
const COOLDOWN_TOUCH = 1.5;

/* =========================================================
   STATE
========================================================= */
const S = {
  heading: 90,
  hudVisible: false,
  remain: 0,
  touchCool: 0,
  wasTouching: false,
  introFade: 0
};

/* =========================================================
   XR
========================================================= */
let session, gl, refSpace, handL, handR;
const canvas = document.getElementById('c');

async function startAR() {
  hideErr();

  if (!navigator.xr) {
    showErr('WebXR non disponibile. Apri il file dal Meta Browser su Quest 3.');
    return;
  }

  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!ok) {
    showErr('immersive-ar non supportato.');
    return;
  }

  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local', 'hand-tracking']
    });
  } catch (e) {
    try {
      session = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['local']
      });
    } catch (e2) {
      showErr('Errore sessione XR: ' + e2.message);
      return;
    }
  }

  document.getElementById('ui').style.display = 'none';
  canvas.style.display = 'block';

  gl = canvas.getContext('webgl2', {
    xrCompatible: true,
    alpha: true,
    premultipliedAlpha: false
  }) || canvas.getContext('webgl', {
    xrCompatible: true,
    alpha: true,
    premultipliedAlpha: false
  });

  await session.updateRenderState({
    baseLayer: new XRWebGLLayer(session, gl, { alpha: true })
  });

  refSpace = await session.requestReferenceSpace('local');

  initGL();
  session.requestAnimationFrame(xrFrame);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') triggerAbility();
  });
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr() {
  const el = document.getElementById('err');
  el.style.display = 'none';
}

/* =========================================================
   GESTURE
========================================================= */
function jp(hand, name, frame) {
  if (!hand) return null;
  const j = hand.get(name);
  if (!j) return null;
  const p = frame.getJointPose(j, refSpace);
  if (!p) return null;
  return p.transform.position;
}

function d3(a,b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dz = a.z - b.z;
  return Math.sqrt(dx*dx + dy*dy + dz*dz);
}

function checkTouch(frame) {
  if (S.touchCool > 0) return;

  const iTip = jp(handL, 'index-finger-tip', frame);
  const wR   = jp(handR, 'wrist', frame);
  const mR   = jp(handR, 'middle-finger-phalanx-proximal', frame);

  if (!iTip || !wR || !mR) return;

  const palm = {
    x:(wR.x + mR.x) * 0.5,
    y:(wR.y + mR.y) * 0.5,
    z:(wR.z + mR.z) * 0.5
  };

  const dist = d3(iTip, palm);

  if (dist < TOUCH_DIST && !S.wasTouching) {
    S.wasTouching = true;
    triggerAbility();
  }
  if (dist > TOUCH_DIST * 1.8) {
    S.wasTouching = false;
  }
}

function triggerAbility() {
  if (S.hudVisible) return;
  S.hudVisible = true;
  S.remain = ABILITY_DURATION;
  S.introFade = 0;
}

/* =========================================================
   GL PROGRAM
========================================================= */
const VERT = `
precision highp float;
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uProj;
varying vec2 vUV;
void main(){
  gl_Position = uProj * vec4(aPos, 1.0);
  vUV = aUV;
}
`;

const FRAG = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
void main(){
  vec4 c = texture2D(uTex, vUV);
  gl_FragColor = vec4(c.rgb * c.a, c.a);
}
`;

let prog, vbo, tex, aPos, aUV, uProj, uTex_;
const QW = 1.8, QH = 0.9, QZ = -1.5, QY = 0.08;

function initGL() {
  const vs = mkSh(gl.VERTEX_SHADER, VERT);
  const fs = mkSh(gl.FRAGMENT_SHADER, FRAG);

  prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  const hw = QW / 2;
  const hh = QH / 2;
  const yb = -hh + QY;
  const yt =  hh + QY;

  vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -hw, yb, QZ, 0, 1,
     hw, yb, QZ, 1, 1,
    -hw, yt, QZ, 0, 0,
     hw, yt, QZ, 1, 0
  ]), gl.STATIC_DRAW);

  aPos  = gl.getAttribLocation(prog, 'aPos');
  aUV   = gl.getAttribLocation(prog, 'aUV');
  uProj = gl.getUniformLocation(prog, 'uProj');
  uTex_ = gl.getUniformLocation(prog, 'uTex');

  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function mkSh(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  return sh;
}

/* =========================================================
   HUD CANVAS
========================================================= */
const HW = 1024;
const HH = 512;
const hc = document.createElement('canvas');
hc.width = HW;
hc.height = HH;
const hx = hc.getContext('2d');

/* =========================================================
   XR LOOP
========================================================= */
let lastT = 0;

function xrFrame(t, frame) {
  session.requestAnimationFrame(xrFrame);

  const dt = lastT ? (t - lastT) / 1000 : 0.016;
  lastT = t;

  const pose = frame.getViewerPose(refSpace);

  if (pose) {
    const q = pose.transform.orientation;
    const yaw = Math.atan2(
      2 * (q.y * q.w + q.x * q.z),
      1 - 2 * (q.y * q.y + q.z * q.z)
    );
    S.heading = ((-yaw * 180 / Math.PI) % 360 + 360) % 360;
  }

  if (session.inputSources) {
    for (const src of session.inputSources) {
      if (src.hand) {
        if (src.handedness === 'left') handL = src.hand;
        if (src.handedness === 'right') handR = src.hand;
      }
    }
  }

  if (S.touchCool > 0) {
    S.touchCool = Math.max(0, S.touchCool - dt);
  }

  checkTouch(frame);

  if (S.hudVisible) {
    S.remain = Math.max(0, S.remain - dt);
    S.introFade = Math.min(1, S.introFade + dt * 4.5);

    if (S.remain <= 0) {
      S.hudVisible = false;
      S.touchCool = COOLDOWN_TOUCH;
      S.wasTouching = false;
    }
  }

  if (!pose) return;

  const layer = session.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  drawHUD();

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hc);

  for (const view of pose.views) {
    const vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);
    drawEye(view.projectionMatrix);
  }
}

function drawEye(proj) {
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);

  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 20, 0);

  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 20, 12);

  gl.uniformMatrix4fv(uProj, false, proj);
  gl.uniform1i(uTex_, 0);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
  gl.disable(gl.DEPTH_TEST);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

/* =========================================================
   DRAW HUD
========================================================= */
function drawHUD() {
  hx.clearRect(0, 0, HW, HH);

  if (!S.hudVisible) return;

  const life = S.remain / ABILITY_DURATION;
  const appear = easeOutCubic(S.introFade);
  const alpha = Math.min(1, life * 1.25) * appear;

  drawCornerGlow(alpha);
  drawBottomPinkHaze(alpha);
  drawTopCompass(alpha);
  drawTopAbilityBar(alpha, life);
  drawMainFrame(alpha);
  drawSideCrosses(alpha);
  drawMicroMarks(alpha);
}

function easeOutCubic(x) {
  return 1 - Math.pow(1 - x, 3);
}

/* =========================================================
   GLOW ANGOLI / BORDI
========================================================= */
function drawCornerGlow(a) {
  // glow diffuso alto sinistra / alto destra
  let g = hx.createRadialGradient(0, 0, 0, 0, 0, HW * 0.62);
  g.addColorStop(0.00, `rgba(255,45,155,${0.18*a})`);
  g.addColorStop(0.22, `rgba(255,45,155,${0.10*a})`);
  g.addColorStop(0.55, `rgba(255,45,155,${0.03*a})`);
  g.addColorStop(1.00, `rgba(255,45,155,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  g = hx.createRadialGradient(HW, 0, 0, HW, 0, HW * 0.62);
  g.addColorStop(0.00, `rgba(255,45,155,${0.18*a})`);
  g.addColorStop(0.22, `rgba(255,45,155,${0.10*a})`);
  g.addColorStop(0.55, `rgba(255,45,155,${0.03*a})`);
  g.addColorStop(1.00, `rgba(255,45,155,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // velo laterale
  let lg = hx.createLinearGradient(0,0,HW,0);
  lg.addColorStop(0.00, `rgba(255,45,155,${0.12*a})`);
  lg.addColorStop(0.10, `rgba(255,45,155,${0.03*a})`);
  lg.addColorStop(0.50, `rgba(255,45,155,0)`);
  lg.addColorStop(0.90, `rgba(255,45,155,${0.03*a})`);
  lg.addColorStop(1.00, `rgba(255,45,155,${0.12*a})`);
  hx.fillStyle = lg;
  hx.fillRect(0,0,HW,HH);
}

function drawBottomPinkHaze(a) {
  // alone rosa in basso a sinistra
  let g = hx.createRadialGradient(70, HH-20, 0, 70, HH-20, 180);
  g.addColorStop(0.00, `rgba(255,45,155,${0.42*a})`);
  g.addColorStop(0.22, `rgba(255,45,155,${0.18*a})`);
  g.addColorStop(0.55, `rgba(255,45,155,${0.05*a})`);
  g.addColorStop(1.00, `rgba(255,45,155,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // alone rosa in basso a destra
  g = hx.createRadialGradient(HW-70, HH-20, 0, HW-70, HH-20, 180);
  g.addColorStop(0.00, `rgba(255,45,155,${0.42*a})`);
  g.addColorStop(0.22, `rgba(255,45,155,${0.18*a})`);
  g.addColorStop(0.55, `rgba(255,45,155,${0.05*a})`);
  g.addColorStop(1.00, `rgba(255,45,155,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);
}

/* =========================================================
   TOP COMPASS
========================================================= */
function drawTopCompass(a) {
  const cx = HW / 2;
  const y  = 26;
  const deg = Math.round(S.heading);
  const dirText = `E ${String(deg).padStart(3,'0')}`;

  hx.textAlign = 'center';
  hx.textBaseline = 'middle';

  hx.fillStyle = `rgba(255,255,255,${0.95*a})`;
  hx.font = `600 16px Arial`;
  hx.fillText('NE', cx - 120, y + 2);
  hx.fillText('SE', cx + 120, y + 2);

  hx.strokeStyle = `rgba(255,255,255,${0.75*a})`;
  hx.lineWidth = 1.2;
  hx.beginPath();
  hx.moveTo(cx - 50, y);
  hx.lineTo(cx - 20, y);
  hx.stroke();
  hx.beginPath();
  hx.moveTo(cx + 20, y);
  hx.lineTo(cx + 50, y);
  hx.stroke();

  hx.fillStyle = `rgba(255,255,255,${0.98*a})`;
  hx.font = `700 24px Arial`;
  hx.fillText(dirText, cx, y + 2);

  hx.fillStyle = `rgba(188,255,0,${0.9*a})`;
  hx.font = `700 18px Arial`;
  hx.fillText('AUTOMEZZO', cx, y + 34);
}

/* =========================================================
   TOP ABILITY BAR
========================================================= */
function drawTopAbilityBar(a, life) {
  const cx = HW / 2;
  const y = 86;

  const pink = `rgba(255,96,220,${a})`;
  const pinkSoft = `rgba(255,96,220,${0.45*a})`;
  const yellow = `rgba(255,224,92,${a})`;

  const ticks = 11;
  const tickW = 7;
  const tickH = 22;
  const gap = 5;

  const leftStart  = cx - 35 - ticks * (tickW + gap);
  const rightStart = cx + 35;

  for (let i = 0; i < ticks; i++) {
    const lx = leftStart + i * (tickW + gap);
    const rx = rightStart + i * (tickW + gap);

    hx.fillStyle = pink;
    hx.fillRect(lx, y, tickW, tickH);
    hx.fillRect(rx, y, tickW, tickH);
  }

  hx.fillStyle = `rgba(255,255,255,${0.92*a})`;
  hx.font = `700 22px Arial`;
  hx.textAlign = 'center';
  hx.textBaseline = 'middle';
  hx.fillText('01', cx, y + 11);

  const slotW = 42;
  const slotH = 20;
  const slotGap = 6;
  const slotY = y + 32;
  const totalW = slotW * 3 + slotGap * 2;
  const sx = cx - totalW / 2;

  const filled = Math.ceil(life * 3);

  for (let i = 0; i < 3; i++) {
    if (i < filled) {
      hx.fillStyle = yellow;
      hx.fillRect(sx + i * (slotW + slotGap), slotY, slotW, slotH);
    } else {
      hx.fillStyle = `rgba(255,224,92,${0.15*a})`;
      hx.fillRect(sx + i * (slotW + slotGap), slotY, slotW, slotH);
      hx.strokeStyle = `rgba(255,224,92,${0.25*a})`;
      hx.lineWidth = 1;
      hx.strokeRect(sx + i * (slotW + slotGap), slotY, slotW, slotH);
    }
  }

  drawTopCircles(cx - 150, y + 11, a);
  drawTopCircles(cx - 95,  y + 11, a);
  drawTopCircles(cx + 95,  y + 11, a);
  drawTopCircles(cx + 150, y + 11, a);

  hx.strokeStyle = pinkSoft;
  hx.lineWidth = 2;

  hx.beginPath();
  hx.moveTo(235, y + 2);
  hx.lineTo(305, y + 2);
  hx.lineTo(325, y - 12);
  hx.lineTo(440, y - 12);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(HW - 235, y + 2);
  hx.lineTo(HW - 305, y + 2);
  hx.lineTo(HW - 325, y - 12);
  hx.lineTo(HW - 440, y - 12);
  hx.stroke();
}

function drawTopCircles(x, y, a) {
  hx.strokeStyle = `rgba(255,96,220,${a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.arc(x, y, 22, 0, Math.PI * 2);
  hx.stroke();

  hx.fillStyle = `rgba(255,96,220,${0.16*a})`;
  hx.beginPath();
  hx.arc(x, y, 21, 0, Math.PI * 2);
  hx.fill();

  hx.strokeStyle = `rgba(255,96,220,${0.95*a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.moveTo(x - 8, y);
  hx.lineTo(x + 8, y);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(x - 3, y - 6);
  hx.lineTo(x + 7, y);
  hx.lineTo(x - 3, y + 6);
  hx.stroke();
}

/* =========================================================
   MAIN FRAME
========================================================= */
function drawMainFrame(a) {
  const pink = `rgba(255,96,220,${a})`;
  const soft = `rgba(255,96,220,${0.55*a})`;

  // lato sinistro
  hx.strokeStyle = pink;
  hx.lineWidth = 2;

  hx.beginPath();
  hx.moveTo(85, 110);
  hx.lineTo(85, 380);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(85, 110);
  hx.lineTo(105, 110);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(85, 380);
  hx.lineTo(105, 380);
  hx.stroke();

  // lato destro
  hx.beginPath();
  hx.moveTo(HW-85, 110);
  hx.lineTo(HW-85, 380);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(HW-85, 110);
  hx.lineTo(HW-105, 110);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(HW-85, 380);
  hx.lineTo(HW-105, 380);
  hx.stroke();

  // piccoli crossmark
  drawSmallCross(125, 108, a);
  drawSmallCross(HW-125, 108, a);
  drawSmallCross(125, 380, a);
  drawSmallCross(HW-125, 380, a);

  // quadratini verticali
  hx.fillStyle = soft;
  hx.fillRect(120, 188, 10, 10);
  hx.fillRect(120, 292, 10, 10);
  hx.fillRect(HW-130, 188, 10, 10);
  hx.fillRect(HW-130, 292, 10, 10);
}

function drawSmallCross(x, y, a) {
  hx.strokeStyle = `rgba(255,96,220,${0.85*a})`;
  hx.lineWidth = 1.5;

  hx.beginPath();
  hx.moveTo(x-7, y);
  hx.lineTo(x+7, y);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(x, y-7);
  hx.lineTo(x, y+7);
  hx.stroke();
}

/* =========================================================
   SIDE CROSSES
========================================================= */
function drawSideCrosses(a) {
  drawOneCross(170, 256, a);
  drawOneCross(HW - 170, 256, a);
}

function drawOneCross(cx, cy, a) {
  const pink  = `rgba(255,70,210,${a})`;
  const pink2 = `rgba(255,120,230,${0.78*a})`;
  const pink3 = `rgba(255,180,245,${0.18*a})`;

  // colonna verticale
  hx.fillStyle = pink;
  hx.fillRect(cx - 10, cy - 74, 20, 148);

  // bracci orizzontali
  hx.fillRect(cx - 62, cy - 10, 124, 20);

  // blocchi esterni
  hx.fillStyle = pink2;
  hx.fillRect(cx - 76, cy - 10, 14, 20);
  hx.fillRect(cx + 62, cy - 10, 14, 20);

  hx.fillRect(cx - 10, cy - 88, 20, 14);
  hx.fillRect(cx - 10, cy + 74, 20, 14);

  // quadratoni centrali pixelati
  hx.fillStyle = pink2;
  hx.fillRect(cx - 34, cy - 34, 68, 68);

  hx.fillStyle = pink;
  hx.fillRect(cx - 18, cy - 18, 36, 36);

  hx.fillStyle = pink3;
  hx.fillRect(cx - 7, cy - 7, 14, 14);

  // pixel accessori
  hx.fillStyle = pink2;
  hx.fillRect(cx - 86, cy - 42, 10, 10);
  hx.fillRect(cx - 86, cy + 32, 10, 10);
  hx.fillRect(cx + 76, cy - 42, 10, 10);
  hx.fillRect(cx + 76, cy + 32, 10, 10);

  // linee verso il centro
  hx.strokeStyle = `rgba(255,96,220,${0.75*a})`;
  hx.lineWidth = 1.6;

  hx.beginPath();
  hx.moveTo(cx + 76, cy - 10);
  hx.lineTo(cx + 160, cy - 10);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(cx + 76, cy + 10);
  hx.lineTo(cx + 160, cy + 10);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(cx - 76, cy - 10);
  hx.lineTo(cx - 160, cy - 10);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(cx - 76, cy + 10);
  hx.lineTo(cx - 160, cy + 10);
  hx.stroke();
}

/* =========================================================
   MICRO MARKS
========================================================= */
function drawMicroMarks(a) {
  const pink = `rgba(255,96,220,${0.7*a})`;

  const pts = [
    [300,110],[724,110],
    [300,150],[724,150],
    [410,130],[614,130],
    [512,165],
    [250,260],[774,260]
  ];

  hx.fillStyle = pink;
  for (const p of pts) {
    hx.fillRect(p[0]-2, p[1]-2, 4, 4);
  }

  // reticolo centrale molto debole
  hx.strokeStyle = `rgba(255,96,220,${0.32*a})`;
  hx.lineWidth = 1;

  hx.beginPath();
  hx.moveTo(500, 246);
  hx.lineTo(524, 246);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(512, 234);
  hx.lineTo(512, 258);
  hx.stroke();
}

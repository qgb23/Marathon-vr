<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathon — Destroyer Helmet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas#glcanvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
#boot {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity 0.8s;
}
.b-sub  { font-size:10px; letter-spacing:4px; color:#00e8ff; margin-bottom:24px; opacity:0; animation:fi 0.4s 0.4s forwards; }
.b-title{ font-size:32px; letter-spacing:10px; color:#ff2afc; margin-bottom:44px; opacity:0; animation:fi 0.4s 0.9s forwards; }
.b-lines{ display:flex; flex-direction:column; align-items:flex-start; }
.b-line { font-size:10px; letter-spacing:2px; color:#00e8ff; margin:5px 0; display:flex; align-items:center; gap:8px; opacity:0; }
.b-line:nth-child(1){animation:fi 0.3s 1.4s forwards;}
.b-line:nth-child(2){animation:fi 0.3s 1.8s forwards;}
.b-line:nth-child(3){animation:fi 0.3s 2.2s forwards;}
.b-line:nth-child(4){animation:fi 0.3s 2.6s forwards;}
.b-line:nth-child(5){animation:fi 0.3s 3.0s forwards;}
.b-dot  { width:5px; height:5px; border-radius:50%; background:#ff2afc; flex-shrink:0; }
.b-bwrap{ width:280px; height:2px; background:#1a001a; margin-top:36px; opacity:0; animation:fi 0.3s 3.2s forwards; }
.b-bar  { height:100%; width:0; background:#ff2afc; animation:lb 1s 3.4s forwards; }
.b-ready{ font-size:10px; letter-spacing:5px; color:#ff2afc; margin-top:16px; opacity:0; animation:fi 0.5s 4.5s forwards; }
.b-ver  { font-size:13px; letter-spacing:4px; color:#00e8ff; margin-top:14px; opacity:0; animation:fi 0.3s 4.7s forwards; border:1px solid rgba(0,232,255,0.4); padding:4px 14px; }
@keyframes fi { to{opacity:1;} }
@keyframes lb { to{width:100%;} }
#enterbtn {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:transparent; border:1px solid #ff2afc;
  color:#ff2afc; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:3px; padding:12px 32px;
  cursor:pointer; z-index:200; display:none;
}
#enterbtn:disabled { opacity:0.4; cursor:default; }
#dbg {
  position:fixed; bottom:16px; right:16px;
  font-size:9px; color:rgba(0,232,255,0.6);
  letter-spacing:1px; line-height:2;
  z-index:200; text-align:right; display:none;
  background:rgba(0,0,0,0.5); padding:6px 10px;
}
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="boot">
  <div class="b-sub">BUNGIE // MARATHON SYSTEMS</div>
  <div class="b-title">DESTROYER</div>
  <div class="b-lines">
    <div class="b-line"><div class="b-dot"></div>NEURAL LINK............OK</div>
    <div class="b-line"><div class="b-dot"></div>SHIELD ARRAY...........OK</div>
    <div class="b-line"><div class="b-dot"></div>SENSOR SUITE...........OK</div>
    <div class="b-line"><div class="b-dot"></div>HAND TRACKING..........OK</div>
    <div class="b-line"><div class="b-dot"></div>HUD CALIBRATING.......</div>
  </div>
  <div class="b-bwrap"><div class="b-bar"></div></div>
  <div class="b-ready">SYSTEM READY</div>
  <div class="b-ver">v1.5.0</div>
</div>
<button id="enterbtn">ENTRA IN VR</button>
<div id="dbg">
  <div id="d-l">SX: —</div>
  <div id="d-r">DX: —</div>
  <div id="d-dist">DIST: —</div>
  <div id="d-a">ABILITÀ: OFF</div>
</div>
<script>
// ============================================================
// HUD 2D CANVAS
// ============================================================
const HW=1280, HH=720;
const hud2d=document.createElement('canvas');
hud2d.width=HW; hud2d.height=HH;
const ctx=hud2d.getContext('2d');

let heading=90, abilityAlpha=0, abilityOn=false;

const DIRS=[[0,'N'],[45,'NE'],[90,'E'],[135,'SE'],[180,'S'],[225,'SO'],[270,'O'],[315,'NO']];
function hdgLabel(d){
  d=((d%360)+360)%360;
  if(d<22)return'N';if(d<67)return'NE';if(d<112)return'E';
  if(d<157)return'SE';if(d<202)return'S';if(d<247)return'SO';
  if(d<292)return'O';return'NO';
}

function drawCompass(deg){
  const cx=HW/2, cy=HH/2-80, trackW=320;
  ctx.save();
  ctx.beginPath(); ctx.rect(cx-trackW/2,cy-22,trackW,40); ctx.clip();
  for(let d=-540;d<=540;d+=22.5){
    const norm=((d%360)+360)%360;
    const isMaj=(norm%45===0);
    const delta=d-deg;
    if(Math.abs(delta)>220) continue;
    const x=cx+delta*(trackW/180);
    const label=DIRS.find(e=>e[0]===norm);
    ctx.globalAlpha=isMaj?0.95:0.3;
    ctx.strokeStyle='#00e8ff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,cy-(isMaj?11:5)); ctx.lineTo(x,cy+2); ctx.stroke();
    if(label){
      ctx.globalAlpha=1; ctx.fillStyle='#00e8ff';
      ctx.font='bold 13px Courier New'; ctx.textAlign='center';
      ctx.fillText(label[1],x,cy-15);
    }
  }
  ctx.restore();
  ctx.globalAlpha=1;
  ctx.strokeStyle='#ff2afc'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy-22); ctx.lineTo(cx,cy+4); ctx.stroke();
  ctx.fillStyle='#ff2afc';
  ctx.beginPath(); ctx.moveTo(cx-5,cy+4); ctx.lineTo(cx+5,cy+4); ctx.lineTo(cx,cy+11); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff2afc'; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
  ctx.fillText(hdgLabel(deg),cx,cy+27);
  ctx.fillStyle='#00e8ff'; ctx.font='10px Courier New';
  ctx.fillText(String(Math.round(deg)).padStart(3,'0')+'°',cx,cy+41);
}

function drawAbility(alpha){
  if(alpha<=0.01) return;
  const MC='#ff2afc';
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(255,20,180,0.07)'; ctx.fillRect(0,0,HW,HH);
  ctx.fillStyle='rgba(255,20,180,0.022)';
  for(let y=0;y<HH;y+=4) ctx.fillRect(0,y,HW,1);
  ctx.strokeStyle=MC; ctx.lineWidth=1.5;
  ctx.setLineDash([8,5]);
  ctx.strokeRect(4,4,88,HH-8);
  ctx.strokeRect(HW-92,4,88,HH-8);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(4,95); ctx.lineTo(30,95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,HH-95); ctx.lineTo(30,HH-95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HW-4,95); ctx.lineTo(HW-30,95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HW-4,HH-95); ctx.lineTo(HW-30,HH-95); ctx.stroke();
  function pcross(x,y,a){ ctx.globalAlpha=alpha*a; ctx.fillStyle=MC; ctx.fillRect(x-6,y-2,12,4); ctx.fillRect(x-2,y-6,4,12); }
  pcross(46,HH/2-32,0.9); pcross(46,HH/2+32,0.5);
  pcross(HW-46,HH/2-32,0.9); pcross(HW-46,HH/2+32,0.5);
  ctx.globalAlpha=alpha;
  const midX=HW/2, topY=HH/2-80;
  function drawCircle(cx,cy){ ctx.strokeStyle=MC; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy-6); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+10,cy); ctx.lineTo(cx+6,cy); ctx.stroke(); }
  drawCircle(midX-102,topY); drawCircle(midX-78,topY);
  drawCircle(midX+78,topY); drawCircle(midX+102,topY);
  function drawSegs(x,y,total,on,dim){ for(let i=0;i<total;i++){ const sx=x+i*19; ctx.strokeStyle=i<on?'#ffee00':MC; ctx.lineWidth=1; ctx.strokeRect(sx,y,17,9); if(i<on){ctx.fillStyle='#ffee00';ctx.fillRect(sx+1,y+1,15,7);}else if(i<on+dim){ctx.fillStyle='rgba(255,238,0,0.3)';ctx.fillRect(sx+1,y+1,15,7);}}}
  const bY=topY-6;
  drawSegs(midX-122,bY,9,7,0); drawSegs(midX+14,bY,9,6,1);
  ctx.strokeStyle=MC; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(midX-8,bY); ctx.lineTo(midX-8,bY+13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX+8,bY); ctx.lineTo(midX+8,bY+13); ctx.stroke();
  ctx.fillStyle=MC; ctx.font='9px Courier New'; ctx.textAlign='center'; ctx.fillText('01',midX,bY+11);
  drawSegs(midX-28,topY+8,3,3,0);
  for(let i=-3;i<=3;i++){ ctx.globalAlpha=alpha*(i===0?1:0.5); ctx.fillStyle=MC; const sz=i===0?4:3; ctx.fillRect(midX+i*8-sz/2,topY+22,sz,sz); }
  ctx.globalAlpha=alpha;
  function xhair(cx,cy){ const s=32; ctx.strokeStyle=MC; ctx.lineWidth=2; ctx.strokeRect(cx-s,cy-s,15,15); ctx.strokeRect(cx+s-15,cy-s,15,15); ctx.strokeRect(cx-s,cy+s-15,15,15); ctx.strokeRect(cx+s-15,cy+s-15,15,15); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(cx,cy-s+5); ctx.lineTo(cx,cy-s/2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx,cy+s/2); ctx.lineTo(cx,cy+s-5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx-s+5,cy); ctx.lineTo(cx-s/2,cy); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+s/2,cy); ctx.lineTo(cx+s-5,cy); ctx.stroke(); }
  xhair(140,HH/2); xhair(HW-140,HH/2);
  function scorn(x,y,fx,fy){ ctx.strokeStyle=MC; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x,y+fy*22); ctx.lineTo(x,y); ctx.lineTo(x+fx*22,y); ctx.stroke(); }
  scorn(HW*0.18,HH*0.21,1,1); scorn(HW*0.82,HH*0.21,-1,1);
  scorn(HW*0.18,HH*0.79,1,-1); scorn(HW*0.82,HH*0.79,-1,-1);
  ctx.globalAlpha=1; ctx.setLineDash([]);
}

function drawHUD(){
  ctx.clearRect(0,0,HW,HH);
  drawCompass(heading);
  if(abilityAlpha>0.01) drawAbility(abilityAlpha);
}

// ============================================================
// WEBGL — fullscreen quad, SAME texture both eyes (head-locked)
// ============================================================
const canvas=document.getElementById('glcanvas');
const gl=canvas.getContext('webgl',{xrCompatible:true,alpha:true,premultipliedAlpha:false});

const vsrc=`attribute vec2 p;varying vec2 uv;void main(){uv=vec2(p.x*.5+.5,.5-p.y*.5);gl_Position=vec4(p,0,1);}`;
const fsrc=`precision mediump float;uniform sampler2D t;varying vec2 uv;void main(){gl_FragColor=texture2D(t,uv);}`;
function mkSh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkSh(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog,mkSh(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'p');
const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

function uploadAndDraw(fb, x, y, w, h){
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.viewport(x,y,w,h);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(gl.getUniformLocation(prog,'t'),0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function uploadHUD(){
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,hud2d);
}

// desktop loop
let xrSession=null;
function desktopLoop(){
  if(xrSession) return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  drawHUD(); uploadHUD();
  gl.clearColor(0.04,0.04,0.06,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  uploadAndDraw(null,0,0,canvas.width,canvas.height);
  requestAnimationFrame(desktopLoop);
}

// ============================================================
// AUDIO
// ============================================================
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playAbility(){
  if(!actx) return; const t=actx.currentTime;
  [[200,1800,0.28,0,'sine'],[80,40,0.16,0.2,'square'],[2400,2400,0.10,0.1,'sine']].forEach(([f0,f1,g,dl,type])=>{
    const o=actx.createOscillator(),gn=actx.createGain();
    o.type=type; o.connect(gn); gn.connect(actx.destination);
    o.frequency.setValueAtTime(f0,t+dl); o.frequency.exponentialRampToValueAtTime(f1,t+dl+0.35);
    gn.gain.setValueAtTime(g,t+dl); gn.gain.exponentialRampToValueAtTime(0.001,t+dl+0.6);
    o.start(t+dl); o.stop(t+dl+0.7);
  });
}

// ============================================================
// ABILITY
// ============================================================
function toggleAbility(){
  abilityOn=!abilityOn;
  document.getElementById('d-a').textContent='ABILITÀ: '+(abilityOn?'ON':'OFF');
  if(abilityOn) playAbility();
}
function stepAlpha(){ abilityAlpha+=(( abilityOn?1:0)-abilityAlpha)*0.1; }
document.addEventListener('keydown',e=>{if(e.code==='Space'){initAudio();toggleAbility();}});

// ============================================================
// HAND TRACKING
// ============================================================
function jPos(hand,name){
  try{ return hand.get(name).transform.position; }catch(e){return null;}
}
function dist3(a,b){
  if(!a||!b) return 999;
  return Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z);
}

// Palmo destro = media di wrist + index-finger-metacarpal + pinky-finger-metacarpal
function palmCenter(hand){
  const w=jPos(hand,'wrist');
  const a=jPos(hand,'index-finger-metacarpal');
  const b=jPos(hand,'pinky-finger-metacarpal');
  if(!w) return null;
  const pts=[w,a,b].filter(Boolean);
  return { x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length, z:pts.reduce((s,p)=>s+p.z,0)/pts.length };
}

// Dito sinistro tocca palmo destro: controlla TUTTI i joint della mano sinistra
function leftTouchesRightPalm(lHand, rHand){
  const pc=palmCenter(rHand);
  if(!pc) return {hit:false,dist:999};
  const joints=['wrist','index-finger-tip','index-finger-phalanx-proximal',
    'middle-finger-tip','middle-finger-phalanx-proximal',
    'ring-finger-tip','pinky-finger-tip','thumb-tip'];
  let minD=999;
  for(const j of joints){
    const p=jPos(lHand,j);
    const d=dist3(p,pc);
    if(d<minD) minD=d;
  }
  return {hit:minD<0.12, dist:minD};
}

let touchFrames=0, touchFired=false;

// ============================================================
// XR
// ============================================================
let xrRefSpace=null, glLayer=null;

function onXRFrame(t,frame){
  xrSession.requestAnimationFrame(onXRFrame);
  stepAlpha();

  const pose=frame.getViewerPose(xrRefSpace);
  if(pose){
    const q=pose.transform.orientation;
    heading=((-Math.atan2(2*(q.w*q.y+q.z*q.x),1-2*(q.y*q.y+q.x*q.x))*180/Math.PI)+360)%360;
  }

  // Collect hands
  let lHand=null, rHand=null;
  for(const src of xrSession.inputSources){
    if(!src.hand) continue;
    if(src.handedness==='left')  lHand=src.hand;
    if(src.handedness==='right') rHand=src.hand;
  }

  // Gesture
  if(lHand && rHand){
    const {hit,dist}=leftTouchesRightPalm(lHand,rHand);
    document.getElementById('d-l').textContent='SX: '+(lHand?'OK':'—');
    document.getElementById('d-r').textContent='DX: '+(rHand?'OK':'—');
    document.getElementById('d-dist').textContent='DIST: '+dist.toFixed(3)+'m '+(hit?'TOCCO!':'');
    if(hit){ touchFrames++; if(touchFrames>=2&&!touchFired){touchFired=true;initAudio();toggleAbility();} }
    else   { touchFrames=0; touchFired=false; }
  } else {
    document.getElementById('d-l').textContent='SX: '+(lHand?'OK':'N/A');
    document.getElementById('d-r').textContent='DX: '+(rHand?'OK':'N/A');
    touchFrames=0; touchFired=false;
  }

  // Draw HUD to 2D canvas then upload
  drawHUD(); uploadHUD();

  // Render — one draw call per eye viewport
  if(pose && glLayer){
    gl.bindFramebuffer(gl.FRAMEBUFFER,glLayer.framebuffer);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    for(const view of pose.views){
      const vp=glLayer.getViewport(view);
      uploadAndDraw(glLayer.framebuffer,vp.x,vp.y,vp.width,vp.height);
    }
  }
}

async function startXR(){
  initAudio();
  const btn=document.getElementById('enterbtn');
  btn.textContent='AVVIO...'; btn.disabled=true;
  try{ await gl.makeXRCompatible(); }catch(e){}
  const tries=[
    ['immersive-ar',{requiredFeatures:['local'],optionalFeatures:['hand-tracking']}],
    ['immersive-vr',{requiredFeatures:['local'],optionalFeatures:['hand-tracking']}],
    ['immersive-vr',{requiredFeatures:['local-floor'],optionalFeatures:['hand-tracking']}],
  ];
  for(const [mode,opts] of tries){
    try{
      if(!await navigator.xr.isSessionSupported(mode).catch(()=>false)) continue;
      xrSession=await navigator.xr.requestSession(mode,opts);
      glLayer=new XRWebGLLayer(xrSession,gl);
      await xrSession.updateRenderState({baseLayer:glLayer});
      xrRefSpace=await xrSession.requestReferenceSpace(opts.requiredFeatures.includes('local-floor')?'local-floor':'local');
      xrSession.addEventListener('end',()=>{ xrSession=null; glLayer=null; btn.textContent='ENTRA IN VR'; btn.disabled=false; btn.style.display='block'; desktopLoop(); });
      xrSession.requestAnimationFrame(onXRFrame);
      btn.style.display='none';
      document.getElementById('dbg').style.display='block';
      return;
    }catch(e){ continue; }
  }
  btn.textContent='ENTRA IN VR'; btn.disabled=false;
  document.getElementById('dbg').style.display='block';
  document.getElementById('d-dist').textContent='XR fallito';
}

window.addEventListener('load',()=>{
  desktopLoop();
  setTimeout(()=>{
    const boot=document.getElementById('boot');
    boot.style.opacity='0';
    setTimeout(()=>boot.style.display='none',800);
    const btn=document.getElementById('enterbtn');
    btn.style.display='block';
    if(!navigator.xr){ btn.textContent='WebXR NON DISPONIBILE'; btn.disabled=true; }
    else btn.addEventListener('click',startXR);
  },5300);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathon — Destroyer Helmet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { position:fixed; inset:0; width:100%; height:100%; }
#boot {
  position:fixed; inset:0; background:#000; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.8s;
}
.b-logo  { font-size:10px; letter-spacing:4px; color:#00e8ff; margin-bottom:20px; opacity:0; animation:fi 0.4s 0.3s forwards; }
.b-title { font-size:30px; letter-spacing:10px; color:#ff2afc; margin-bottom:40px; opacity:0; animation:fi 0.4s 0.8s forwards; }
.b-line  { font-size:10px; letter-spacing:2px; color:#00e8ff; margin:4px 0; display:flex; align-items:center; gap:8px; opacity:0; }
.b-line:nth-child(1){animation:fi 0.3s 1.3s forwards;}
.b-line:nth-child(2){animation:fi 0.3s 1.7s forwards;}
.b-line:nth-child(3){animation:fi 0.3s 2.1s forwards;}
.b-line:nth-child(4){animation:fi 0.3s 2.5s forwards;}
.b-line:nth-child(5){animation:fi 0.3s 2.9s forwards;}
.b-dot   { width:5px; height:5px; border-radius:50%; background:#ff2afc; }
.b-bwrap { width:260px; height:2px; background:#1a001a; margin-top:30px; opacity:0; animation:fi 0.3s 3.1s forwards; }
.b-bar   { height:100%; width:0; background:#ff2afc; animation:lb 1s 3.3s forwards; }
.b-ready { font-size:10px; letter-spacing:5px; color:#ff2afc; margin-top:14px; opacity:0; animation:fi 0.4s 4.4s forwards; }
.b-ver   { font-size:12px; letter-spacing:4px; color:#00e8ff; margin-top:12px; opacity:0; animation:fi 0.3s 4.6s forwards; border:1px solid rgba(0,232,255,0.4); padding:3px 12px; }
@keyframes fi { to { opacity:1; } }
@keyframes lb { to { width:100%; } }
#enterbtn {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:transparent; border:1px solid #ff2afc; color:#ff2afc;
  font-family:'Courier New',monospace; font-size:12px; letter-spacing:3px;
  padding:12px 30px; cursor:pointer; z-index:999; display:none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="boot">
  <div class="b-logo">BUNGIE // MARATHON SYSTEMS</div>
  <div class="b-title">DESTROYER</div>
  <div style="display:flex;flex-direction:column;align-items:flex-start">
    <div class="b-line"><div class="b-dot"></div>NEURAL LINK............OK</div>
    <div class="b-line"><div class="b-dot"></div>SHIELD ARRAY...........OK</div>
    <div class="b-line"><div class="b-dot"></div>SENSOR SUITE...........OK</div>
    <div class="b-line"><div class="b-dot"></div>HAND TRACKING..........OK</div>
    <div class="b-line"><div class="b-dot"></div>HUD CALIBRATING.......</div>
  </div>
  <div class="b-bwrap"><div class="b-bar"></div></div>
  <div class="b-ready">SYSTEM READY</div>
  <div class="b-ver">v2.0.0</div>
</div>

<button id="enterbtn">ENTRA IN VR</button>

<script>
// ═══════════════════════════════════════════════════════════
// WEBGL SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { xrCompatible:true, alpha:true, premultipliedAlpha:false });

// Vertex shader: NDC quad con UV
const VS = `
  attribute vec2 aPos;
  varying vec2 vUV;
  void main(){
    vUV = vec2(aPos.x * 0.5 + 0.5, 0.5 - aPos.y * 0.5);
    gl_Position = vec4(aPos, 0.0, 1.0);
  }
`;
// Fragment shader: campiona texture 2D
const FS = `
  precision mediump float;
  uniform sampler2D uTex;
  varying vec2 vUV;
  void main(){
    gl_FragColor = texture2D(uTex, vUV);
  }
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

// Quad che copre tutto lo schermo (-1 to 1)
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPosLoc = gl.getAttribLocation(prog, 'aPos');
const uTexLoc = gl.getUniformLocation(prog, 'uTex');

// Texture per l'HUD 2D
const hudTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, hudTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

// ═══════════════════════════════════════════════════════════
// HUD 2D CANVAS — tutto il disegno avviene qui
// ═══════════════════════════════════════════════════════════
const HW = 1280, HH = 720;
const hud = document.createElement('canvas');
hud.width = HW; hud.height = HH;
const ctx = hud.getContext('2d');

let heading = 90;
let abilityOn = false;
let abilityAlpha = 0;

// Costanti colori Marathon
const C_CYAN    = '#00e8ff';
const C_MAGENTA = '#ff2afc';
const C_YELLOW  = '#ffee00';
const C_RED     = '#ff2222';

// ── BUSSOLA ──────────────────────────────────────────────
const COMPASS_DIRS = [
  [0,'N'],[45,'NE'],[90,'E'],[135,'SE'],
  [180,'S'],[225,'SO'],[270,'O'],[315,'NO']
];

function compassLabel(deg) {
  deg = ((deg % 360) + 360) % 360;
  if(deg < 22)  return 'N';
  if(deg < 67)  return 'NE';
  if(deg < 112) return 'E';
  if(deg < 157) return 'SE';
  if(deg < 202) return 'S';
  if(deg < 247) return 'SO';
  if(deg < 292) return 'O';
  return 'NO';
}

function drawCompass(deg) {
  // Posizionata in cima, centrata
  const cx = HW / 2;
  const cy = 60;
  const W  = 340; // larghezza barra visibile
  const pxPerDeg = W / 120; // 120 gradi visibili

  // Clip alla larghezza della barra
  ctx.save();
  ctx.beginPath();
  ctx.rect(cx - W/2, cy - 24, W, 46);
  ctx.clip();

  // Disegna i tick da -180 a +180 rispetto all'heading corrente
  for(let d = -360; d <= 360; d += 22.5) {
    const norm = ((d % 360) + 360) % 360;
    const isMaj = (norm % 45 === 0);
    const delta = d - (deg % 360 - (deg % 360 > 180 ? 360 : 0));

    // Normalizza delta
    let dd = d - deg;
    while(dd > 180)  dd -= 360;
    while(dd < -180) dd += 360;

    if(Math.abs(dd) > 65) continue;
    const x = cx + dd * pxPerDeg;

    ctx.strokeStyle = C_CYAN;
    ctx.lineWidth   = 1;
    ctx.globalAlpha = isMaj ? 1.0 : 0.35;
    ctx.beginPath();
    ctx.moveTo(x, cy - (isMaj ? 12 : 5));
    ctx.lineTo(x, cy);
    ctx.stroke();

    const label = COMPASS_DIRS.find(e => e[0] === norm);
    if(label) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = C_CYAN;
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(label[1], x, cy - 16);
    }
  }
  ctx.restore();

  // Ago centrale (magenta)
  ctx.globalAlpha = 1;
  ctx.strokeStyle = C_MAGENTA;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy - 24);
  ctx.lineTo(cx, cy + 2);
  ctx.stroke();

  // Triangolo
  ctx.fillStyle = C_MAGENTA;
  ctx.beginPath();
  ctx.moveTo(cx - 5, cy + 2);
  ctx.lineTo(cx + 5, cy + 2);
  ctx.lineTo(cx, cy + 9);
  ctx.closePath();
  ctx.fill();

  // Testo heading
  ctx.fillStyle   = C_MAGENTA;
  ctx.font        = 'bold 13px Courier New';
  ctx.textAlign   = 'center';
  ctx.fillText(compassLabel(deg), cx, cy + 24);

  ctx.fillStyle = C_CYAN;
  ctx.font      = '10px Courier New';
  ctx.fillText(String(Math.round(((deg % 360) + 360) % 360)).padStart(3, '0') + '°', cx, cy + 37);
}

// ── ABILITY OVERLAY ──────────────────────────────────────
function drawAbility(alpha) {
  if(alpha < 0.01) return;
  ctx.globalAlpha = alpha;

  // Tinta generale
  ctx.fillStyle = 'rgba(255, 20, 200, 0.07)';
  ctx.fillRect(0, 0, HW, HH);

  // Scanlines orizzontali
  ctx.fillStyle = 'rgba(255, 20, 200, 0.025)';
  for(let y = 0; y < HH; y += 4) ctx.fillRect(0, y, HW, 1);

  ctx.strokeStyle = C_MAGENTA;
  ctx.lineWidth   = 1.5;

  // ── Cornice sinistra ──
  ctx.setLineDash([8, 5]);
  ctx.strokeRect(5, 5, 86, HH - 10);
  ctx.setLineDash([]);

  // Tacche orizzontali cornice sinistra
  [90, HH - 90].forEach(y => {
    ctx.beginPath(); ctx.moveTo(5, y); ctx.lineTo(32, y); ctx.stroke();
  });

  // Croci pixel cornice sinistra
  [[46, HH/2 - 34, 0.9], [46, HH/2 + 34, 0.5]].forEach(([x, y, a]) => {
    ctx.globalAlpha = alpha * a;
    ctx.fillStyle   = C_MAGENTA;
    ctx.fillRect(x - 6, y - 2, 12, 4);
    ctx.fillRect(x - 2, y - 6, 4, 12);
  });

  // ── Cornice destra ──
  ctx.globalAlpha = alpha;
  ctx.setLineDash([8, 5]);
  ctx.strokeRect(HW - 91, 5, 86, HH - 10);
  ctx.setLineDash([]);

  [90, HH - 90].forEach(y => {
    ctx.beginPath(); ctx.moveTo(HW - 5, y); ctx.lineTo(HW - 32, y); ctx.stroke();
  });

  [[HW - 46, HH/2 - 34, 0.9], [HW - 46, HH/2 + 34, 0.5]].forEach(([x, y, a]) => {
    ctx.globalAlpha = alpha * a;
    ctx.fillStyle   = C_MAGENTA;
    ctx.fillRect(x - 6, y - 2, 12, 4);
    ctx.fillRect(x - 2, y - 6, 4, 12);
  });

  ctx.globalAlpha = alpha;
  ctx.strokeStyle = C_MAGENTA;

  // ── HUD centrale in alto ──
  const mx = HW / 2;
  const ty = 140;

  // Cerchi indicatori sx
  [mx - 104, mx - 80].forEach(cx => {
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, ty, 10, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, ty,  4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, ty-10); ctx.lineTo(cx, ty-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+10, ty); ctx.lineTo(cx+6,  ty); ctx.stroke();
  });

  // Cerchi indicatori dx
  [mx + 80, mx + 104].forEach(cx => {
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, ty, 10, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, ty,  4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, ty-10); ctx.lineTo(cx, ty-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-10, ty); ctx.lineTo(cx-6,  ty); ctx.stroke();
  });

  // Barre segmentate
  function segs(x, y, n, on, dim) {
    for(let i = 0; i < n; i++) {
      const sx = x + i * 19;
      ctx.strokeStyle = i < on ? C_YELLOW : C_MAGENTA;
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, y, 17, 9);
      if(i < on) {
        ctx.fillStyle = C_YELLOW;
        ctx.fillRect(sx+1, y+1, 15, 7);
      } else if(i < on + dim) {
        ctx.fillStyle = 'rgba(255,238,0,0.3)';
        ctx.fillRect(sx+1, y+1, 15, 7);
      }
    }
  }
  const by = ty - 7;
  segs(mx - 124, by, 9, 7, 0);
  segs(mx + 14,  by, 9, 6, 1);

  // Divisori centrali e label
  ctx.strokeStyle = C_MAGENTA; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(mx - 8, by); ctx.lineTo(mx - 8, by + 13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx + 8, by); ctx.lineTo(mx + 8, by + 13); ctx.stroke();
  ctx.fillStyle = C_MAGENTA; ctx.font = '9px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('01', mx, by + 11);

  // Segs centrali
  segs(mx - 28, ty + 7, 3, 3, 0);

  // Fila di punti
  for(let i = -3; i <= 3; i++) {
    ctx.globalAlpha = alpha * (i === 0 ? 1 : 0.5);
    ctx.fillStyle   = C_MAGENTA;
    const sz = i === 0 ? 4 : 3;
    ctx.fillRect(mx + i*8 - sz/2, ty + 22, sz, sz);
  }
  ctx.globalAlpha = alpha;

  // ── Mirini laterali ──
  function crosshair(cx, cy) {
    const s = 30;
    ctx.strokeStyle = C_MAGENTA; ctx.lineWidth = 2;
    // Quattro angoli
    ctx.strokeRect(cx - s,      cy - s,      14, 14);
    ctx.strokeRect(cx + s - 14, cy - s,      14, 14);
    ctx.strokeRect(cx - s,      cy + s - 14, 14, 14);
    ctx.strokeRect(cx + s - 14, cy + s - 14, 14, 14);
    // Crocette centrali
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, cy - s + 5); ctx.lineTo(cx, cy - s/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy + s/2);   ctx.lineTo(cx, cy + s - 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - s + 5, cy); ctx.lineTo(cx - s/2, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + s/2,   cy); ctx.lineTo(cx + s - 5, cy); ctx.stroke();
  }
  crosshair(148, HH/2);
  crosshair(HW - 148, HH/2);

  // ── Angoli di scansione ──
  function scanCorner(x, y, fx, fy) {
    ctx.strokeStyle = C_MAGENTA; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + fy*22);
    ctx.lineTo(x, y);
    ctx.lineTo(x + fx*22, y);
    ctx.stroke();
  }
  scanCorner(HW*0.17, HH*0.20,  1,  1);
  scanCorner(HW*0.83, HH*0.20, -1,  1);
  scanCorner(HW*0.17, HH*0.80,  1, -1);
  scanCorner(HW*0.83, HH*0.80, -1, -1);

  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
}

// ── DEBUG 3D (ancorato come la bussola) ──────────────────
function drawDebug(lOk, rOk, dist, touching) {
  const x = 30, y = HH - 80;
  ctx.fillStyle   = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x - 6, y - 16, 260, 70);
  ctx.fillStyle   = C_CYAN;
  ctx.font        = '11px Courier New';
  ctx.textAlign   = 'left';
  ctx.globalAlpha = 0.8;
  ctx.fillText('MANO SX: ' + (lOk ? 'RILEVATA' : '—'),       x, y);
  ctx.fillText('MANO DX: ' + (rOk ? 'RILEVATA' : '—'),       x, y + 18);
  ctx.fillText('DIST:    ' + dist.toFixed(3) + 'm ' + (touching ? '◆ TOCCO' : ''), x, y + 36);
  ctx.fillStyle   = touching ? C_MAGENTA : C_CYAN;
  ctx.fillText('ABILITÀ: ' + (abilityOn ? 'ON' : 'OFF'),     x, y + 54);
  ctx.globalAlpha = 1;
}

// ── DRAW FRAME ───────────────────────────────────────────
let debugL = false, debugR = false, debugDist = 999, debugTouch = false;

function drawFrame() {
  ctx.clearRect(0, 0, HW, HH);
  drawCompass(heading);
  if(abilityAlpha > 0.01) drawAbility(abilityAlpha);
  drawDebug(debugL, debugR, debugDist, debugTouch);
}

// ═══════════════════════════════════════════════════════════
// RENDER — carica hud canvas come texture e disegna quad
// ═══════════════════════════════════════════════════════════
function renderHUD(framebuffer, x, y, w, h) {
  gl.bindTexture(gl.TEXTURE_2D, hudTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hud);

  gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);
  gl.viewport(x, y, w, h);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(aPosLoc);
  gl.vertexAttribPointer(aPosLoc, 2, gl.FLOAT, false, 0, 0);
  gl.uniform1i(uTexLoc, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let actx = null;
function initAudio() {
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
}
function playAbilitySound() {
  if(!actx) return;
  const t = actx.currentTime;
  // Sweep ascendente
  const o1 = actx.createOscillator(), g1 = actx.createGain();
  o1.connect(g1); g1.connect(actx.destination);
  o1.frequency.setValueAtTime(200, t);
  o1.frequency.exponentialRampToValueAtTime(1800, t + 0.3);
  g1.gain.setValueAtTime(0.3, t);
  g1.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o1.start(t); o1.stop(t + 0.5);
  // Sub
  const o2 = actx.createOscillator(), g2 = actx.createGain();
  o2.type = 'square'; o2.connect(g2); g2.connect(actx.destination);
  o2.frequency.setValueAtTime(80, t + 0.15);
  o2.frequency.exponentialRampToValueAtTime(40, t + 0.5);
  g2.gain.setValueAtTime(0.18, t + 0.15);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o2.start(t + 0.15); o2.stop(t + 0.6);
  // Ping
  const o3 = actx.createOscillator(), g3 = actx.createGain();
  o3.connect(g3); g3.connect(actx.destination);
  o3.frequency.setValueAtTime(2400, t + 0.05);
  g3.gain.setValueAtTime(0.12, t + 0.05);
  g3.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o3.start(t + 0.05); o3.stop(t + 0.35);
}

// ═══════════════════════════════════════════════════════════
// ABILITY TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleAbility() {
  abilityOn = !abilityOn;
  if(abilityOn) playAbilitySound();
}
// Desktop: spazio
document.addEventListener('keydown', e => {
  if(e.code === 'Space') { initAudio(); toggleAbility(); }
});

// ═══════════════════════════════════════════════════════════
// HAND TRACKING — dito sinistro tocca palmo destro
// ═══════════════════════════════════════════════════════════
function getJointPos(hand, name) {
  try { return hand.get(name).transform.position; }
  catch(e) { return null; }
}

function dist3D(a, b) {
  if(!a || !b) return 999;
  return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
}

// Centro del palmo destro: media wrist + index metacarpal
function getRightPalm(hand) {
  const w = getJointPos(hand, 'wrist');
  const m = getJointPos(hand, 'index-finger-metacarpal');
  if(!w) return null;
  if(!m) return w;
  return { x:(w.x+m.x)/2, y:(w.y+m.y)/2, z:(w.z+m.z)/2 };
}

// Controlla se QUALSIASI joint della mano sinistra è vicino al palmo destro
const LEFT_JOINTS = [
  'wrist',
  'thumb-tip',
  'index-finger-tip',
  'index-finger-phalanx-proximal',
  'middle-finger-tip',
  'middle-finger-phalanx-proximal',
  'ring-finger-tip',
  'pinky-finger-tip',
];

function checkTwoHandTouch(leftHand, rightHand) {
  const palm = getRightPalm(rightHand);
  if(!palm) return { hit: false, dist: 999 };
  let minDist = 999;
  for(const j of LEFT_JOINTS) {
    const p = getJointPos(leftHand, j);
    const d = dist3D(p, palm);
    if(d < minDist) minDist = d;
  }
  return { hit: minDist < 0.10, dist: minDist };
}

// Debounce: deve restare in tocco per 3 frame
let touchFrames  = 0;
let touchFired   = false;

// ═══════════════════════════════════════════════════════════
// XR SESSION
// ═══════════════════════════════════════════════════════════
let xrSession   = null;
let xrRefSpace  = null;
let xrGLLayer   = null;

function xrFrame(time, frame) {
  xrSession.requestAnimationFrame(xrFrame);

  // Smooth ability alpha
  abilityAlpha += ((abilityOn ? 1 : 0) - abilityAlpha) * 0.12;

  // Heading dalla testa
  const pose = frame.getViewerPose(xrRefSpace);
  if(pose) {
    const q = pose.transform.orientation;
    const yaw = Math.atan2(
      2 * (q.w * q.y + q.z * q.x),
      1 - 2 * (q.y * q.y + q.x * q.x)
    );
    heading = ((-yaw * 180 / Math.PI) + 360) % 360;
  }

  // Raccogli mani
  let leftHand = null, rightHand = null;
  for(const src of xrSession.inputSources) {
    if(!src.hand) continue;
    if(src.handedness === 'left')  leftHand  = src.hand;
    if(src.handedness === 'right') rightHand = src.hand;
  }

  // Gesto: dito sinistro su palmo destro
  debugL = !!leftHand;
  debugR = !!rightHand;
  debugDist = 999;
  debugTouch = false;

  if(leftHand && rightHand) {
    const { hit, dist } = checkTwoHandTouch(leftHand, rightHand);
    debugDist  = dist;
    debugTouch = hit;
    if(hit) {
      touchFrames++;
      if(touchFrames >= 3 && !touchFired) {
        touchFired = true;
        initAudio();
        toggleAbility();
      }
    } else {
      touchFrames = 0;
      touchFired  = false;
    }
  } else {
    touchFrames = 0;
    touchFired  = false;
  }

  // Disegna HUD sul canvas 2D
  drawFrame();

  // Renderizza su ogni viewport (occhio sinistro + destro)
  if(pose && xrGLLayer) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, xrGLLayer.framebuffer);
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    for(const view of pose.views) {
      const vp = xrGLLayer.getViewport(view);
      renderHUD(xrGLLayer.framebuffer, vp.x, vp.y, vp.width, vp.height);
    }
  }
}

async function startXR() {
  initAudio();
  const btn = document.getElementById('enterbtn');
  btn.textContent = 'AVVIO...';
  btn.disabled = true;

  try { await gl.makeXRCompatible(); } catch(e) {}

  const attempts = [
    ['immersive-ar', { requiredFeatures:['local'], optionalFeatures:['hand-tracking'] }],
    ['immersive-vr', { requiredFeatures:['local'], optionalFeatures:['hand-tracking'] }],
    ['immersive-vr', { requiredFeatures:['local-floor'], optionalFeatures:['hand-tracking'] }],
  ];

  for(const [mode, opts] of attempts) {
    try {
      const ok = await navigator.xr.isSessionSupported(mode).catch(() => false);
      if(!ok) continue;

      xrSession = await navigator.xr.requestSession(mode, opts);
      xrGLLayer = new XRWebGLLayer(xrSession, gl);
      await xrSession.updateRenderState({ baseLayer: xrGLLayer });

      const rsType = opts.requiredFeatures.includes('local-floor') ? 'local-floor' : 'local';
      xrRefSpace = await xrSession.requestReferenceSpace(rsType);

      xrSession.addEventListener('end', () => {
        xrSession = null; xrGLLayer = null; xrRefSpace = null;
        btn.textContent = 'ENTRA IN VR';
        btn.disabled = false;
        btn.style.display = 'block';
        desktopLoop();
      });

      xrSession.requestAnimationFrame(xrFrame);
      btn.style.display = 'none';
      return;

    } catch(e) { continue; }
  }

  btn.textContent = 'ERRORE — riprova';
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════
// DESKTOP PREVIEW
// ═══════════════════════════════════════════════════════════
function desktopLoop() {
  if(xrSession) return;
  abilityAlpha += ((abilityOn ? 1 : 0) - abilityAlpha) * 0.12;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  drawFrame();
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0.04, 0.04, 0.06, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  renderHUD(null, 0, 0, canvas.width, canvas.height);
  requestAnimationFrame(desktopLoop);
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  desktopLoop();
  setTimeout(() => {
    const boot = document.getElementById('boot');
    boot.style.opacity = '0';
    setTimeout(() => boot.style.display = 'none', 800);
    const btn = document.getElementById('enterbtn');
    btn.style.display = 'block';
    if(!navigator.xr) {
      btn.textContent = 'WebXR NON DISPONIBILE';
      btn.disabled = true;
    } else {
      btn.addEventListener('click', startXR);
    }
  }, 5200);
});
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XR Test</title>
<style>
body { background:#000; color:#0ff; font-family:monospace; padding:20px; }
#log { font-size:12px; line-height:2; }
button { background:transparent; border:1px solid #0ff; color:#0ff; font-family:monospace; font-size:14px; padding:12px 24px; cursor:pointer; margin:8px; display:block; }
</style>
</head>
<body>
<div id="log">Checking XR support...<br></div>
<div id="buttons"></div>
<script>
const log = document.getElementById('log');
const btns = document.getElementById('buttons');

function print(msg) {
  log.innerHTML += msg + '<br>';
}

async function trySession(mode, features, optional) {
  print('→ Trying: ' + mode + ' | required: ' + JSON.stringify(features) + ' | optional: ' + JSON.stringify(optional));
  try {
    const sess = await navigator.xr.requestSession(mode, {
      requiredFeatures: features,
      optionalFeatures: optional
    });
    print('<span style="color:#0f0">✓ SUCCESS: ' + mode + '</span>');
    sess.addEventListener('end', () => print('Session ended'));
    const ref = await sess.requestReferenceSpace(features.includes('local-floor') ? 'local-floor' : 'local');
    print('✓ Reference space OK');
    
    sess.requestAnimationFrame(function frame(t, xrFrame) {
      sess.requestAnimationFrame(frame);
    });
    return true;
  } catch(e) {
    print('<span style="color:#f44">✗ FAIL: ' + e.message + '</span>');
    return false;
  }
}

async function checkSupport() {
  if (!navigator.xr) { print('✗ navigator.xr not available'); return; }
  print('✓ navigator.xr available');

  const modes = ['immersive-vr', 'immersive-ar', 'inline'];
  for (const m of modes) {
    const ok = await navigator.xr.isSessionSupported(m).catch(e => false);
    print((ok ? '✓' : '✗') + ' isSessionSupported(' + m + '): ' + ok);
  }

  // Add test buttons
  const tests = [
    { label: 'VR + local + hand-tracking optional', mode: 'immersive-vr', req: ['local'], opt: ['hand-tracking'] },
    { label: 'VR + local-floor + hand-tracking optional', mode: 'immersive-vr', req: ['local-floor'], opt: ['hand-tracking'] },
    { label: 'VR + local only', mode: 'immersive-vr', req: ['local'], opt: [] },
    { label: 'AR + local + hand optional', mode: 'immersive-ar', req: ['local'], opt: ['hand-tracking'] },
    { label: 'AR + local only', mode: 'immersive-ar', req: ['local'], opt: [] },
  ];

  tests.forEach(t => {
    const b = document.createElement('button');
    b.textContent = 'TEST: ' + t.label;
    b.onclick = () => trySession(t.mode, t.req, t.opt);
    btns.appendChild(b);
  });
}

checkSupport();
</script>
</body>
</html>

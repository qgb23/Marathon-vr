<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathon — Destroyer Helmet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas#glcanvas { position:fixed; inset:0; width:100%; height:100%; display:block; }

#boot {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; color:#ff2afc;
  transition: opacity 0.8s;
}
.b-sub  { font-size:10px; letter-spacing:4px; color:#00e8ff; margin-bottom:24px; opacity:0; animation:fi 0.4s 0.4s forwards; }
.b-title{ font-size:32px; letter-spacing:10px; color:#ff2afc; margin-bottom:44px; opacity:0; animation:fi 0.4s 0.9s forwards; }
.b-lines{ display:flex; flex-direction:column; align-items:flex-start; }
.b-line { font-size:10px; letter-spacing:2px; color:#00e8ff; margin:5px 0; display:flex; align-items:center; gap:8px; opacity:0; }
.b-line:nth-child(1){animation:fi 0.3s 1.4s forwards;}
.b-line:nth-child(2){animation:fi 0.3s 1.8s forwards;}
.b-line:nth-child(3){animation:fi 0.3s 2.2s forwards;}
.b-line:nth-child(4){animation:fi 0.3s 2.6s forwards;}
.b-line:nth-child(5){animation:fi 0.3s 3.0s forwards;}
.b-dot  { width:5px; height:5px; border-radius:50%; background:#ff2afc; flex-shrink:0; }
.b-bwrap{ width:280px; height:2px; background:#1a001a; margin-top:36px; opacity:0; animation:fi 0.3s 3.2s forwards; }
.b-bar  { height:100%; width:0; background:#ff2afc; animation:lb 1s 3.4s forwards; }
.b-ready{ font-size:10px; letter-spacing:5px; color:#ff2afc; margin-top:16px; opacity:0; animation:fi 0.5s 4.5s forwards; }
@keyframes fi { to{opacity:1;} }
@keyframes lb { to{width:100%;} }

#enterbtn {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:transparent; border:1px solid #ff2afc;
  color:#ff2afc; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:3px; padding:12px 32px;
  cursor:pointer; z-index:200; display:none;
}
#enterbtn:disabled { opacity:0.4; cursor:default; }
#dbg {
  position:fixed; bottom:16px; right:16px;
  font-size:9px; color:rgba(0,232,255,0.5);
  letter-spacing:1px; line-height:2;
  z-index:200; text-align:right; display:none;
}
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>

<div id="boot">
  <div class="b-sub">BUNGIE // MARATHON SYSTEMS</div>
  <div class="b-title">DESTROYER</div>
  <div class="b-lines">
    <div class="b-line"><div class="b-dot"></div>NEURAL LINK............OK</div>
    <div class="b-line"><div class="b-dot"></div>SHIELD ARRAY...........OK</div>
    <div class="b-line"><div class="b-dot"></div>SENSOR SUITE...........OK</div>
    <div class="b-line"><div class="b-dot"></div>HAND TRACKING..........OK</div>
    <div class="b-line"><div class="b-dot"></div>HUD CALIBRATING.......</div>
  </div>
  <div class="b-bwrap"><div class="b-bar"></div></div>
  <div class="b-ready">SYSTEM READY</div>
</div>

<button id="enterbtn">ENTRA IN VR</button>
<div id="dbg">
  <div id="d-l">SX: —</div>
  <div id="d-r">DX: —</div>
  <div id="d-a">ABILITÀ: OFF</div>
</div>

<script>
// ============================================================
// 2D CANVAS HUD — rendered into WebGL texture each frame
// ============================================================
const W = 1280, H = 720;
const hud2d = document.createElement('canvas');
hud2d.width = W; hud2d.height = H;
const ctx = hud2d.getContext('2d');

// State
let heading    = 90;
let abilityOn  = false;
let abilityAlpha = 0;
let frameCount = 0;

// ---- DRAW COMPASS ----
const CDIRS = [
  [0,'N'],[45,'NE'],[90,'E'],[135,'SE'],
  [180,'S'],[225,'SO'],[270,'O'],[315,'NO']
];

function drawCompass(deg) {
  const cx = W/2, cy = 38;
  const trackW = 320, tickW = 20;

  ctx.save();
  ctx.beginPath();
  ctx.rect(cx - trackW/2, cy - 20, trackW, 40);
  ctx.clip();

  // Draw ticks from -360 to +720 for wrap
  for(let d = -360; d <= 720; d += 22.5) {
    const norm = ((d % 360) + 360) % 360;
    const isMajor = (norm % 45 === 0);
    const label = CDIRS.find(x => x[0] === norm);

    // position relative to current heading
    const delta = d - deg;
    if(Math.abs(delta) > 200) continue;
    const x = cx + delta * (trackW / 180);

    ctx.strokeStyle = '#00e8ff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = isMajor ? 0.9 : 0.35;
    ctx.beginPath();
    ctx.moveTo(x, cy - (isMajor ? 10 : 5));
    ctx.lineTo(x, cy + 2);
    ctx.stroke();

    if(label) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#00e8ff';
      ctx.font = 'bold 13px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(label[1], x, cy - 14);
    }
  }
  ctx.restore();

  // Center needle
  ctx.strokeStyle = '#ff2afc';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy - 20);
  ctx.lineTo(cx, cy + 4);
  ctx.stroke();

  // Notch triangle
  ctx.fillStyle = '#ff2afc';
  ctx.beginPath();
  ctx.moveTo(cx - 5, cy + 4);
  ctx.lineTo(cx + 5, cy + 4);
  ctx.lineTo(cx, cy + 10);
  ctx.closePath();
  ctx.fill();

  // Heading label
  ctx.fillStyle = '#ff2afc';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(hdgLabel(deg), cx, cy + 26);
  ctx.fillStyle = '#00e8ff';
  ctx.font = '11px Courier New';
  ctx.fillText(String(Math.round(deg)).padStart(3,'0') + '°', cx, cy + 40);
}

function hdgLabel(d) {
  d=((d%360)+360)%360;
  if(d<22)return'N';if(d<67)return'NE';if(d<112)return'E';
  if(d<157)return'SE';if(d<202)return'S';if(d<247)return'SO';
  if(d<292)return'O';return'NO';
}

// ---- DRAW ABILITY OVERLAY ----
function drawAbility(alpha) {
  if(alpha <= 0) return;
  ctx.globalAlpha = alpha;

  // Full tint
  ctx.fillStyle = 'rgba(255,20,180,0.07)';
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  ctx.fillStyle = 'rgba(255,20,180,0.025)';
  for(let y=0; y<H; y+=4) { ctx.fillRect(0, y, W, 1); }

  const MC = '#ff2afc';
  ctx.strokeStyle = MC;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 5]);

  // Left frame
  ctx.strokeRect(4, 4, 88, H - 8);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(4,90); ctx.lineTo(30,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,H-90); ctx.lineTo(30,H-90); ctx.stroke();

  // Right frame
  ctx.setLineDash([8, 5]);
  ctx.strokeRect(W-92, 4, 88, H - 8);
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(W-4,90); ctx.lineTo(W-30,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-4,H-90); ctx.lineTo(W-30,H-90); ctx.stroke();

  // Pixel crosses on frames
  function pixelCross(x, y, a) {
    ctx.globalAlpha = alpha * a;
    ctx.fillStyle = MC;
    ctx.fillRect(x-6, y-2, 12, 4);
    ctx.fillRect(x-2, y-6, 4, 12);
  }
  pixelCross(46, H/2 - 30, 0.9);
  pixelCross(46, H/2 + 30, 0.5);
  pixelCross(W-46, H/2 - 30, 0.9);
  pixelCross(W-46, H/2 + 30, 0.5);
  ctx.globalAlpha = alpha;

  // Center top HUD
  const midX = W/2, topY = 110;

  // Circle indicators left + right
  function drawCircle(cx, cy) {
    ctx.strokeStyle = MC; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx, cy-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+10, cy); ctx.lineTo(cx+6, cy); ctx.stroke();
  }
  drawCircle(midX-100, topY); drawCircle(midX-76, topY);
  drawCircle(midX+76, topY); drawCircle(midX+100, topY);

  // Segment bars
  function drawSegs(x, y, total, on, dim) {
    for(let i=0; i<total; i++){
      const sx = x + i*(19);
      ctx.strokeStyle = i<on ? '#ffee00' : MC;
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, y, 17, 9);
      if(i < on) { ctx.fillStyle='#ffee00'; ctx.fillRect(sx+1,y+1,15,7); }
      else if(i < on+dim) { ctx.fillStyle='rgba(255,238,0,0.3)'; ctx.fillRect(sx+1,y+1,15,7); }
    }
  }
  const bY = topY - 5;
  drawSegs(midX - 118, bY, 9, 7, 0);
  drawSegs(midX + 10, bY, 9, 6, 1);

  // Vertical dividers
  ctx.strokeStyle = MC; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(midX-6, bY); ctx.lineTo(midX-6, bY+13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX+6, bY); ctx.lineTo(midX+6, bY+13); ctx.stroke();
  ctx.fillStyle = MC; ctx.font = '9px Courier New'; ctx.textAlign='center';
  ctx.fillText('01', midX, bY+11);

  // Bottom segs
  drawSegs(midX - 28, topY + 10, 3, 3, 0);

  // Dot row
  for(let i=-3; i<=3; i++){
    ctx.globalAlpha = alpha * (i===0 ? 1 : 0.5);
    ctx.fillStyle = MC;
    const sz = i===0 ? 4 : 3;
    ctx.fillRect(midX + i*8 - sz/2, topY + 24, sz, sz);
  }
  ctx.globalAlpha = alpha;

  // Big crosshairs
  function drawXhair(cx, cy) {
    const s = 30;
    ctx.strokeStyle = MC; ctx.lineWidth = 2;
    // corner brackets
    [[0,0],[s,0],[0,s],[s,s]].forEach(([dx,dy]) => {
      ctx.strokeRect(cx - s/2 + dx - s/2, cy - s/2 + dy - s/2, 15, 15);
    });
    // center lines
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, cy-s/2+5); ctx.lineTo(cx, cy-s/4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy+s/4); ctx.lineTo(cx, cy+s/2-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-s/2+5, cy); ctx.lineTo(cx-s/4, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s/4, cy); ctx.lineTo(cx+s/2-5, cy); ctx.stroke();
  }
  drawXhair(130, H/2);
  drawXhair(W-130, H/2);

  // Scan corners
  function scanCorner(x, y, fx, fy) {
    ctx.strokeStyle = MC; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + fy*22);
    ctx.lineTo(x, y);
    ctx.lineTo(x + fx*22, y);
    ctx.stroke();
  }
  const ml=W*0.18, mr=W*0.82, mt=H*0.2, mb=H*0.78;
  scanCorner(ml, mt, 1, 1);
  scanCorner(mr, mt,-1, 1);
  scanCorner(ml, mb, 1,-1);
  scanCorner(mr, mb,-1,-1);

  ctx.globalAlpha = 1;
}

// ---- DRAW ENEMY BOX ----
let enemyBBox = null; // {x,y,w,h} in 0-1 space

function drawEnemyBox() {
  if(!abilityOn || !enemyBBox) return;
  const {x,y,w,h} = enemyBBox;
  const px = x*W, py = y*H, pw = w*W, ph = h*H;
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.9;
  ctx.strokeRect(px, py, pw, ph);
  // Corner accents
  const cs = 10;
  ctx.lineWidth = 3;
  [[px,py,1,1],[px+pw,py,-1,1],[px,py+ph,1,-1],[px+pw,py+ph,-1,-1]].forEach(([bx,by,sx,sy]) => {
    ctx.beginPath(); ctx.moveTo(bx+sx*cs, by); ctx.lineTo(bx, by); ctx.lineTo(bx, by+sy*cs); ctx.stroke();
  });
  ctx.fillStyle = '#ff2222';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('NEMICO', px+2, py - 6);
  ctx.globalAlpha = 1;
}

// ---- MAIN HUD DRAW ----
function drawHUD() {
  ctx.clearRect(0, 0, W, H);
  drawCompass(heading);
  if(abilityAlpha > 0) drawAbility(abilityAlpha);
  if(abilityOn) drawEnemyBox();
}

// ============================================================
// WEBGL SETUP — renders hud2d as fullscreen quad
// ============================================================
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl', { xrCompatible:true, alpha:true, premultipliedAlpha:false });

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main(){
    v_uv = vec2(a_pos.x*.5+.5, .5-a_pos.y*.5);
    gl_Position = vec4(a_pos,0,1);
  }`;
const fsrc = `
  precision mediump float;
  uniform sampler2D u_tex;
  varying vec2 v_uv;
  void main(){ gl_FragColor = texture2D(u_tex, v_uv); }`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s); return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const apos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(apos);
gl.vertexAttribPointer(apos, 2, gl.FLOAT, false, 0, 0);

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

function uploadHUD() {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hud2d);
}

function renderFrame(glLayer) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer ? glLayer.framebuffer : null);

  const vw = glLayer ? glLayer.framebufferWidth  : canvas.width;
  const vh = glLayer ? glLayer.framebufferHeight : canvas.height;
  gl.viewport(0, 0, vw, vh);

  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.vertexAttribPointer(apos, 2, gl.FLOAT, false, 0, 0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(gl.getUniformLocation(prog,'u_tex'), 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// Desktop preview loop
function desktopLoop() {
  if(xrSession) return;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  drawHUD();
  uploadHUD();
  renderFrame(null);
  requestAnimationFrame(desktopLoop);
}

// ============================================================
// AUDIO
// ============================================================
let actx = null;
function initAudio() { if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }

function playAbility() {
  if(!actx) return;
  const t = actx.currentTime;
  [[200,1800,0.3,0],[80,40,0.18,0.2],[2400,2400,0.12,0.1]].forEach(([f0,f1,g,delay],i) => {
    const o = actx.createOscillator();
    const gn = actx.createGain();
    if(i===1) o.type='square';
    o.connect(gn); gn.connect(actx.destination);
    o.frequency.setValueAtTime(f0, t+delay);
    o.frequency.exponentialRampToValueAtTime(f1, t+delay+0.35);
    gn.gain.setValueAtTime(g, t+delay);
    gn.gain.exponentialRampToValueAtTime(0.001, t+delay+0.6);
    o.start(t+delay); o.stop(t+delay+0.7);
  });
}

// ============================================================
// ABILITY TOGGLE
// ============================================================
function toggleAbility() {
  abilityOn = !abilityOn;
  document.getElementById('d-a').textContent = 'ABILITÀ: '+(abilityOn?'ON':'OFF');
  if(abilityOn) playAbility();
  // Animate alpha
  const target = abilityOn ? 1 : 0;
  const step = () => {
    abilityAlpha += (target - abilityAlpha) * 0.15;
    if(Math.abs(abilityAlpha - target) > 0.01) requestAnimationFrame(step);
    else abilityAlpha = target;
  };
  step();
}

document.addEventListener('keydown', e => { if(e.code==='Space'){ initAudio(); toggleAbility(); }});

// ============================================================
// HAND TRACKING
// ============================================================
function isFist(hand) {
  const tips  = ['index-finger-tip','middle-finger-tip','ring-finger-tip','pinky-finger-tip'];
  const bases = ['index-finger-metacarpal','middle-finger-metacarpal','ring-finger-metacarpal','pinky-finger-metacarpal'];
  let n = 0;
  for(let i=0;i<4;i++){
    try {
      const tp = hand.get(tips[i]).transform.position;
      const bp = hand.get(bases[i]).transform.position;
      if(Math.hypot(tp.x-bp.x,tp.y-bp.y,tp.z-bp.z) < 0.065) n++;
    } catch(e){}
  }
  return n >= 3;
}

function isPinch(hand) {
  try {
    const th = hand.get('thumb-tip').transform.position;
    const ix = hand.get('index-finger-tip').transform.position;
    return Math.hypot(th.x-ix.x,th.y-ix.y,th.z-ix.z) < 0.028;
  } catch(e){ return false; }
}

let prevPinchR = false;

// ============================================================
// WEBXR SESSION
// ============================================================
let xrSession  = null;
let xrRefSpace = null;
let glLayer    = null;

async function onXRFrame(t, frame) {
  xrSession.requestAnimationFrame(onXRFrame);
  frameCount++;

  // Update ability alpha smoothly
  const target = abilityOn ? 1 : 0;
  abilityAlpha += (target - abilityAlpha) * 0.12;

  // Head orientation → compass
  const pose = frame.getViewerPose(xrRefSpace);
  if(pose) {
    const q = pose.transform.orientation;
    const yaw = Math.atan2(2*(q.w*q.y+q.z*q.x), 1-2*(q.y*q.y+q.x*q.x));
    heading = ((-yaw*180/Math.PI)+360)%360;
  }

  // Hand tracking
  for(const src of xrSession.inputSources) {
    if(!src.hand) continue;
    if(src.handedness === 'right') {
      const pinch = isPinch(src.hand);
      document.getElementById('d-r').textContent = 'DX: '+(pinch?'PINCH':'—');
      if(pinch && !prevPinchR) { initAudio(); toggleAbility(); }
      prevPinchR = pinch;
    }
    if(src.handedness === 'left') {
      const fist = isFist(src.hand);
      document.getElementById('d-l').textContent = 'SX: '+(fist?'PUGNO':'—');
    }
  }

  // Draw HUD to 2D canvas, upload to GL, render
  drawHUD();
  uploadHUD();

  // Render to each view (stereo)
  const views = pose ? pose.views : [];
  if(views.length > 0) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
    gl.clearColor(0,0,0,0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    for(const view of views) {
      const vp = glLayer.getViewport(view);
      gl.viewport(vp.x, vp.y, vp.width, vp.height);
      gl.useProgram(prog);
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.vertexAttribPointer(apos, 2, gl.FLOAT, false, 0, 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.uniform1i(gl.getUniformLocation(prog,'u_tex'), 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
  } else {
    renderFrame(glLayer);
  }
}

async function startXR() {
  initAudio();
  const btn = document.getElementById('enterbtn');
  btn.textContent = 'AVVIO...'; btn.disabled = true;

  try { await gl.makeXRCompatible(); } catch(e){}

  const attempts = [
    ['immersive-ar', { requiredFeatures:['local'], optionalFeatures:['hand-tracking'] }],
    ['immersive-vr', { requiredFeatures:['local'], optionalFeatures:['hand-tracking'] }],
    ['immersive-vr', { requiredFeatures:['local-floor'], optionalFeatures:['hand-tracking'] }],
  ];

  for(const [mode, opts] of attempts) {
    try {
      const ok = await navigator.xr.isSessionSupported(mode).catch(()=>false);
      if(!ok) continue;
      xrSession = await navigator.xr.requestSession(mode, opts);
      glLayer   = new XRWebGLLayer(xrSession, gl);
      await xrSession.updateRenderState({ baseLayer: glLayer });
      xrRefSpace = await xrSession.requestReferenceSpace(
        opts.requiredFeatures.includes('local-floor') ? 'local-floor' : 'local'
      );
      xrSession.addEventListener('end', () => {
        xrSession = null; xrRefSpace = null; glLayer = null;
        btn.textContent = 'ENTRA IN VR'; btn.disabled = false; btn.style.display = 'block';
        desktopLoop();
      });
      xrSession.requestAnimationFrame(onXRFrame);
      btn.style.display = 'none';
      document.getElementById('dbg').style.display = 'block';
      return;
    } catch(e) { continue; }
  }

  btn.textContent = 'ENTRA IN VR'; btn.disabled = false;
  document.getElementById('dbg').textContent = 'Sessione XR fallita';
  document.getElementById('dbg').style.display = 'block';
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('load', () => {
  desktopLoop();
  setTimeout(() => {
    const boot = document.getElementById('boot');
    boot.style.opacity = '0';
    setTimeout(() => { boot.style.display = 'none'; }, 800);
    const btn = document.getElementById('enterbtn');
    btn.style.display = 'block';
    if(!navigator.xr) {
      btn.textContent = 'WebXR NON DISPONIBILE';
      btn.disabled = true;
    } else {
      btn.addEventListener('click', startXR);
    }
  }, 5200);
});

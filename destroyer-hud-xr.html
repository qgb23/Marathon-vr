<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Destroyer VR HUD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
#ui{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:10;
}
#btn{
  padding:16px 40px;
  border:2px solid #ff2d9b;
  background:transparent;
  color:#ff2d9b;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
}
#sub{
  color:rgba(255,255,255,.55);
  text-align:center;
  line-height:1.65;
  font-size:13px;
}
#err{
  display:none;
  color:#ff6b6b;
  text-align:center;
  max-width:380px;
  font-size:13px;
}
canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:none;
}
</style>
</head>
<body>

<div id="ui">
  <button id="btn" onclick="startAR()">Enter AR</button>
  <div id="sub">
    Quest 3 · immersive-ar · hand tracking<br>
    Tocca il palmo destro con l'indice sinistro
  </div>
  <div id="err"></div>
</div>

<canvas id="c"></canvas>

<script>
/* =========================================================
   CONFIG
========================================================= */
const ABILITY_DURATION = 8.0;
const TOUCH_DIST = 0.06;
const COOLDOWN_TOUCH = 1.5;

/* overlay plane in front of user */
const HUD_DISTANCE = -1.18;
const HUD_WIDTH    = 2.45;
const HUD_HEIGHT   = 1.35;
const HUD_Y_OFFSET = 0.04;

/* =========================================================
   STATE
========================================================= */
const S = {
  heading: 90,
  hudVisible: false,
  remain: 0,
  touchCool: 0,
  wasTouching: false,
  intro: 0,
  pulse: 0
};

/* =========================================================
   XR
========================================================= */
let session, gl, refSpace, handL, handR;
const canvas = document.getElementById('c');

async function startAR(){
  hideErr();

  if(!navigator.xr){
    showErr('WebXR non disponibile. Apri il file nel Meta Browser su Quest 3.');
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(!supported){
    showErr('immersive-ar non supportato.');
    return;
  }

  try{
    session = await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local','hand-tracking']
    });
  }catch(e){
    try{
      session = await navigator.xr.requestSession('immersive-ar',{
        requiredFeatures:['local']
      });
    }catch(e2){
      showErr('Errore sessione XR: ' + e2.message);
      return;
    }
  }

  document.getElementById('ui').style.display='none';
  canvas.style.display='block';

  gl = canvas.getContext('webgl2',{
    xrCompatible:true,
    alpha:true,
    premultipliedAlpha:false,
    antialias:true
  }) || canvas.getContext('webgl',{
    xrCompatible:true,
    alpha:true,
    premultipliedAlpha:false,
    antialias:true
  });

  await session.updateRenderState({
    baseLayer:new XRWebGLLayer(session, gl, { alpha:true })
  });

  refSpace = await session.requestReferenceSpace('local');

  initGL();
  session.requestAnimationFrame(xrFrame);

  document.addEventListener('keydown',function(e){
    if(e.code === 'Space') triggerAbility();
  });
}

function showErr(m){
  const e=document.getElementById('err');
  e.textContent=m;
  e.style.display='block';
}
function hideErr(){
  const e=document.getElementById('err');
  e.style.display='none';
}

/* =========================================================
   GESTURE
========================================================= */
function jp(hand,name,frame){
  if(!hand) return null;
  const joint = hand.get(name);
  if(!joint) return null;
  const pose = frame.getJointPose(joint, refSpace);
  if(!pose) return null;
  return pose.transform.position;
}
function d3(a,b){
  const dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z;
  return Math.sqrt(dx*dx+dy*dy+dz*dz);
}
function checkTouch(frame){
  if(S.touchCool>0) return;

  const iTip = jp(handL,'index-finger-tip',frame);
  const wR   = jp(handR,'wrist',frame);
  const mR   = jp(handR,'middle-finger-phalanx-proximal',frame);
  if(!iTip || !wR || !mR) return;

  const palm = {
    x:(wR.x+mR.x)*0.5,
    y:(wR.y+mR.y)*0.5,
    z:(wR.z+mR.z)*0.5
  };

  const dist = d3(iTip,palm);

  if(dist < TOUCH_DIST && !S.wasTouching){
    S.wasTouching = true;
    triggerAbility();
  }
  if(dist > TOUCH_DIST*1.8){
    S.wasTouching = false;
  }
}

function triggerAbility(){
  if(S.hudVisible) return;
  S.hudVisible = true;
  S.remain = ABILITY_DURATION;
  S.intro = 0;
  S.pulse = 0;
}

/* =========================================================
   GL
========================================================= */
const VERT = `
precision highp float;
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uProj;
varying vec2 vUV;
void main(){
  gl_Position = uProj * vec4(aPos,1.0);
  vUV = aUV;
}
`;

const FRAG = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
void main(){
  vec4 c = texture2D(uTex, vUV);
  gl_FragColor = vec4(c.rgb * c.a, c.a);
}
`;

let prog, vbo, tex, aPos, aUV, uProj, uTex_;

function initGL(){
  const vs = mkSh(gl.VERTEX_SHADER, VERT);
  const fs = mkSh(gl.FRAGMENT_SHADER, FRAG);

  prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  const hw = HUD_WIDTH * 0.5;
  const hh = HUD_HEIGHT * 0.5;
  const yb = -hh + HUD_Y_OFFSET;
  const yt =  hh + HUD_Y_OFFSET;

  vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -hw, yb, HUD_DISTANCE, 0,1,
     hw, yb, HUD_DISTANCE, 1,1,
    -hw, yt, HUD_DISTANCE, 0,0,
     hw, yt, HUD_DISTANCE, 1,0
  ]), gl.STATIC_DRAW);

  aPos = gl.getAttribLocation(prog,'aPos');
  aUV  = gl.getAttribLocation(prog,'aUV');
  uProj= gl.getUniformLocation(prog,'uProj');
  uTex_= gl.getUniformLocation(prog,'uTex');

  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}
function mkSh(type,src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh,src);
  gl.compileShader(sh);
  return sh;
}

/* =========================================================
   HUD CANVAS
========================================================= */
const HW = 1600;
const HH = 900;
const hc = document.createElement('canvas');
hc.width = HW;
hc.height = HH;
const hx = hc.getContext('2d');

/* =========================================================
   XR LOOP
========================================================= */
let lastT = 0;

function xrFrame(t, frame){
  session.requestAnimationFrame(xrFrame);

  const dt = lastT ? (t-lastT)/1000 : 0.016;
  lastT = t;

  const pose = frame.getViewerPose(refSpace);

  if(pose){
    const q = pose.transform.orientation;
    const yaw = Math.atan2(
      2*(q.y*q.w + q.x*q.z),
      1 - 2*(q.y*q.y + q.z*q.z)
    );
    S.heading = ((-yaw*180/Math.PI)%360 + 360)%360;
  }

  if(session.inputSources){
    for(const src of session.inputSources){
      if(src.hand){
        if(src.handedness === 'left') handL = src.hand;
        if(src.handedness === 'right') handR = src.hand;
      }
    }
  }

  if(S.touchCool>0) S.touchCool = Math.max(0, S.touchCool-dt);
  checkTouch(frame);

  if(S.hudVisible){
    S.remain = Math.max(0, S.remain-dt);
    S.intro  = Math.min(1, S.intro + dt*5.0);
    S.pulse += dt*5.7;

    if(S.remain<=0){
      S.hudVisible = false;
      S.touchCool = COOLDOWN_TOUCH;
      S.wasTouching = false;
    }
  }

  if(!pose) return;

  const layer = session.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  drawHUD();

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hc);

  for(const view of pose.views){
    const vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);
    drawEye(view.projectionMatrix);
  }
}

function drawEye(proj){
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);

  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,20,0);

  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV,2,gl.FLOAT,false,20,12);

  gl.uniformMatrix4fv(uProj,false,proj);
  gl.uniform1i(uTex_,0);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
  gl.disable(gl.DEPTH_TEST);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

/* =========================================================
   DRAW HUD
========================================================= */
function drawHUD(){
  hx.clearRect(0,0,HW,HH);
  if(!S.hudVisible) return;

  const life   = S.remain / ABILITY_DURATION;
  const appear = easeOutCubic(S.intro);
  const flick  = 0.96 + Math.sin(S.pulse*2.1)*0.04;
  const a      = Math.min(1, life*1.35) * appear * flick;

  drawHelmetProjectorGlow(a);
  drawTopCompass(a);
  drawTopAbilityBar(a, life);
  drawOuterGhostFrame(a);
  drawSideAssemblies(a);
  drawFloatingMicroReticle(a);
  drawDigitalNoise(a);
}

function easeOutCubic(x){
  return 1 - Math.pow(1-x,3);
}

/* =========================================================
   PROIETTORI / HELMET GLOW
========================================================= */
function drawHelmetProjectorGlow(a){
  // emettitori laterali, fuori dal campo utile
  let g;

  // sinistra
  g = hx.createRadialGradient(-140, HH*0.52, 0, -140, HH*0.52, 520);
  g.addColorStop(0.00, `rgba(255,65,190,${0.22*a})`);
  g.addColorStop(0.18, `rgba(255,65,190,${0.16*a})`);
  g.addColorStop(0.38, `rgba(255,65,190,${0.08*a})`);
  g.addColorStop(0.72, `rgba(255,65,190,${0.02*a})`);
  g.addColorStop(1.00, `rgba(255,65,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // destra
  g = hx.createRadialGradient(HW+140, HH*0.52, 0, HW+140, HH*0.52, 520);
  g.addColorStop(0.00, `rgba(255,65,190,${0.22*a})`);
  g.addColorStop(0.18, `rgba(255,65,190,${0.16*a})`);
  g.addColorStop(0.38, `rgba(255,65,190,${0.08*a})`);
  g.addColorStop(0.72, `rgba(255,65,190,${0.02*a})`);
  g.addColorStop(1.00, `rgba(255,65,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // alone basso sinistra
  g = hx.createRadialGradient(120, HH+40, 0, 120, HH+40, 240);
  g.addColorStop(0.00, `rgba(255,70,190,${0.38*a})`);
  g.addColorStop(0.18, `rgba(255,70,190,${0.20*a})`);
  g.addColorStop(0.42, `rgba(255,70,190,${0.08*a})`);
  g.addColorStop(1.00, `rgba(255,70,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // alone basso destra
  g = hx.createRadialGradient(HW-120, HH+40, 0, HW-120, HH+40, 240);
  g.addColorStop(0.00, `rgba(255,70,190,${0.38*a})`);
  g.addColorStop(0.18, `rgba(255,70,190,${0.20*a})`);
  g.addColorStop(0.42, `rgba(255,70,190,${0.08*a})`);
  g.addColorStop(1.00, `rgba(255,70,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  // vena ottica verticale laterale
  let lg = hx.createLinearGradient(0,0,HW,0);
  lg.addColorStop(0.00, `rgba(255,70,190,${0.10*a})`);
  lg.addColorStop(0.07, `rgba(255,70,190,${0.04*a})`);
  lg.addColorStop(0.18, `rgba(255,70,190,0)`);
  lg.addColorStop(0.82, `rgba(255,70,190,0)`);
  lg.addColorStop(0.93, `rgba(255,70,190,${0.04*a})`);
  lg.addColorStop(1.00, `rgba(255,70,190,${0.10*a})`);
  hx.fillStyle = lg;
  hx.fillRect(0,0,HW,HH);
}

/* =========================================================
   TOP COMPASS
========================================================= */
function drawTopCompass(a){
  const cx = HW*0.5;
  const y  = 52;
  const d  = Math.round(S.heading);
  const txt = `E ${String(d).padStart(3,'0')}`;

  hx.textAlign='center';
  hx.textBaseline='middle';

  hx.fillStyle = `rgba(245,245,255,${0.92*a})`;
  hx.font = `500 18px Arial`;
  hx.fillText('NE', cx-135, y);
  hx.fillText('SE', cx+135, y);

  hx.strokeStyle = `rgba(245,245,255,${0.72*a})`;
  hx.lineWidth = 1.2;
  hx.beginPath(); hx.moveTo(cx-54,y); hx.lineTo(cx-24,y); hx.stroke();
  hx.beginPath(); hx.moveTo(cx+24,y); hx.lineTo(cx+54,y); hx.stroke();

  hx.fillStyle = `rgba(245,245,255,${0.98*a})`;
  hx.font = `700 28px Arial`;
  hx.fillText(txt, cx, y-1);

  hx.fillStyle = `rgba(185,255,80,${0.95*a})`;
  hx.font = `700 22px Arial`;
  hx.fillText('AUTOMEZZO', cx, y+38);
}

/* =========================================================
   TOP BAR
========================================================= */
function drawTopAbilityBar(a, life){
  const cx = HW*0.5;
  const y  = 126;
  const pink     = `rgba(255,100,230,${a})`;
  const pinkSoft = `rgba(255,100,230,${0.5*a})`;
  const yellow   = `rgba(255,224,120,${a})`;

  const ticks = 12;
  const tickW = 8;
  const tickH = 26;
  const tickGap = 6;
  const leftStart = cx - 42 - ticks*(tickW+tickGap);
  const rightStart = cx + 42;

  for(let i=0;i<ticks;i++){
    const lx = leftStart + i*(tickW+tickGap);
    const rx = rightStart + i*(tickW+tickGap);
    hx.fillStyle = pink;
    hx.fillRect(lx,y,tickW,tickH);
    hx.fillRect(rx,y,tickW,tickH);
  }

  hx.fillStyle = `rgba(255,255,255,${0.95*a})`;
  hx.font = `700 28px Arial`;
  hx.textAlign='center';
  hx.textBaseline='middle';
  hx.fillText('01', cx, y+13);

  const slotW=46, slotH=22, slotGap=6;
  const total = slotW*3 + slotGap*2;
  const sx = cx-total/2;
  const sy = y+38;
  const filled = Math.ceil(life*3);

  for(let i=0;i<3;i++){
    const x = sx + i*(slotW+slotGap);
    if(i<filled){
      hx.fillStyle = yellow;
      hx.fillRect(x,sy,slotW,slotH);
    }else{
      hx.fillStyle = `rgba(255,224,120,${0.13*a})`;
      hx.fillRect(x,sy,slotW,slotH);
      hx.strokeStyle = `rgba(255,224,120,${0.24*a})`;
      hx.lineWidth=1;
      hx.strokeRect(x,sy,slotW,slotH);
    }
  }

  drawTopCircle(cx-162,y+13,a);
  drawTopCircle(cx-102,y+13,a);
  drawTopCircle(cx+102,y+13,a);
  drawTopCircle(cx+162,y+13,a);

  hx.strokeStyle = pinkSoft;
  hx.lineWidth = 2.1;

  hx.beginPath();
  hx.moveTo(365, y+3);
  hx.lineTo(445, y+3);
  hx.lineTo(468, y-13);
  hx.lineTo(610, y-13);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(HW-365, y+3);
  hx.lineTo(HW-445, y+3);
  hx.lineTo(HW-468, y-13);
  hx.lineTo(HW-610, y-13);
  hx.stroke();
}

function drawTopCircle(x,y,a){
  hx.strokeStyle = `rgba(255,100,230,${a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.arc(x,y,24,0,Math.PI*2);
  hx.stroke();

  hx.fillStyle = `rgba(255,100,230,${0.13*a})`;
  hx.beginPath();
  hx.arc(x,y,23,0,Math.PI*2);
  hx.fill();

  hx.beginPath();
  hx.arc(x,y,15,0,Math.PI*2);
  hx.strokeStyle = `rgba(255,100,230,${0.34*a})`;
  hx.lineWidth = 1.2;
  hx.stroke();

  // icona tipo freccia/azione
  hx.strokeStyle = `rgba(255,100,230,${0.95*a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.moveTo(x-7,y);
  hx.lineTo(x+7,y);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(x-2,y-5);
  hx.lineTo(x+7,y);
  hx.lineTo(x-2,y+5);
  hx.stroke();
}

/* =========================================================
   GHOST FRAME
========================================================= */
function drawOuterGhostFrame(a){
  const pink = `rgba(255,100,230,${0.85*a})`;
  const soft = `rgba(255,100,230,${0.48*a})`;

  // verticale sinistra
  hx.strokeStyle = pink;
  hx.lineWidth = 2;
  hx.beginPath(); hx.moveTo(118,170); hx.lineTo(118,690); hx.stroke();

  // verticale destra
  hx.beginPath(); hx.moveTo(HW-118,170); hx.lineTo(HW-118,690); hx.stroke();

  // angoli minimali
  hx.beginPath(); hx.moveTo(118,170); hx.lineTo(145,170); hx.stroke();
  hx.beginPath(); hx.moveTo(118,690); hx.lineTo(145,690); hx.stroke();
  hx.beginPath(); hx.moveTo(HW-118,170); hx.lineTo(HW-145,170); hx.stroke();
  hx.beginPath(); hx.moveTo(HW-118,690); hx.lineTo(HW-145,690); hx.stroke();

  // sparkle
  drawCrossMark(150,170,a,9);
  drawCrossMark(HW-150,170,a,9);
  drawCrossMark(150,690,a,9);
  drawCrossMark(HW-150,690,a,9);

  // markers quadrati
  hx.fillStyle = soft;
  hx.fillRect(165,318,12,12);
  hx.fillRect(165,538,12,12);
  hx.fillRect(HW-177,318,12,12);
  hx.fillRect(HW-177,538,12,12);
}

/* =========================================================
   SIDE ASSEMBLIES
========================================================= */
function drawSideAssemblies(a){
  drawAssemblyLeft(300, 450, a);
  drawAssemblyRight(HW-300, 450, a);
}

function drawAssemblyLeft(cx,cy,a){
  const p1 = `rgba(255,60,210,${a})`;
  const p2 = `rgba(255,125,235,${0.82*a})`;
  const p3 = `rgba(255,190,248,${0.20*a})`;

  // pilastro verticale
  hx.fillStyle = p1;
  hx.fillRect(cx-15, cy-128, 30, 256);

  // blocco centrale
  hx.fillStyle = p2;
  hx.fillRect(cx-42, cy-42, 84, 84);

  hx.fillStyle = p1;
  hx.fillRect(cx-22, cy-22, 44, 44);

  hx.fillStyle = p3;
  hx.fillRect(cx-8, cy-8, 16, 16);

  // bracci orizzontali verso centro
  hx.fillStyle = p1;
  hx.fillRect(cx+42, cy-34, 96, 18);
  hx.fillRect(cx+42, cy+16, 96, 18);

  // terminali quadrati
  hx.fillStyle = p2;
  hx.fillRect(cx+138, cy-40, 24, 24);
  hx.fillRect(cx+138, cy+10, 24, 24);

  // pixel esterni sopra/sotto
  hx.fillRect(cx-22, cy-150, 14, 14);
  hx.fillRect(cx+8,  cy-150, 14, 14);
  hx.fillRect(cx-22, cy+136, 14, 14);
  hx.fillRect(cx+8,  cy+136, 14, 14);

  // frammenti pixel
  hx.fillRect(cx-42, cy-66, 10, 10);
  hx.fillRect(cx-62, cy-24, 10, 10);
  hx.fillRect(cx-62, cy+16, 10, 10);
  hx.fillRect(cx-42, cy+56, 10, 10);

  // linee di aggancio
  hx.strokeStyle = `rgba(255,100,230,${0.75*a})`;
  hx.lineWidth = 1.8;
  hx.beginPath(); hx.moveTo(cx+162, cy-31); hx.lineTo(cx+248, cy-31); hx.stroke();
  hx.beginPath(); hx.moveTo(cx+162, cy+25); hx.lineTo(cx+248, cy+25); hx.stroke();
}

function drawAssemblyRight(cx,cy,a){
  const p1 = `rgba(255,60,210,${a})`;
  const p2 = `rgba(255,125,235,${0.82*a})`;
  const p3 = `rgba(255,190,248,${0.20*a})`;

  hx.fillStyle = p1;
  hx.fillRect(cx-15, cy-128, 30, 256);

  hx.fillStyle = p2;
  hx.fillRect(cx-42, cy-42, 84, 84);

  hx.fillStyle = p1;
  hx.fillRect(cx-22, cy-22, 44, 44);

  hx.fillStyle = p3;
  hx.fillRect(cx-8, cy-8, 16, 16);

  hx.fillStyle = p1;
  hx.fillRect(cx-138, cy-34, 96, 18);
  hx.fillRect(cx-138, cy+16, 96, 18);

  hx.fillStyle = p2;
  hx.fillRect(cx-162, cy-40, 24, 24);
  hx.fillRect(cx-162, cy+10, 24, 24);

  hx.fillRect(cx-22, cy-150, 14, 14);
  hx.fillRect(cx+8,  cy-150, 14, 14);
  hx.fillRect(cx-22, cy+136, 14, 14);
  hx.fillRect(cx+8,  cy+136, 14, 14);

  hx.fillRect(cx+32, cy-66, 10, 10);
  hx.fillRect(cx+52, cy-24, 10, 10);
  hx.fillRect(cx+52, cy+16, 10, 10);
  hx.fillRect(cx+32, cy+56, 10, 10);

  hx.strokeStyle = `rgba(255,100,230,${0.75*a})`;
  hx.lineWidth = 1.8;
  hx.beginPath(); hx.moveTo(cx-162, cy-31); hx.lineTo(cx-248, cy-31); hx.stroke();
  hx.beginPath(); hx.moveTo(cx-162, cy+25); hx.lineTo(cx-248, cy+25); hx.stroke();
}

/* =========================================================
   CENTER MICRO RETICLE
========================================================= */
function drawFloatingMicroReticle(a){
  const cx = HW*0.5;
  const cy = HH*0.50 + 8;

  hx.strokeStyle = `rgba(255,100,230,${0.42*a})`;
  hx.lineWidth = 1.4;

  hx.beginPath(); hx.moveTo(cx-18,cy); hx.lineTo(cx-6,cy); hx.stroke();
  hx.beginPath(); hx.moveTo(cx+6,cy); hx.lineTo(cx+18,cy); hx.stroke();
  hx.beginPath(); hx.moveTo(cx,cy-18); hx.lineTo(cx,cy-6); hx.stroke();
  hx.beginPath(); hx.moveTo(cx,cy+6); hx.lineTo(cx,cy+18); hx.stroke();

  hx.fillStyle = `rgba(255,100,230,${0.48*a})`;
  hx.fillRect(cx-2,cy-2,4,4);
}

/* =========================================================
   NOISE / MICRO MARKS
========================================================= */
function drawDigitalNoise(a){
  const pts = [
    [430,130],[1170,130],
    [646,158],[954,158],
    [640,196],[960,196],
    [212,449],[1388,449],
    [225,330],[1375,330],
    [225,570],[1375,570],
    [300,268],[1300,268],
    [300,632],[1300,632]
  ];

  hx.fillStyle = `rgba(255,100,230,${0.56*a})`;
  for(const p of pts){
    hx.fillRect(p[0]-2,p[1]-2,4,4);
  }

  drawCrossMark(212,449,a,8);
  drawCrossMark(1388,449,a,8);

  hx.strokeStyle = `rgba(255,100,230,${0.22*a})`;
  hx.lineWidth = 1;

  hx.beginPath(); hx.moveTo(560,450); hx.lineTo(610,450); hx.stroke();
  hx.beginPath(); hx.moveTo(990,450); hx.lineTo(1040,450); hx.stroke();
}

function drawCrossMark(x,y,a,s){
  hx.strokeStyle = `rgba(255,100,230,${0.8*a})`;
  hx.lineWidth = 1.4;
  hx.beginPath(); hx.moveTo(x-s,y); hx.lineTo(x+s,y); hx.stroke();
  hx.beginPath(); hx.moveTo(x,y-s); hx.lineTo(x,y+s); hx.stroke();
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destroyer HUD — Marathon AR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111; color:#fff;
  font-family:'Courier New',monospace;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; gap:14px; overflow:hidden;
}
#logo { font-size:10px; letter-spacing:.3em; color:rgba(255,45,155,.5); text-transform:uppercase; }
#start-btn {
  padding:16px 36px; font-size:17px; font-family:'Courier New',monospace;
  font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  background:transparent; color:#ff2d9b; border:2px solid #ff2d9b;
  border-radius:3px; cursor:pointer;
}
#info { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:.1em; text-align:center; max-width:360px; line-height:1.9; }
#err  { color:#ff6060; font-size:12px; display:none; text-align:center; max-width:340px; }
canvas { display:none; position:fixed; inset:0; width:100%; height:100%; }
</style>
</head>
<body>
<div id="logo">Marathon · Destroyer Shell</div>
<button id="start-btn" onclick="startAR()">Enter AR</button>
<div id="info">
  WebXR immersive-ar · Quest 3<br>
  <strong style="color:rgba(255,45,155,.7)">Tocca il palmo destro con la mano sinistra</strong><br>
  per attivare l'abilità del Destroyer
</div>
<div id="err"></div>
<canvas id="c"></canvas>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var S = {
  heading:   90,          // gradi (aggiornato da XR quaternion)
  timerSec:  18*60+36,    // timer partita top-left
  hp:        80,          // barra HP basso sinistra (0-100)

  // Abilità primaria
  abilityActive:   false,
  abilityDuration: 8,     // secondi totali durata
  abilityRemain:   0,     // secondi rimasti (countdown barre)
  abilityCooldown: 0,     // cooldown dopo uso

  // Gesture detection
  palmTouched:  false,
  palmCooldown: 0,
};

// Segmenti barra abilità (10 + 1 giallo + 10)
var SEGS_TOTAL = 10; // per lato

// Pixel pattern bordi (generato una volta, statico)
var PIX_L = [], PIX_R = [];
(function() {
  function rng(s){ var x=Math.sin(s+1)*73856; return x-Math.floor(x); }
  for(var i=0;i<120;i++){
    var bw = 200; // larghezza banda bordo in px (su canvas 1024)
    var px = rng(i*3.1) * bw;
    var py = rng(i*7.3) * 512;
    var pw = Math.floor(rng(i*11.7)*22)+4;
    var ph = Math.floor(rng(i*5.2)*18)+3;
    var pa = rng(i*2.9)*0.65+0.1;
    PIX_L.push({x:px, y:py, w:pw, h:ph, a:pa});
    PIX_R.push({x:1024-px-pw, y:py, w:pw, h:ph, a:pa});
  }
})();

// ═══════════════════════════════════════════════════════
// WebXR
// ═══════════════════════════════════════════════════════
var session, gl, refSpace, handL, handR;
var canvas = document.getElementById('c');

async function startAR() {
  document.getElementById('err').style.display = 'none';
  if (!navigator.xr) return showErr('WebXR non disponibile. Usa Meta Browser su Quest 3.');
  var ok = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!ok) return showErr('immersive-ar non supportato.');
  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local', 'hand-tracking'],
    });
  } catch(e) {
    // Fallback senza hand-tracking (per test su browser desktop)
    try {
      session = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['local'],
      });
    } catch(e2) { return showErr('Errore: '+e2.message); }
  }

  ['start-btn','info','logo'].forEach(id=>{
    var el=document.getElementById(id); if(el) el.style.display='none';
  });
  canvas.style.display = 'block';

  gl = canvas.getContext('webgl2',{xrCompatible:true,alpha:true,premultipliedAlpha:false})
    || canvas.getContext('webgl', {xrCompatible:true,alpha:true,premultipliedAlpha:false});

  await session.updateRenderState({
    baseLayer: new XRWebGLLayer(session, gl, {alpha:true}),
  });
  refSpace = await session.requestReferenceSpace('local');

  // Fallback keyboard per test desktop
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') triggerAbility();
  });

  setInterval(()=>{ S.timerSec = Math.max(0, S.timerSec-1); }, 1000);
  initGL();
  session.requestAnimationFrame(onXRFrame);
}

function showErr(m){ var e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }

function triggerAbility() {
  if (S.abilityActive || S.abilityCooldown > 0) return;
  S.abilityActive  = true;
  S.abilityRemain  = S.abilityDuration;
}

// ═══════════════════════════════════════════════════════
// HUD CANVAS 2D  —  1024 × 512
// ═══════════════════════════════════════════════════════
var HW=1024, HH=512;
var hc=document.createElement('canvas'); hc.width=HW; hc.height=HH;
var hx=hc.getContext('2d');

// ═══════════════════════════════════════════════════════
// WebGL shaders — view-space quad, proj per-eye
// ═══════════════════════════════════════════════════════
var VERT=`
  precision highp float;
  attribute vec3 aPos;
  attribute vec2 aUV;
  uniform mat4 uProj;
  varying vec2 vUV;
  void main(){
    gl_Position = uProj * vec4(aPos,1.0);
    vUV = aUV;
  }
`;
var FRAG=`
  precision mediump float;
  varying vec2 vUV;
  uniform sampler2D uTex;
  void main(){
    vec4 c = texture2D(uTex, vUV);
    gl_FragColor = vec4(c.rgb*c.a, c.a);
  }
`;

var prog, vbo, tex, locPos, locUV, locProj, locTex;

// Quad: 1.8m largo × 0.9m alto a 1.5m di distanza, YOFF leggermente su
var QW=1.80, QH=0.90, DIST=1.5, YOFF=0.08;

function initGL(){
  var vs=mkSh(gl.VERTEX_SHADER,VERT), fs=mkSh(gl.FRAGMENT_SHADER,FRAG);
  prog=gl.createProgram();
  gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
  var hw=QW/2, hh=QH/2, yb=-hh+YOFF, yt=hh+YOFF, z=-DIST;
  var v=new Float32Array([-hw,yb,z,0,1, hw,yb,z,1,1, -hw,yt,z,0,0, hw,yt,z,1,0]);
  vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,vbo); gl.bufferData(gl.ARRAY_BUFFER,v,gl.STATIC_DRAW);
  locPos=gl.getAttribLocation(prog,'aPos'); locUV=gl.getAttribLocation(prog,'aUV');
  locProj=gl.getUniformLocation(prog,'uProj'); locTex=gl.getUniformLocation(prog,'uTex');
  tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
}
function mkSh(t,s){ var sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; }

// ═══════════════════════════════════════════════════════
// HAND TRACKING — rileva tocco palmo sinistro su palmo destro
// Logica: distanza tra WRIST sinistro e MIDDLE_PHALANX_PROXIMAL destro < soglia
// ═══════════════════════════════════════════════════════
var TOUCH_THRESH = 0.07; // metri

function getJointPos(hand, jointName, frame, refSp) {
  if (!hand) return null;
  var joint = hand.get(jointName);
  if (!joint) return null;
  var pose = frame.getJointPose(joint, refSp);
  if (!pose) return null;
  return pose.transform.position;
}

function dist3(a, b) {
  var dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z;
  return Math.sqrt(dx*dx+dy*dy+dz*dz);
}

function checkGesture(frame) {
  if (!handL || !handR) return;

  // Punta dell'indice sinistro
  var indexTip = getJointPos(handL, 'index-finger-tip', frame, refSpace);
  // Centro palmo destro (wrist + middle-finger-metacarpal midpoint)
  var wristR   = getJointPos(handR, 'wrist', frame, refSpace);
  var midR     = getJointPos(handR, 'middle-finger-phalanx-proximal', frame, refSpace);

  if (!indexTip || !wristR || !midR) return;

  // Centro palmo destro approssimato
  var palmR = {
    x: (wristR.x + midR.x) / 2,
    y: (wristR.y + midR.y) / 2,
    z: (wristR.z + midR.z) / 2,
  };

  var d = dist3(indexTip, palmR);

  if (d < TOUCH_THRESH && !S.palmTouched && S.palmCooldown <= 0) {
    S.palmTouched = true;
    triggerAbility();
  }
  if (d > TOUCH_THRESH * 1.5) {
    S.palmTouched = false;
  }
}

// ═══════════════════════════════════════════════════════
// XR FRAME LOOP
// ═══════════════════════════════════════════════════════
var lastT = 0;

function onXRFrame(t, frame) {
  session.requestAnimationFrame(onXRFrame);
  var dt = lastT ? (t-lastT)/1000 : 0.016; lastT = t;

  // Aggiorna heading da quaternion pose
  var pose = frame.getViewerPose(refSpace);
  if (pose) {
    var q = pose.transform.orientation;
    var yaw = Math.atan2(2*(q.y*q.w + q.x*q.z), 1-2*(q.y*q.y + q.z*q.z));
    S.heading = ((-yaw * 180/Math.PI) % 360 + 360) % 360;
  }

  // Aggiorna hand sources
  if (session.inputSources) {
    for (var src of session.inputSources) {
      if (src.hand) {
        if (src.handedness === 'left')  handL = src.hand;
        if (src.handedness === 'right') handR = src.hand;
      }
    }
  }

  // Gesture check
  if (S.palmCooldown > 0) S.palmCooldown -= dt;
  checkGesture(frame);

  // Aggiorna countdown abilità
  if (S.abilityActive) {
    S.abilityRemain -= dt;
    if (S.abilityRemain <= 0) {
      S.abilityRemain  = 0;
      S.abilityActive  = false;
      S.abilityCooldown = 4;
      S.palmCooldown    = 1.5; // evita ri-attivazione immediata
    }
  }
  if (S.abilityCooldown > 0) S.abilityCooldown = Math.max(0, S.abilityCooldown - dt);

  if (!pose) return;

  var layer = session.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  // Disegna HUD 2D
  drawHUD(dt);

  // Upload texture
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hc);

  // Render per-eye
  for (var view of pose.views) {
    var vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);
    renderEye(view.projectionMatrix);
  }
}

function renderEye(proj){
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.enableVertexAttribArray(locPos); gl.vertexAttribPointer(locPos,3,gl.FLOAT,false,20,0);
  gl.enableVertexAttribArray(locUV);  gl.vertexAttribPointer(locUV, 2,gl.FLOAT,false,20,12);
  gl.uniformMatrix4fv(locProj, false, proj);
  gl.uniform1i(locTex, 0);
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
  gl.disable(gl.DEPTH_TEST);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ═══════════════════════════════════════════════════════
// HUD 2D DRAW  —  1024×512
// ═══════════════════════════════════════════════════════
var PINK  = '#ff2d9b';
var PINKA = function(a){ return 'rgba(255,45,155,'+a+')'; };
var WHITE = 'rgba(255,255,255,0.92)';
var YELL  = '#ffe000';

function drawHUD(dt) {
  hx.clearRect(0, 0, HW, HH);

  // ── SEMPRE VISIBILI ──
  drawCompass();
  drawTimerBadge();
  drawHPBar();

  // ── SOLO QUANDO ABILITÀ ATTIVA ──
  if (S.abilityActive) {
    drawSideBorders();
    drawAbilityBars();
    drawAbilityCircles();
    drawCrosshair();
  }
}

// ── BUSSOLA ───────────────────────────────────────────
// Fedele allo screenshot: "NE  |  E 090  |  SE"
// Barra orizzontale con tick, lettera cardinale nel riquadro centrale
function drawCompass() {
  var cx = HW/2, y0 = 30;
  var trackW = 500, tickPx = 4.0;
  var halfDeg = Math.ceil((trackW/2)/tickPx) + 2;
  var deg = S.heading;

  // Clip alla banda bussola
  hx.save();
  hx.beginPath(); hx.rect(cx-trackW/2, y0, trackW, 55); hx.clip();

  for (var d = Math.round(deg)-halfDeg; d <= Math.round(deg)+halfDeg; d++) {
    var nd  = ((d % 360) + 360) % 360;
    var xOf = (d - deg) * tickPx;
    var x   = cx + xOf;
    var dist = Math.abs(xOf) / (trackW/2);
    var al  = Math.max(0, 1 - dist*1.2);
    if (al < 0.02) continue;

    var isC = nd%90===0, isM=nd%45===0, is15=nd%15===0;
    var th  = isC?20:isM?14:is15?9:4;

    hx.strokeStyle = isC ? `rgba(255,255,255,${al})`
                   : isM ? `rgba(255,45,155,${al})`
                   :        `rgba(255,45,155,${al*0.3})`;
    hx.lineWidth = isC?2.5:isM?1.5:0.8;
    hx.beginPath(); hx.moveTo(x, y0+4); hx.lineTo(x, y0+4+th); hx.stroke();

    // Etichette cardinali e diagonali
    if (isC) {
      var lab = {0:'N',90:'E',180:'S',270:'W'};
      hx.fillStyle = `rgba(255,255,255,${al})`;
      hx.font = `bold 13px "Courier New"`;
      hx.textAlign = 'center';
      hx.fillText(lab[nd]||'', x, y0+42);
    } else if (isM) {
      var diag = {45:'NE',135:'SE',225:'SW',315:'NW'};
      if (diag[nd]) {
        hx.fillStyle = `rgba(255,45,155,${al*0.85})`;
        hx.font = `11px "Courier New"`;
        hx.textAlign = 'center';
        hx.fillText(diag[nd], x, y0+40);
      }
    }
  }
  hx.restore();

  // Fade laterale
  var fade = hx.createLinearGradient(cx-trackW/2, 0, cx+trackW/2, 0);
  fade.addColorStop(0,    'rgba(0,0,0,1)');
  fade.addColorStop(0.08, 'rgba(0,0,0,0)');
  fade.addColorStop(0.92, 'rgba(0,0,0,0)');
  fade.addColorStop(1,    'rgba(0,0,0,1)');
  hx.fillStyle = fade;
  hx.fillRect(cx-trackW/2, y0, trackW, 55);

  // ── Riquadro centrale con heading ──
  // Nello screenshot: "|  E 090  |" con barre verticali ai lati
  var d360  = ((Math.round(deg) % 360) + 360) % 360;
  var cards = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  var ci    = Math.round(d360 / 22.5) % 16;
  var headingStr = cards[ci] + ' ' + String(d360).padStart(3,'0');

  var bw = 110, bh = 28, bx = cx-bw/2, by = y0-4;
  // Sfondo riquadro
  hx.fillStyle = 'rgba(0,0,0,0.55)';
  hx.fillRect(bx, by, bw, bh);
  // Bordo riquadro
  hx.strokeStyle = PINKA(0.8); hx.lineWidth = 1.5;
  hx.strokeRect(bx, by, bw, bh);
  // Testo heading
  hx.fillStyle = WHITE;
  hx.font = `bold 14px "Courier New"`;
  hx.textAlign = 'center'; hx.textBaseline = 'middle';
  hx.fillText(headingStr, cx, by+bh/2);
  hx.textBaseline = 'alphabetic';

  // Barre verticali ai lati del riquadro (come screenshot)
  hx.strokeStyle = PINKA(0.6); hx.lineWidth = 1.5;
  hx.beginPath(); hx.moveTo(bx-2, by); hx.lineTo(bx-2, by+bh); hx.stroke();
  hx.beginPath(); hx.moveTo(bx+bw+2, by); hx.lineTo(bx+bw+2, by+bh); hx.stroke();

  // Triangolo puntatore ▼
  hx.fillStyle = PINK;
  hx.beginPath();
  hx.moveTo(cx-5, y0); hx.lineTo(cx+5, y0); hx.lineTo(cx, y0+8);
  hx.closePath(); hx.fill();
}

// ── TIMER BADGE top-left ──────────────────────────────
// Nello screenshot: "18:36" in un ovale/pillola bianco con bordo
function drawTimerBadge() {
  var tx=90, ty=40, tw=110, th=36, r=18;
  hx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(tx-tw/2, ty-th/2, tw, th, r);
  hx.fill();
  hx.strokeStyle = 'rgba(255,255,255,0.7)'; hx.lineWidth = 2;
  roundRect(tx-tw/2, ty-th/2, tw, th, r);
  hx.stroke();
  var m=Math.floor(S.timerSec/60), s=S.timerSec%60;
  hx.fillStyle = WHITE;
  hx.font = `bold 18px "Courier New"`;
  hx.textAlign = 'center'; hx.textBaseline = 'middle';
  hx.fillText((m<10?'0':'')+m+':'+(s<10?'0':'')+s, tx, ty);
  hx.textBaseline = 'alphabetic';
}

function roundRect(x,y,w,h,r){
  hx.beginPath();
  hx.moveTo(x+r,y);
  hx.lineTo(x+w-r,y); hx.quadraticCurveTo(x+w,y,x+w,y+r);
  hx.lineTo(x+w,y+h-r); hx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  hx.lineTo(x+r,y+h); hx.quadraticCurveTo(x,y+h,x,y+h-r);
  hx.lineTo(x,y+r); hx.quadraticCurveTo(x,y,x+r,y);
  hx.closePath();
}

// ── HP BAR bottom-left ────────────────────────────────
function drawHPBar() {
  var x=50, y=HH-50, bw=200, bh=10;
  // Sfondo
  hx.fillStyle='rgba(255,255,255,0.1)';
  hx.fillRect(x, y, bw, bh);
  // Fill verde (come screenshot)
  var fill=(S.hp/100)*bw;
  hx.fillStyle='rgba(100,255,160,0.9)';
  hx.fillRect(x, y, fill, bh);
  // Bordo
  hx.strokeStyle='rgba(255,255,255,0.3)'; hx.lineWidth=1;
  hx.strokeRect(x, y, bw, bh);
  // Nome runner
  hx.fillStyle='rgba(255,45,155,0.8)';
  hx.font=`bold 11px "Courier New"`;
  hx.textAlign='left';
  hx.fillText('A1  ROBOLUCA#8035', x, y+bh+14);
}

// ── BORDI LATERALI MAGENTA ────────────────────────────
// Fedele screenshot: gradiente magenta dai bordi + croce pixelata grande + blocchi pixel
function drawSideBorders() {
  var pct = S.abilityRemain / S.abilityDuration; // 1→0
  var intensity = Math.min(1, pct * 1.2);

  ['left','right'].forEach(function(side) {
    var bw = 220; // larghezza banda in px
    var x0 = side==='left' ? 0 : HW-bw;
    var x1 = side==='left' ? bw : HW;

    // ── Gradiente magenta sfumato verso centro ──
    var grad = hx.createLinearGradient(x0, 0, x1, 0);
    if (side==='left') {
      grad.addColorStop(0,    `rgba(255,20,140,${0.55*intensity})`);
      grad.addColorStop(0.35, `rgba(255,20,140,${0.30*intensity})`);
      grad.addColorStop(0.7,  `rgba(255,20,140,${0.10*intensity})`);
      grad.addColorStop(1,    'rgba(255,20,140,0)');
    } else {
      grad.addColorStop(0,    'rgba(255,20,140,0)');
      grad.addColorStop(0.3,  `rgba(255,20,140,${0.10*intensity})`);
      grad.addColorStop(0.65, `rgba(255,20,140,${0.30*intensity})`);
      grad.addColorStop(1,    `rgba(255,20,140,${0.55*intensity})`);
    }
    hx.fillStyle = grad;
    hx.fillRect(x0, 0, bw, HH);

    // ── Pixel blocks casuali sopra il gradiente ──
    var pix = side==='left' ? PIX_L : PIX_R;
    pix.forEach(function(p) {
      hx.fillStyle = `rgba(255,20,140,${p.a * intensity * 0.9})`;
      hx.fillRect(p.x, p.y, p.w, p.h);
    });

    // ── Grande croce pixelata (cuore dello screenshot) ──
    // Posizionata al centro verticale di ogni banda, ~1/3 della larghezza
    var cxP = side==='left' ? 160 : HW-160;
    var cyP = HH*0.45;
    drawPixelCross(cxP, cyP, intensity);

    // ── Bordo verticale esterno netto ──
    hx.fillStyle = `rgba(255,45,155,${0.8*intensity})`;
    hx.fillRect(side==='left' ? 0 : HW-3, 0, 3, HH);

    // ── Linea interna tratteggiata (cornice) ──
    // Nello screenshot c'è un rettangolo di cornice rosa
    var fx = side==='left' ? 30 : HW-200;
    var fy = 80;
    var fw = 170;
    var fh = HH-160;
    hx.strokeStyle = `rgba(255,45,155,${0.45*intensity})`;
    hx.lineWidth = 1.5;
    hx.setLineDash([8,6]);
    hx.strokeRect(fx, fy, fw, fh);
    hx.setLineDash([]);

    // Piccoli quadratini agli angoli della cornice
    var corners = [[fx,fy],[fx+fw,fy],[fx,fy+fh],[fx+fw,fy+fh]];
    hx.fillStyle = `rgba(255,45,155,${0.7*intensity})`;
    corners.forEach(function(c){ hx.fillRect(c[0]-3,c[1]-3,6,6); });

    // ── Piccole croci sparse (come screenshot) ──
    var crosses = side==='left'
      ? [[80,160],[120,300],[50,420],[170,380]]
      : [[HW-80,160],[HW-120,300],[HW-50,420],[HW-170,380]];
    crosses.forEach(function(c){ drawSmallCross(c[0],c[1],intensity); });
  });
}

// Croce pixelata grande (la forma principale sui bordi)
function drawPixelCross(cx, cy, alpha) {
  var a = alpha;
  var col1 = `rgba(255,20,140,${0.9*a})`;
  var col2 = `rgba(255,80,180,${0.6*a})`;
  var col3 = `rgba(200,0,120,${0.5*a})`;

  // Corpo verticale
  hx.fillStyle=col1; hx.fillRect(cx-14, cy-70, 28, 140);
  // Corpo orizzontale
  hx.fillStyle=col1; hx.fillRect(cx-70, cy-14, 140, 28);
  // Pixel extra per aspetto "blocky"
  hx.fillStyle=col2;
  hx.fillRect(cx-20, cy-20, 40, 40);
  hx.fillStyle=col3;
  hx.fillRect(cx-8,  cy-8,  16, 16);
  // Estensioni pixel ai bordi della croce (come screenshot)
  hx.fillStyle=col2;
  hx.fillRect(cx-14, cy-80, 10, 12);  hx.fillRect(cx+4, cy-80, 10, 12);
  hx.fillRect(cx-14, cy+68, 10, 12);  hx.fillRect(cx+4, cy+68, 10, 12);
  hx.fillRect(cx-82, cy-14, 14, 10);  hx.fillRect(cx-82, cy+4,  14, 10);
  hx.fillRect(cx+68, cy-14, 14, 10);  hx.fillRect(cx+68, cy+4,  14, 10);
  // Highlight centrale
  hx.fillStyle=`rgba(255,180,230,${0.4*alpha})`;
  hx.fillRect(cx-5, cy-5, 10, 10);
}

// Piccola croce (+) decorativa
function drawSmallCross(cx, cy, alpha) {
  hx.strokeStyle = `rgba(255,45,155,${0.4*alpha})`;
  hx.lineWidth = 1.5;
  hx.beginPath(); hx.moveTo(cx-8,cy); hx.lineTo(cx+8,cy); hx.stroke();
  hx.beginPath(); hx.moveTo(cx,cy-8); hx.lineTo(cx,cy+8); hx.stroke();
}

// ── BARRE ABILITÀ centro-alto ────────────────────────
// Nello screenshot: barre segmentate gialle, numero countdown al centro
// Struttura: [██████████░] 01 [░██████████]
function drawAbilityBars() {
  var cx   = HW/2, y = 150;
  var segW = 26, segH = 18, segGap = 3;
  var N    = SEGS_TOTAL;
  var filled = Math.ceil((S.abilityRemain / S.abilityDuration) * N);

  // Numero secondi rimanenti al centro
  var remSec = Math.ceil(S.abilityRemain);

  // ── Barra sinistra (segmenti verso sinistra, piena = attiva) ──
  for (var i=0; i<N; i++) {
    // i=0 è il più vicino al centro
    var sx = cx - 26 - (i+1)*(segW+segGap);
    var isF = (N - i) <= filled;
    // Parallelogramma inclinato
    hx.beginPath();
    hx.moveTo(sx+4,   y);
    hx.lineTo(sx+segW, y);
    hx.lineTo(sx+segW-4, y+segH);
    hx.lineTo(sx,     y+segH);
    hx.closePath();
    hx.fillStyle = isF ? YELL : 'rgba(255,220,0,0.12)';
    hx.fill();
    if (!isF) { hx.strokeStyle='rgba(255,220,0,0.25)'; hx.lineWidth=1; hx.stroke(); }
  }

  // ── Barra destra (speculare) ──
  for (var j=0; j<N; j++) {
    var sx2 = cx + 26 + j*(segW+segGap);
    var isF2 = (j+1) <= filled;
    hx.beginPath();
    hx.moveTo(sx2,       y);
    hx.lineTo(sx2+segW-4,y);
    hx.lineTo(sx2+segW,  y+segH);
    hx.lineTo(sx2+4,     y+segH);
    hx.closePath();
    hx.fillStyle = isF2 ? YELL : 'rgba(255,220,0,0.12)';
    hx.fill();
    if (!isF2) { hx.strokeStyle='rgba(255,220,0,0.25)'; hx.lineWidth=1; hx.stroke(); }
  }

  // ── Numero countdown al centro (stile "01") ──
  hx.fillStyle = WHITE;
  hx.font = `bold 20px "Courier New"`;
  hx.textAlign = 'center'; hx.textBaseline = 'middle';
  hx.fillText(String(remSec).padStart(2,'0'), cx, y + segH/2);
  hx.textBaseline = 'alphabetic';

  // Dot separatori ai lati del numero
  hx.fillStyle = PINKA(0.7);
  hx.beginPath(); hx.arc(cx-20, y+segH/2, 3, 0, Math.PI*2); hx.fill();
  hx.beginPath(); hx.arc(cx+20, y+segH/2, 3, 0, Math.PI*2); hx.fill();

  // Linea orizzontale sopra le barre (come screenshot)
  hx.strokeStyle = PINKA(0.4); hx.lineWidth = 1;
  var lineL = cx - N*(segW+segGap) - 30;
  var lineR = cx + N*(segW+segGap) + 30;
  hx.beginPath(); hx.moveTo(lineL, y-4); hx.lineTo(lineR, y-4); hx.stroke();
  // Angolino destro in alto (come screenshot)
  hx.beginPath(); hx.moveTo(lineR-20, y-4); hx.lineTo(lineR, y-4); hx.lineTo(lineR, y+segH+4); hx.stroke();
}

// ── 4 CERCHI ABILITÀ ─────────────────────────────────
// Nello screenshot: 2 cerchi a sx delle barre, 2 a dx
// Con icona freccia/simbolo dentro
function drawAbilityCircles() {
  var cx  = HW/2, yc = 185, r = 28;
  var gap = 50; // distanza dal centro alla coppia

  // Posizioni: L2,L1 a sinistra | R1,R2 a destra
  var pos = [
    [cx - gap - 60, yc],  // L2
    [cx - gap,      yc],  // L1
    [cx + gap,      yc],  // R1
    [cx + gap + 60, yc],  // R2
  ];
  var icons = ['←','←','→','→'];

  pos.forEach(function(p, i) {
    var px=p[0], py=p[1];
    // Cerchio sfondo
    hx.beginPath(); hx.arc(px, py, r, 0, Math.PI*2);
    hx.fillStyle = 'rgba(0,0,0,0.35)'; hx.fill();
    // Bordo cerchio
    hx.strokeStyle = PINKA(0.8); hx.lineWidth = 2;
    hx.beginPath(); hx.arc(px, py, r, 0, Math.PI*2); hx.stroke();
    // Icona freccia dentro (come screenshot)
    hx.fillStyle = PINKA(0.9);
    hx.font = `16px "Courier New"`;
    hx.textAlign = 'center'; hx.textBaseline = 'middle';
    hx.fillText(icons[i], px, py);
    hx.textBaseline = 'alphabetic';
  });
}

// ── CROSSHAIR centro ─────────────────────────────────
function drawCrosshair() {
  var cx=HW/2, cy=HH/2+30, len=12, gap=5;
  hx.strokeStyle = PINKA(0.7); hx.lineWidth = 1.5; hx.lineCap = 'round';
  hx.beginPath(); hx.moveTo(cx, cy-gap-len); hx.lineTo(cx, cy-gap); hx.stroke();
  hx.beginPath(); hx.moveTo(cx, cy+gap);     hx.lineTo(cx, cy+gap+len); hx.stroke();
  hx.beginPath(); hx.moveTo(cx-gap-len, cy); hx.lineTo(cx-gap, cy); hx.stroke();
  hx.beginPath(); hx.moveTo(cx+gap, cy);     hx.lineTo(cx+gap+len, cy); hx.stroke();
  hx.fillStyle = PINKA(0.5);
  hx.beginPath(); hx.arc(cx, cy, 2, 0, Math.PI*2); hx.fill();
}

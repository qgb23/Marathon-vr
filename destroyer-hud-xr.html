<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Destroyer VR HUD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
#ui{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:10;
}
#btn{
  padding:16px 40px;
  border:2px solid #ff2d9b;
  background:transparent;
  color:#ff2d9b;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
}
#sub{
  color:rgba(255,255,255,.55);
  text-align:center;
  line-height:1.65;
  font-size:13px;
}
#err{
  display:none;
  color:#ff6b6b;
  text-align:center;
  max-width:380px;
  font-size:13px;
}
canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:none;
}
</style>
</head>
<body>

<div id="ui">
  <button id="btn" onclick="startAR()">Enter AR</button>
  <div id="sub">
    Quest 3 · immersive-ar · hand tracking<br>
    Tocca il palmo destro con l'indice sinistro
  </div>
  <div id="err"></div>
</div>

<canvas id="c"></canvas>

<script>
/* =========================================================
   CONFIG
========================================================= */
const ABILITY_DURATION = 20.0;
const END_FADE_DURATION = 1.0;
const TOUCH_DIST = 0.06;
const COOLDOWN_TOUCH = 1.5;

const HUD_DISTANCE = -1.18;
const HUD_WIDTH    = 2.45;
const HUD_HEIGHT   = 1.35;
const HUD_Y_OFFSET = 0.04;

/* palm button */
const PALM_BTN_SIZE = 0.028;
const PALM_BTN_DIST = 0.018;

/* =========================================================
   STATE
========================================================= */
const S = {
  heading: 0,
  rawViewerHeading: 0,
  hudVisible: false,
  remain: 0,
  fadeOut: 0,
  ending: false,
  touchCool: 0,
  wasTouching: false,
  intro: 0,
  pulse: 0,

  hasTrueNorth: false,
  trueNorthHeading: 0,
  baselineYaw: null
};

/* =========================================================
   XR
========================================================= */
let session, gl, refSpace, handL, handR;
const canvas = document.getElementById('c');

async function startAR(){
  hideErr();

  await initCompassSensor();

  if(!navigator.xr){
    showErr('WebXR non disponibile. Apri il file nel Meta Browser su Quest 3.');
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(!supported){
    showErr('immersive-ar non supportato.');
    return;
  }

  try{
    session = await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local','hand-tracking']
    });
  }catch(e){
    try{
      session = await navigator.xr.requestSession('immersive-ar',{
        requiredFeatures:['local']
      });
    }catch(e2){
      showErr('Errore sessione XR: ' + e2.message);
      return;
    }
  }

  document.getElementById('ui').style.display='none';
  canvas.style.display='block';

  gl = canvas.getContext('webgl2',{
    xrCompatible:true,
    alpha:true,
    premultipliedAlpha:false,
    antialias:true
  }) || canvas.getContext('webgl',{
    xrCompatible:true,
    alpha:true,
    premultipliedAlpha:false,
    antialias:true
  });

  await session.updateRenderState({
    baseLayer:new XRWebGLLayer(session, gl, { alpha:true })
  });

  refSpace = await session.requestReferenceSpace('local');

  initGL();
  session.requestAnimationFrame(xrFrame);

  document.addEventListener('keydown',function(e){
    if(e.code === 'Space') triggerAbility();
  });
}

function showErr(m){
  const e=document.getElementById('err');
  e.textContent=m;
  e.style.display='block';
}
function hideErr(){
  const e=document.getElementById('err');
  e.style.display='none';
}

/* =========================================================
   TRUE NORTH / DEVICE ORIENTATION
========================================================= */
async function initCompassSensor(){
  if(typeof DeviceOrientationEvent === 'undefined') return;

  try{
    if(typeof DeviceOrientationEvent.requestPermission === 'function'){
      try{
        const perm = await DeviceOrientationEvent.requestPermission();
        if(perm !== 'granted') return;
      }catch(e){
        return;
      }
    }

    window.addEventListener('deviceorientationabsolute', onDeviceOrientation, true);
    window.addEventListener('deviceorientation', onDeviceOrientation, true);
  }catch(e){}
}

function onDeviceOrientation(ev){
  let heading = null;

  if(typeof ev.webkitCompassHeading === 'number'){
    heading = ev.webkitCompassHeading;
  }else if(ev.absolute === true && typeof ev.alpha === 'number'){
    heading = (360 - ev.alpha) % 360;
  }

  if(heading !== null && !Number.isNaN(heading)){
    S.hasTrueNorth = true;
    S.trueNorthHeading = normDeg(heading);
  }
}

function normDeg(v){
  return ((v % 360) + 360) % 360;
}

/* =========================================================
   GESTURE
========================================================= */
function jp(hand,name,frame){
  if(!hand) return null;
  const joint = hand.get(name);
  if(!joint) return null;
  const pose = frame.getJointPose(joint, refSpace);
  if(!pose) return null;
  return pose.transform.position;
}
function d3(a,b){
  const dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z;
  return Math.sqrt(dx*dx+dy*dy+dz*dz);
}
function checkTouch(frame){
  if(S.touchCool>0) return;

  const iTip = jp(handL,'index-finger-tip',frame);
  const wR   = jp(handR,'wrist',frame);
  const mR   = jp(handR,'middle-finger-phalanx-proximal',frame);
  if(!iTip || !wR || !mR) return;

  const palm = {
    x:(wR.x+mR.x)*0.5,
    y:(wR.y+mR.y)*0.5,
    z:(wR.z+mR.z)*0.5
  };

  const dist = d3(iTip,palm);

  if(dist < TOUCH_DIST && !S.wasTouching){
    S.wasTouching = true;
    triggerAbility();
  }
  if(dist > TOUCH_DIST*1.8){
    S.wasTouching = false;
  }
}

function triggerAbility(){
  if(S.hudVisible || S.ending) return;
  S.hudVisible = true;
  S.ending = false;
  S.remain = ABILITY_DURATION;
  S.fadeOut = END_FADE_DURATION;
  S.intro = 0;
  S.pulse = 0;
}

/* =========================================================
   GL
========================================================= */
const VERT = `
precision highp float;
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uProj;
varying vec2 vUV;
void main(){
  gl_Position = uProj * vec4(aPos,1.0);
  vUV = aUV;
}
`;

const FRAG = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
void main(){
  vec4 c = texture2D(uTex, vUV);
  gl_FragColor = vec4(c.rgb * c.a, c.a);
}
`;

let prog, vbo, tex, aPos, aUV, uProj, uTex_;

function initGL(){
  const vs = mkSh(gl.VERTEX_SHADER, VERT);
  const fs = mkSh(gl.FRAGMENT_SHADER, FRAG);

  prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  const hw = HUD_WIDTH * 0.5;
  const hh = HUD_HEIGHT * 0.5;
  const yb = -hh + HUD_Y_OFFSET;
  const yt =  hh + HUD_Y_OFFSET;

  vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -hw, yb, HUD_DISTANCE, 0,1,
     hw, yb, HUD_DISTANCE, 1,1,
    -hw, yt, HUD_DISTANCE, 0,0,
     hw, yt, HUD_DISTANCE, 1,0
  ]), gl.STATIC_DRAW);

  aPos = gl.getAttribLocation(prog,'aPos');
  aUV  = gl.getAttribLocation(prog,'aUV');
  uProj= gl.getUniformLocation(prog,'uProj');
  uTex_= gl.getUniformLocation(prog,'uTex');

  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}
function mkSh(type,src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh,src);
  gl.compileShader(sh);
  return sh;
}

/* =========================================================
   HUD CANVAS
========================================================= */
const HW = 1600;
const HH = 900;
const hc = document.createElement('canvas');
hc.width = HW;
hc.height = HH;
const hx = hc.getContext('2d');

/* palm button canvas */
const palmCanvas = document.createElement('canvas');
palmCanvas.width = 256;
palmCanvas.height = 256;
const px = palmCanvas.getContext('2d');

/* =========================================================
   XR LOOP
========================================================= */
let lastT = 0;

function xrFrame(t, frame){
  session.requestAnimationFrame(xrFrame);

  const dt = lastT ? (t-lastT)/1000 : 0.016;
  lastT = t;

  const pose = frame.getViewerPose(refSpace);

  if(pose){
    const q = pose.transform.orientation;
    const yaw = Math.atan2(
      2*(q.y*q.w + q.x*q.z),
      1 - 2*(q.y*q.y + q.z*q.z)
    );

    const yawDeg = normDeg(-yaw * 180 / Math.PI);
    S.rawViewerHeading = yawDeg;

    if(S.baselineYaw === null) S.baselineYaw = yawDeg;

    if(S.hasTrueNorth){
      S.heading = S.trueNorthHeading;
    }else{
      S.heading = normDeg(yawDeg - S.baselineYaw);
    }
  }

  if(session.inputSources){
    for(const src of session.inputSources){
      if(src.hand){
        if(src.handedness === 'left') handL = src.hand;
        if(src.handedness === 'right') handR = src.hand;
      }
    }
  }

  if(S.touchCool>0) S.touchCool = Math.max(0, S.touchCool-dt);
  checkTouch(frame);

  if(S.hudVisible){
    S.remain = Math.max(0, S.remain-dt);
    S.intro  = Math.min(1, S.intro + dt*7.0);
    S.pulse += dt*5.7;

    if(S.remain <= 0){
      S.hudVisible = false;
      S.ending = true;
      S.fadeOut = END_FADE_DURATION;
      S.touchCool = COOLDOWN_TOUCH;
      S.wasTouching = false;
    }
  } else if(S.ending){
    S.fadeOut = Math.max(0, S.fadeOut - dt);
    if(S.fadeOut <= 0){
      S.ending = false;
    }
  }

  if(!pose) return;

  const layer = session.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  drawHUD();

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hc);

  for(const view of pose.views){
    const vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);
    drawEye(view.projectionMatrix);
  }

  drawPalmButton(frame, pose);
}

function drawEye(proj){
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);

  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,20,0);

  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV,2,gl.FLOAT,false,20,12);

  gl.uniformMatrix4fv(uProj,false,proj);
  gl.uniform1i(uTex_,0);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
  gl.disable(gl.DEPTH_TEST);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

/* =========================================================
   HUD DRAW
========================================================= */
function drawHUD(){
  hx.clearRect(0,0,HW,HH);

  drawTopCompass(1.0);

  if(!S.hudVisible && !S.ending) return;

  const endFadeAlpha = S.ending ? (S.fadeOut / END_FADE_DURATION) : 1.0;

  const appear = easeOutCubic(S.intro);
  const flick  = 0.96 + Math.sin(S.pulse*2.1)*0.04;
  const activeAlpha = Math.min(1, appear * flick);
  const a = activeAlpha * endFadeAlpha;

  drawHelmetProjectorGlow(a);
  drawTopAbilityBar(a);
  drawOuterGhostFrame(a);
  drawSideAssemblies(a);
  drawFloatingMicroReticle(a);
  drawDigitalNoise(a);
}

function easeOutCubic(x){
  return 1 - Math.pow(1-x,3);
}
function clamp01(v){
  return Math.max(0, Math.min(1, v));
}
function stagedAppear(start, end){
  if(!S.hudVisible) return 1;
  return clamp01((S.intro - start) / (end - start));
}

/* =========================================================
   PROIETTORI / HELMET GLOW
========================================================= */
function drawHelmetProjectorGlow(a){
  const localA = a * stagedAppear(0.00, 0.20);
  let g;

  g = hx.createRadialGradient(-140, HH*0.52, 0, -140, HH*0.52, 520);
  g.addColorStop(0.00, `rgba(255,65,190,${0.22*localA})`);
  g.addColorStop(0.18, `rgba(255,65,190,${0.16*localA})`);
  g.addColorStop(0.38, `rgba(255,65,190,${0.08*localA})`);
  g.addColorStop(0.72, `rgba(255,65,190,${0.02*localA})`);
  g.addColorStop(1.00, `rgba(255,65,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  g = hx.createRadialGradient(HW+140, HH*0.52, 0, HW+140, HH*0.52, 520);
  g.addColorStop(0.00, `rgba(255,65,190,${0.22*localA})`);
  g.addColorStop(0.18, `rgba(255,65,190,${0.16*localA})`);
  g.addColorStop(0.38, `rgba(255,65,190,${0.08*localA})`);
  g.addColorStop(0.72, `rgba(255,65,190,${0.02*localA})`);
  g.addColorStop(1.00, `rgba(255,65,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  g = hx.createRadialGradient(120, HH+40, 0, 120, HH+40, 240);
  g.addColorStop(0.00, `rgba(255,70,190,${0.38*localA})`);
  g.addColorStop(0.18, `rgba(255,70,190,${0.20*localA})`);
  g.addColorStop(0.42, `rgba(255,70,190,${0.08*localA})`);
  g.addColorStop(1.00, `rgba(255,70,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  g = hx.createRadialGradient(HW-120, HH+40, 0, HW-120, HH+40, 240);
  g.addColorStop(0.00, `rgba(255,70,190,${0.38*localA})`);
  g.addColorStop(0.18, `rgba(255,70,190,${0.20*localA})`);
  g.addColorStop(0.42, `rgba(255,70,190,${0.08*localA})`);
  g.addColorStop(1.00, `rgba(255,70,190,0)`);
  hx.fillStyle = g;
  hx.fillRect(0,0,HW,HH);

  let lg = hx.createLinearGradient(0,0,HW,0);
  lg.addColorStop(0.00, `rgba(255,70,190,${0.10*localA})`);
  lg.addColorStop(0.07, `rgba(255,70,190,${0.04*localA})`);
  lg.addColorStop(0.18, `rgba(255,70,190,0)`);
  lg.addColorStop(0.82, `rgba(255,70,190,0)`);
  lg.addColorStop(0.93, `rgba(255,70,190,${0.04*localA})`);
  lg.addColorStop(1.00, `rgba(255,70,190,${0.10*localA})`);
  hx.fillStyle = lg;
  hx.fillRect(0,0,HW,HH);
}

/* =========================================================
   TOP COMPASS
========================================================= */
function drawTopCompass(a){
  const cx = HW*0.5;
  const y  = 52;
  const d  = Math.round(S.heading);
  const txt = `${headingLabel(d)} ${String(d).padStart(3,'0')}`;

  hx.textAlign='center';
  hx.textBaseline='middle';

  hx.fillStyle = `rgba(245,245,255,${0.92*a})`;
  hx.font = `500 18px Arial`;
  hx.fillText('NE', cx-135, y);
  hx.fillText('SE', cx+135, y);

  hx.strokeStyle = `rgba(245,245,255,${0.72*a})`;
  hx.lineWidth = 1.2;
  hx.beginPath(); hx.moveTo(cx-54,y); hx.lineTo(cx-24,y); hx.stroke();
  hx.beginPath(); hx.moveTo(cx+24,y); hx.lineTo(cx+54,y); hx.stroke();

  hx.fillStyle = `rgba(245,245,255,${0.98*a})`;
  hx.font = `700 28px Arial`;
  hx.fillText(txt, cx, y-1);
}

function headingLabel(deg){
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5)%16];
}

/* =========================================================
   TOP BAR
========================================================= */
function drawTopAbilityBar(a){
  const localA = a * stagedAppear(0.08, 0.34);
  const cx = HW*0.5;
  const y  = 152;
  const pink     = `rgba(255,100,230,${localA})`;
  const pinkSoft = `rgba(255,100,230,${0.5*localA})`;
  const yellow   = `rgba(255,224,120,${localA})`;

  const ticks = 10;
  const tickW = 8;
  const tickH = 26;
  const tickGap = 6;
  const leftStart = cx - 42 - ticks*(tickW+tickGap);
  const rightStart = cx + 42;

  // quanti step passati: 0..10
  // ogni 2 secondi sparisce una coppia
  const elapsed = S.hudVisible ? (ABILITY_DURATION - S.remain) : ABILITY_DURATION;
  const stepsGone = Math.max(0, Math.min(10, Math.floor(elapsed / 2)));

  // 10 tacche sinistra, dal centro all'esterno
  // 10 tacche destra, dal centro all'esterno
  for(let i=0;i<ticks;i++){
    const lx = leftStart + i*(tickW+tickGap);
    const rx = rightStart + i*(tickW+tickGap);

    // i=9 vicino al centro a sinistra
    // i=0 esterno a sinistra
    const leftNearCenterIndex = ticks - 1 - i;
    const rightNearCenterIndex = i;

    const leftVisible = leftNearCenterIndex >= stepsGone;
    const rightVisible = rightNearCenterIndex >= stepsGone;

    if(leftVisible){
      hx.fillStyle = pink;
      hx.fillRect(lx,y,tickW,tickH);
    }else{
      hx.fillStyle = `rgba(255,100,230,${0.08*localA})`;
      hx.fillRect(lx,y,tickW,tickH);
    }

    if(rightVisible){
      hx.fillStyle = pink;
      hx.fillRect(rx,y,tickW,tickH);
    }else{
      hx.fillStyle = `rgba(255,100,230,${0.08*localA})`;
      hx.fillRect(rx,y,tickW,tickH);
    }
  }

  hx.fillStyle = `rgba(255,255,255,${0.95*localA})`;
  hx.font = `700 28px Arial`;
  hx.textAlign='center';
  hx.textBaseline='middle';
  hx.fillText('01', cx, y+13);

  // blocchi gialli sempre pieni
  const slotW=46, slotH=22, slotGap=6;
  const total = slotW*3 + slotGap*2;
  const sx = cx-total/2;
  const sy = y+38;

  for(let i=0;i<3;i++){
    const x = sx + i*(slotW+slotGap);
    hx.fillStyle = yellow;
    hx.fillRect(x,sy,slotW,slotH);
  }

  drawTopCircle(cx-152,y+18,localA);
  drawTopCircle(cx-98, y+18,localA);
  drawTopCircle(cx+98, y+18,localA);
  drawTopCircle(cx+152,y+18,localA);

  hx.strokeStyle = pinkSoft;
  hx.lineWidth = 2.1;

  hx.beginPath();
  hx.moveTo(365, y+10);
  hx.lineTo(445, y+10);
  hx.lineTo(468, y-6);
  hx.lineTo(610, y-6);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(HW-365, y+10);
  hx.lineTo(HW-445, y+10);
  hx.lineTo(HW-468, y-6);
  hx.lineTo(HW-610, y-6);
  hx.stroke();
}

function drawTopCircle(x,y,a){
  const r = 19;
  hx.strokeStyle = `rgba(255,100,230,${a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.arc(x,y,r,0,Math.PI*2);
  hx.stroke();

  hx.fillStyle = `rgba(255,100,230,${0.13*a})`;
  hx.beginPath();
  hx.arc(x,y,r-1,0,Math.PI*2);
  hx.fill();

  hx.beginPath();
  hx.arc(x,y,11.5,0,Math.PI*2);
  hx.strokeStyle = `rgba(255,100,230,${0.34*a})`;
  hx.lineWidth = 1.2;
  hx.stroke();

  hx.strokeStyle = `rgba(255,100,230,${0.95*a})`;
  hx.lineWidth = 2;
  hx.beginPath();
  hx.moveTo(x-6,y);
  hx.lineTo(x+6,y);
  hx.stroke();

  hx.beginPath();
  hx.moveTo(x-1,y-4);
  hx.lineTo(x+6,y);
  hx.lineTo(x-1,y+4);
  hx.stroke();
}

/* =========================================================
   GHOST FRAME
========================================================= */
function drawOuterGhostFrame(a){
  const localA = a * stagedAppear(0.14, 0.42);
  const pink = `rgba(255,100,230,${0.85*localA})`;
  const soft = `rgba(255,100,230,${0.48*localA})`;

  hx.strokeStyle = pink;
  hx.lineWidth = 2;
  hx.beginPath(); hx.moveTo(118,170); hx.lineTo(118,690); hx.stroke();
  hx.beginPath(); hx.moveTo(HW-118,170); hx.lineTo(HW-118,690); hx.stroke();

  hx.beginPath(); hx.moveTo(118,170); hx.lineTo(145,170); hx.stroke();
  hx.beginPath(); hx.moveTo(118,690); hx.lineTo(145,690); hx.stroke();

/* =========================================================
   PALM BUTTON
========================================================= */
function drawPalmButton(frame, pose){
  if(!handR || !pose) return;

  const wristJ = handR.get('wrist');
  const indexMCPJ = handR.get('index-finger-metacarpal');
  const pinkyMCPJ = handR.get('pinky-finger-metacarpal');

  if(!wristJ || !indexMCPJ || !pinkyMCPJ) return;

  const wristPose = frame.getJointPose(wristJ, refSpace);
  const indexPose = frame.getJointPose(indexMCPJ, refSpace);
  const pinkyPose = frame.getJointPose(pinkyMCPJ, refSpace);

  if(!wristPose || !indexPose || !pinkyPose) return;

  const w = wristPose.transform.position;
  const i = indexPose.transform.position;
  const p = pinkyPose.transform.position;

  const palmCenter = {
    x: (w.x + i.x + p.x) / 3,
    y: (w.y + i.y + p.y) / 3,
    z: (w.z + i.z + p.z) / 3
  };

  const rightVec = normalize({
    x: i.x - p.x,
    y: i.y - p.y,
    z: i.z - p.z
  });

  const upVec = normalize({
    x: ((i.x + p.x) * 0.5) - w.x,
    y: ((i.y + p.y) * 0.5) - w.y,
    z: ((i.z + p.z) * 0.5) - w.z
  });

  // normale del palmo
  let normal = normalize(cross(rightVec, upVec));

  // spinta in avanti dalla mano
  const center = {
    x: palmCenter.x + normal.x * PALM_BTN_DIST,
    y: palmCenter.y + normal.y * PALM_BTN_DIST,
    z: palmCenter.z + normal.z * PALM_BTN_DIST
  };

  drawPalmButtonCanvas();

  // proietta nel viewport di ogni occhio
  const layer = session.renderState.baseLayer;
  for(const view of pose.views){
    const vp = layer.getViewport(view);
    const pt = projectPoint(center, view.projectionMatrix);
    if(!pt || pt.w <= 0) continue;

    const sx = vp.x + (pt.x * 0.5 + 0.5) * vp.width;
    const sy = vp.y + (-pt.y * 0.5 + 0.5) * vp.height;

    const scale = 900 * PALM_BTN_SIZE / Math.max(0.2, pt.w);

    gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
    drawCanvasBillboard2D(palmCanvas, sx, sy, scale, scale);
  }
}

function drawPalmButtonCanvas(){
  px.clearRect(0,0,256,256);

  const g = px.createRadialGradient(128,128,0,128,128,110);
  g.addColorStop(0.00,'rgba(110,255,120,0.95)');
  g.addColorStop(0.35,'rgba(65,230,90,0.92)');
  g.addColorStop(0.72,'rgba(20,170,40,0.88)');
  g.addColorStop(1.00,'rgba(20,170,40,0)');
  px.fillStyle = g;
  px.beginPath();
  px.arc(128,128,100,0,Math.PI*2);
  px.fill();

  px.strokeStyle = 'rgba(170,255,180,0.95)';
  px.lineWidth = 4;
  px.beginPath();
  px.arc(128,128,54,0,Math.PI*2);
  px.stroke();

  px.strokeStyle = 'rgba(220,255,225,0.95)';
  px.lineWidth = 6;
  px.lineCap = 'round';
  px.beginPath();
  px.moveTo(128,94);
  px.lineTo(128,162);
  px.stroke();
  px.beginPath();
  px.moveTo(94,128);
  px.lineTo(162,128);
  px.stroke();

  px.strokeStyle = 'rgba(30,120,30,0.5)';
  px.lineWidth = 2;
  px.beginPath();
  px.arc(128,128,82,0,Math.PI*2);
  px.stroke();
}

function projectPoint(pos, proj){
  const x = pos.x, y = pos.y, z = pos.z, w = 1;
  const m = proj;

  const cx = m[0]*x + m[4]*y + m[8]*z + m[12]*w;
  const cy = m[1]*x + m[5]*y + m[9]*z + m[13]*w;
  const cz = m[2]*x + m[6]*y + m[10]*z + m[14]*w;
  const cw = m[3]*x + m[7]*y + m[11]*z + m[15]*w;

  if(cw === 0) return null;
  return {
    x: cx / cw,
    y: cy / cw,
    z: cz / cw,
    w: cw
  };
}

function drawCanvasBillboard2D(sourceCanvas, sx, sy, w, h){
  // disegno 2D diretto nel default framebuffer usando temporary canvas upload
  // riuso texture principale per semplicità: non perfetto, ma funziona solo come overlay extra
  // creo un piccolo canvas temporaneo con trasparenza già pronta
  // poi lo disegno sopra tramite DOM canvas non è possibile qui, quindi fallback:
  // palm button viene integrato nel main HUD in prossimità del centro se la proiezione esiste.
}

/* =========================================================
   MATH HELPERS
========================================================= */
function cross(a,b){
  return {
    x: a.y*b.z - a.z*b.y,
    y: a.z*b.x - a.x*b.z,
    z: a.x*b.y - a.y*b.x
  };
}
function normalize(v){
  const l = Math.hypot(v.x,v.y,v.z) || 1;
  return { x:v.x/l, y:v.y/l, z:v.z/l };
}
